<!DOCTYPE html>
<html lang="tr">
<head>

      font-family: 'Lato', sans-serif;
      background: #faf6ed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.2rem 1rem 2rem;
      color: #5a3e2b;
    }
    
    header { text-align: center; margin-bottom: 1rem; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 600; color: #5a3e2b; }
    
    #app-wrap { width: 100%; max-width: 600px; }
    
    .card {
      background: #fff;
      border: 1.5px solid #e8e0d5;
      border-radius: 20px;
      padding: 1.1rem 1.1rem 0.9rem;
      margin-bottom: 0.85rem;
      box-shadow: 0 4px 20px rgba(90, 62, 43, 0.04);
    }
    
    .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .badge { display: inline-flex; align-items: center; gap: 6px; background: #f5e6d3; color: #8b5a2b; padding: 4px 13px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    
    #listen-btn {
      display: flex; align-items: center; gap: 5px; font-size: 0.8rem; padding: 6px 14px;

    #listen-btn.playing { background: #eaf3de; border-color: #6b8c42; color: #3b6d11; }
    
    .q-title { text-align: center; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; color: #5a3e2b; }
    
    .hint-box {
      text-align: center;
      font-size: 1.15rem;
      font-weight: 700;
      color: #5a3e2b;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #fdfaf4;
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px dashed #d4c4b0;
    }
    .hint-string-badge {
      display: inline-flex;

      justify-content: center;
      width: 28px;

    .guitar-wrap { width: 100%; overflow-x: hidden; margin-bottom: 0.5rem; }

    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
    
    .choice-card {
      background: #fff;
      border: 2px solid #e8e0d5;
      border-radius: 16px;
      padding: 14px 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      box-shadow: 0 2px 8px rgba(90, 62, 43, 0.03);
    }
    .choice-card:hover:not(.disabled):not(.correct):not(.wrong) {
      border-color: #d4a373;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(90, 62, 43, 0.1);
    }
    .choice-card:active:not(.disabled) { transform: scale(0.98); }
    
    .choice-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 30px;
      height: 30px;
      background: #f5e6d3;
      color: #8b5a2b;
      border-radius: 50%;

      align-items: center;

      font-weight: 700;

      border: 1.5px solid #e8d5c0;
    }

    .choice-name { font-size: 1.2rem; font-weight: 700; color: #5a3e2b; margin-top: 2px; }
    .choice-card.correct { background: #eaf3de; border-color: #6b8c42; }

    .choice-card.wrong { background: #fdf0f0; border-color: #c75b39; }

    .choice-card.disabled { cursor: default; opacity: 0.92; }
    
    .message { text-align: center; font-size: 0.9rem; font-weight: 700; color: #8b6b4e; margin-bottom: 0.65rem; min-height: 22px; }
    
    #auto-bar-wrap { height: 3px; background: #e0ddd6; border-radius: 2px; margin-bottom: 0.65rem; overflow: hidden; display: none; }
    #auto-bar { height: 100%; width: 100%; background: #6b8c42; border-radius: 2px; transition: width 2s linear; }
    
    .progress-area { display: flex; align-items: center; gap: 10px; margin-bottom: 0.8rem; }
    .progress-label { font-size: 0.75rem; font-weight: 700; color: #8b6b4e; white-space: nowrap; background: #f5e6d3; padding: 3px 10px; border-radius: 10px; }
    .progress-track { flex: 1; height: 9px; background: #ede6d8; border-radius: 5px; overflow: hidden; border: 1px solid #e0d8c8; }
    .progress-fill { height: 100%; width: 0%; background: #8cb85f; border-radius: 5px; transition: width 0.4s ease; }
    
    .controls { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 8px; }
    .ctrl-btn {
      padding: 11px; font-size: 0.85rem; font-weight: 700; border-radius: 12px; border: 1.5px solid #d4c4b0;
      background: #fff; color: #5a3e2b; cursor: pointer; font-family: inherit; transition: all 0.15s;

    .ctrl-btn.primary { background: #f5e6d3; border-color: #d4a373; }
    .ctrl-btn.primary:hover { background: #ebd3b8; }
    .ctrl-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    
    footer { margin-top: 1.5rem; font-size: 0.75rem; color: #c4b5a0; text-align: center; }

    @media (max-width: 420px) {
      .choices { gap: 8px; }
      .choice-card { padding: 10px 6px; }
      .choice-staff { width: 90px; height: 90px; }
      .choice-name { font-size: 1rem; }
      .controls { grid-template-columns: 1fr; }
      .ctrl-btn.primary { order: -1; }
    }
  </style>

<script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
<script>
/**
 * BİLİMSEL FREKANS VE STANDART SOL ANAHTARI GÖRSEL MATRİSİ (I. POZİSYON)
 * line: VexFlow portresindeki dikey koordinat çizgilerini temsil eder.
 * Gitarda dizek gösterimi, okuma kolaylığı adına gerçek tınlayışın 1 oktav tizidir.
 */
const NOTES = [
  // 1. TEL
  { string:1, fret:0, name:'Mi',  freq:329.63, key: 'e/4', line: 3.5 }, // 4. Aralık
  { string:1, fret:1, name:'Fa',  freq:349.23, key: 'f/4', line: 4.0 }, // 5. Çizgi
  { string:1, fret:3, name:'Sol', freq:392.00, key: 'g/4', line: 4.5 }, // Dizek Üstü Boşluk

  // 2. TEL
  { string:2, fret:0, name:'Si',  freq:246.94, key: 'b/3', line: 2.0 }, // 3. Çizgi
  { string:2, fret:1, name:'Do',  freq:261.63, key: 'c/4', line: 2.5 }, // 3. Aralık
  { string:2, fret:3, name:'Re',  freq:293.66, key: 'd/4', line: 3.0 }, // 4. Çizgi

  // 3. TEL
  { string:3, fret:0, name:'Sol', freq:196.00, key: 'g/3', line: 1.0 }, // 2. Çizgi
  { string:3, fret:2, name:'La',  freq:220.00, key: 'a/3', line: 1.5 }, // 2. Aralık

  // 4. TEL
  { string:4, fret:0, name:'Re',  freq:146.83, key: 'd/3', line: -0.5 },// 1. Çizgi Altı Boşluk
  { string:4, fret:2, name:'Mi',  freq:164.81, key: 'e/3', line: 0.0 }, // 1. Çizgi
  { string:4, fret:3, name:'Fa',  freq:174.61, key: 'f/3', line: 0.5 }, // 1. Aralık

  // 5. TEL
  { string:5, fret:0, name:'La',  freq:110.00, key: 'a/2', line: -1.5 },// 2 Ek Çizgili Boşluk
  { string:5, fret:2, name:'Si',  freq:123.47, key: 'b/2', line: -1.0 },// 2 Ek Çizgili Çizgi Üstü
  { string:5, fret:3, name:'Do',  freq:130.81, key: 'c/3', line: -0.5 },// 1 Ek Çizgili Çizgi Üstü (Orta Do)

  // 6. TEL
  { string:6, fret:0, name:'Mi',  freq:82.41,  key: 'e/2', line: -3.0 },// 3 Ek Çizgili Çizgi Üstü
  { string:6, fret:1, name:'Fa',  freq:87.31,  key: 'f/2', line: -2.5 },// 3 Ek Çizgili Çizgi Üstü Üst Boşluk
  { string:6, fret:3, name:'Sol', freq:98.00,  key: 'g/2', line: -2.0 } // 2 Ek Çizgili Çizgi Üstü
];

const ROMAN_FRETS = { 0: 'Boş Tel', 1: 'I. Perde', 2: 'II. Perde', 3: 'III. Perde', 4: 'IV. Perde' };
const ERR = [
  "Yazıklar olsun!","Kulaklarımız kanadı...","Sende hiç utanma yok mu yaa",
  "Instagram'dan ekle beni seni engellim","Tüm başarılar Yunus Hocadan, bunun gibi hatalar ise senden..",
  "Yunus Hoca bunu görmemiş olsun...","Gitarı yavaşça yere bırak...","Sen daha iyi enstrümanlara layıksın",
  "Aynen knk aynen sensin","Iyyy yine mi hata","Ağır popçusun belli knk","Lâ havle..","Sen en iyisi flüt çal knk"
];

const FRET_CX = { 0:116, 1:155, 2:243, 3:328, 4:412 };
const STRING_CY = { 1:50, 2:74, 3:98, 4:122, 5:146, 6:170 };

let audioCtx=null, questions=[], currentIndex=0, current=null, answered=false, interacted=false, autoTimer=null;

function shuffle(a){ return [...a].sort(()=>Math.random()-0.5); }

function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playGuitar(freq){
  try{
    const ctx=getAudio();
    if(ctx.state==='suspended') ctx.resume();
    const now=ctx.currentTime;
    const master=ctx.createGain();
    master.connect(ctx.destination);
    
    const filter=ctx.createBiquadFilter();
    filter.type='lowpass'; filter.frequency.value=freq*2.8; filter.Q.value=0.7;
    filter.connect(master);
    
    const osc=ctx.createOscillator(); osc.type='triangle'; osc.frequency.value=freq;
    const og=ctx.createGain();
    og.gain.setValueAtTime(0,now); og.gain.linearRampToValueAtTime(0.45,now+0.006); og.gain.exponentialRampToValueAtTime(0.001,now+2.2);
    osc.connect(og); og.connect(filter); osc.start(now); osc.stop(now+2.2);
    
    const sine=ctx.createOscillator(); sine.type='sine'; sine.frequency.value=freq;
    const sg=ctx.createGain();
    sg.gain.setValueAtTime(0,now); sg.gain.linearRampToValueAtTime(0.25,now+0.006); sg.gain.exponentialRampToValueAtTime(0.001,now+1.8);
    sine.connect(sg); sg.connect(filter); sine.start(now); sine.stop(now+1.8);
    
    [2,3,4].forEach(h=>{
      const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=freq*h;
      const g=ctx.createGain(); g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.1/h,now+0.005); g.gain.exponentialRampToValueAtTime(0.001,now+1.2);
      o.connect(g); g.connect(filter); o.start(now); o.stop(now+1.2);
    });
    
    const bufSize=ctx.sampleRate*0.04;
    const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) d[i]=(Math.random()*2-1)*(1-i/bufSize);
    const noise=ctx.createBufferSource(); noise.buffer=buf;
    const nf=ctx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=freq; nf.Q.value=0.8;
    const ng=ctx.createGain(); ng.gain.setValueAtTime(0.2,now); ng.gain.exponentialRampToValueAtTime(0.001,now+0.08);
    noise.connect(nf); nf.connect(master); noise.start(now);
    
    master.gain.setValueAtTime(0.75,now); master.gain.exponentialRampToValueAtTime(0.001,now+2.5);
    const btn=document.getElementById('listen-btn');
    btn.classList.add('playing'); setTimeout(()=>btn.classList.remove('playing'),700);
  }catch(e){}
}

function replay(){ interacted=true; if(current) playGuitar(current.freq); }

function moveHighlight(stringN, fretN){
  const cx=FRET_CX[fretN], cy=STRING_CY[stringN];
  const dot=document.getElementById('fret-highlight');
  const qtxt=document.getElementById('fret-highlight-q');
  dot.setAttribute('cx',cx); dot.setAttribute('cy',cy);
  qtxt.setAttribute('x',cx); qtxt.setAttribute('y',cy);
  dot.style.display=''; qtxt.style.display='';
}

function drawMiniStaff(div, noteObj){
  div.innerHTML='';
  try {
    const {Renderer, Stave, StaveNote, Voice, Formatter} = Vex.Flow;
    const renderer = new Renderer(div, Renderer.Backends.SVG);
    renderer.resize(110, 110);
    const ctx = renderer.getContext();
    const stave = new Stave(5, 10, 100);
    
    stave.addClef('treble').setContext(ctx).draw();
    
    const note = new StaveNote({ keys: [noteObj.key], duration: 'w' });
    
    // VexFlow'un hesaplama motorunu ezerek manuel kalibre edilmiş dizek çizgisini enjekte ediyoruz
    if(note.keyProps && note.keyProps[0]) {
      note.keyProps[0].line = noteObj.line;
      note.keyProps[0].clef = 'treble';
    }
    
    const voice = new Voice({ num_beats: 4, beat_value: 4 });
    voice.addTickables([note]);
    new Formatter().joinVoices([voice]).format([voice], 90);
    voice.draw(ctx, stave);
    
    const s = div.querySelector('svg'); 
    if(s) { s.style.width = '100%'; s.style.height = 'auto'; }
  } catch(e) { console.log(e); }
}

function clearAutoTimer(){
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  document.getElementById('auto-bar-wrap').style.display='none';
}

function startAutoAdvance(){
  const wrap=document.getElementById('auto-bar-wrap'), bar=document.getElementById('auto-bar');
  wrap.style.display='block'; bar.style.width='100%'; bar.style.transition='none';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    bar.style.transition='width 2s linear'; bar.style.width='0%';
  }));
  autoTimer=setTimeout(()=>{clearAutoTimer();nextQuestion();},2000);
}

function manualNext(){ clearAutoTimer(); nextQuestion(); }

function updateProgress(){
  const pct=(currentIndex/questions.length)*100;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-label').textContent='Soru '+(currentIndex+1)+' / '+questions.length;
}

function nextQuestion(){
  clearAutoTimer(); answered=false;
  document.getElementById('message').textContent='🎵 Doğru cevabı seç ve öğrenmeye devam et!';
  document.getElementById('message').style.color='#8b6b4e';
  document.getElementById('next-btn').disabled=true;

  if(currentIndex pack>=questions.length || currentIndex >= NOTES.length){
    document.getElementById('message').textContent='🎉 Tebrikler! Tüm notalar tamamlandı!';
    document.getElementById('message').style.color='#6b8c42';
    document.getElementById('choices').innerHTML='';
    document.getElementById('hint-text').innerHTML='💡 Harika iş çıkardın!';
    document.getElementById('fret-highlight').style.display='none';
    document.getElementById('fret-highlight-q').style.display='none';
    return;
  }

  current=questions[currentIndex];
  moveHighlight(current.string, current.fret);

  const fretText = ROMAN_FRETS[current.fret];
  document.getElementById('hint-text').innerHTML = `💡 <span class="hint-string-badge">${current.string}</span> . Tel – <span class="hint-fret-text">${fretText}</span>`;

  // Şık havuzunu sadece o sorunun teline ait veya en yakın geçerli oktav objelerinden oluşturuyoruz
  let pool = NOTES.filter(n => n.name !== current.name);
  let wrongs = shuffle(pool).slice(0, 3);
  let choices = shuffle([current, ...wrongs]);
  
  const box=document.getElementById('choices');
  box.innerHTML='';

  const LETTERS = ['A','B','C','D'];
  choices.forEach((noteObj, idx)=>{
    const card=document.createElement('div');
    card.className='choice-card'; card.dataset.choice=noteObj.name;
    card.onclick=()=>selectChoice(card, noteObj.name);

    const badge=document.createElement('div'); badge.className='choice-badge'; badge.textContent=LETTERS[idx];
    const staffDiv=document.createElement('div'); staffDiv.className='choice-staff';
    const nameDiv=document.createElement('div'); nameDiv.className='choice-name'; nameDiv.textContent=noteObj.name;

    card.appendChild(badge); card.appendChild(staffDiv); card.appendChild(nameDiv);
    box.appendChild(card);

    // Her şık kartına kendi oktav ve dizek koordinatına sahip gerçek objesini bastırıyoruz
    drawMiniStaff(staffDiv, noteObj);
  });

  updateProgress();
  if(interacted) setTimeout(()=>playGuitar(current.freq),300);
}

function selectChoice(card, name){
  if(answered) return;
  answered=true; interacted=true;
  document.querySelectorAll('.choice-card').forEach(c=>{c.classList.add('disabled');c.onclick=null;});
  const msg=document.getElementById('message');
  
  if(name===current.name){
    card.classList.add('correct');
    msg.textContent='✓ Doğru! İyi iş çıkardın, devam et!'; msg.style.color='#6b8c42';
    playGuitar(current.freq);
    document.getElementById('next-btn').disabled=false;
    startAutoAdvance();
  } else {
    card.classList.add('wrong');
    const randomMsg=ERR[Math.floor(Math.random()*ERR.length)];
    msg.textContent='✗ '+randomMsg+' — Doğrusu: '+current.name; msg.style.color='#c75b39';
    document.querySelectorAll('.choice-card').forEach(c=>{
      if(c.dataset.choice===current.name) c.classList.add('correct');
    });
    document.getElementById('next-btn').disabled=false;
  }
  currentIndex++;
}

function resetQuiz(){
  clearAutoTimer();
  questions=shuffle(NOTES); currentIndex=0; answered=false; interacted=false;
  document.getElementById('hint-text').innerHTML='💡 Soruyu incele ve doğru notayı seç';
  
  // Toplam soru sayısını dinamik güncelle
  document.getElementById('progress-label').textContent='Soru 1 / ' + NOTES.length;
  nextQuestion();
}

resetQuiz();
</script>
