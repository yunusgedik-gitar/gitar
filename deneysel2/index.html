<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deneysel2 – MusicXML Play Sistemi</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@300;400;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Lato', sans-serif; background: #faf6ed; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.2rem 1rem 2rem; color: #5a3e2b; }
    header { text-align: center; margin-bottom: 1rem; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 600; color: #5a3e2b; }
    header p { font-size: 0.82rem; color: #b09070; margin-top: 4px; font-style: italic; }
    #app-wrap { width: 100%; max-width: 1000px; }

    #status-msg { text-align: center; padding: 0.9rem; font-size: 0.9rem; color: #8b6b4e; font-weight: 600; background: #fff; border: 1.5px solid #e8e0d5; border-radius: 12px; margin-bottom: 1rem; }
    #status-msg.error { color: #c75b39; background: #fdf0f0; border-color: #e8c4b8; }
    #status-msg.ok    { color: #3b6d11; background: #eaf3de; border-color: #b0c999; }

    #osmd-container { background: #fff; border: 1.5px solid #e8e0d5; border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 4px 20px rgba(90,62,43,0.05); overflow-x: auto; min-height: 200px; }

    .controls { background: #fff; border: 1.5px solid #e8e0d5; border-radius: 16px; padding: 1.2rem; box-shadow: 0 4px 20px rgba(90,62,43,0.05); display: flex; flex-direction: column; gap: 1rem; }
    .ctrl-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .btn { padding: 10px 18px; font-size: 0.88rem; font-weight: 700; border-radius: 12px; border: 1.5px solid #d4c4b0; background: #fff; color: #5a3e2b; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .btn:hover { background: #f5e6d3; border-color: #c4a88a; }
    .btn:active { transform: scale(0.97); }
    .btn.primary { background: #f5e6d3; border-color: #d4a373; }
    .btn.primary:hover { background: #ebd3b8; }
    .btn.green  { background: #eaf3de; border-color: #6b8c42; color: #3b6d11; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .slider-wrap { display: flex; align-items: center; gap: 10px; flex: 1; }
    .slider-wrap label { font-size: 0.85rem; font-weight: 700; color: #8b5a2b; white-space: nowrap; }
    input[type="range"] { flex: 1; accent-color: #8b5a2b; cursor: pointer; }
    .slider-val { font-size: 0.85rem; font-weight: 700; color: #8b5a2b; min-width: 70px; }

    select { padding: 8px 10px; font-size: 0.85rem; font-weight: 600; border-radius: 10px; border: 1.5px solid #d4c4b0; background: #fff; color: #5a3e2b; cursor: pointer; font-family: inherit; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; border-top: 1px solid #ede6d8; padding-top: 0.8rem; font-size: 0.85rem; }
    .info-item { display: flex; justify-content: space-between; gap: 8px; }
    .info-item span:last-child { font-weight: 700; color: #8b5a2b; }

    footer { margin-top: 1.5rem; font-size: 0.75rem; color: #c4b5a0; text-align: center; }
  </style>
</head>
<body>

<header>
  <h1>🎸 Vals – Ole Halen · Deneysel2</h1>
  <p>MusicXML Play Sistemi – Ölçü Seç, Loop, Tempo</p>
</header>

<div id="app-wrap">
  <div id="status-msg">⏳ Notalar yükleniyor...</div>
  <div id="osmd-container"></div>

  <div class="controls">
    <div class="ctrl-row">
      <button class="btn primary" id="play-btn"  disabled>▶ Çal</button>
      <button class="btn"         id="stop-btn"  disabled>⏹ Durdur</button>
      <button class="btn"         id="loop-btn"  disabled>🔄 Loop Kapalı</button>
    </div>

    <div class="ctrl-row">
      <div class="slider-wrap">
        <label>Tempo:</label>
        <input type="range" id="tempo" min="40" max="200" value="100" />
        <span class="slider-val" id="tempo-val">100 BPM</span>
      </div>
    </div>

    <div class="ctrl-row">
      <label>Başlangıç Ölçü:</label>
      <select id="loop-start"></select>
      <label>Bitiş Ölçü:</label>
      <select id="loop-end"></select>
    </div>

    <div class="info-grid">
      <div class="info-item"><span>Mevcut Ölçü:</span><span id="cur-measure">—</span></div>
      <div class="info-item"><span>Toplam Ölçü:</span><span id="total-measure">—</span></div>
      <div class="info-item"><span>Durum:</span><span id="play-status">Yükleniyor</span></div>
      <div class="info-item"><span>Tempo:</span><span id="bpm-info">100 BPM</span></div>
    </div>
  </div>
</div>

<footer>Vals – Ole Halen · Gitar Eğitim Platformu</footer>

<!-- OSMD -->
<script src="https://unpkg.com/opensheetmusicdisplay@1.9.9/build/opensheetmusicdisplay.min.js"></script>
<!-- Tone.js -->
<script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>

<script>
(function() {
  if (!localStorage.getItem('gitar_session')) {
    window.location.href = 'https://gitar.yunusgedik.com.tr/';
  }
})();

// ─── Değişkenler ───────────────────────────────────────────
let osmd, totalMeasures = 16;
let isPlaying = false, isLooping = false;
let bpm = 100;
let scheduledEvents = [];
let noteData = []; // { time, pitch, duration, measure }

// ─── Tone.js Sentezleyici (Nylon gitar benzeri) ────────────
const synth = new Tone.PolySynth(Tone.Synth, {
  oscillator: { type: 'triangle' },
  envelope: { attack: 0.005, decay: 0.3, sustain: 0.1, release: 1.2 },
  volume: -8
}).toDestination();

const reverb = new Tone.Reverb({ decay: 1.5, wet: 0.25 }).toDestination();
synth.connect(reverb);

// ─── Yardımcılar ───────────────────────────────────────────
function setStatus(msg, type = '') {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = type;
}

function populateSelects(total) {
  ['loop-start', 'loop-end'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '';
    for (let i = 1; i <= total; i++) {
      sel.innerHTML += `<option value="${i}" ${(id === 'loop-end' && i === total) ? 'selected' : ''}>${i}</option>`;
    }
  });
}

// MusicXML'den nota adımı → MIDI notası
function stepToMidi(step, octave, alter) {
  const base = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
  return (octave + 1) * 12 + base[step] + (alter || 0);
}

function midiToTone(midi) {
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const octave = Math.floor(midi / 12) - 1;
  return names[midi % 12] + octave;
}

// ─── OSMD Yükle & Notaları Parse Et ───────────────────────
async function initOSMD() {
  try {
    osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay('osmd-container', {
      autoResize: true,
      backend: 'svg',
      drawingParameters: 'default',
      drawCredits: false,
    });

    const res = await fetch('./Vals_-_Ole_Halen.musicxml');
    if (!res.ok) throw new Error('Dosya bulunamadı (' + res.status + ')');
    const xml = await res.text();

    await osmd.load(xml);
    osmd.render();

    // Toplam ölçü sayısı
    try { totalMeasures = osmd.sheet.sourceMeasures.length; } catch(e) { totalMeasures = 16; }
    document.getElementById('total-measure').textContent = totalMeasures;
    populateSelects(totalMeasures);

    // Notaları parse et (MusicXML'den direkt)
    parseNotesFromXML(xml);

    ['play-btn','stop-btn','loop-btn'].forEach(id => document.getElementById(id).disabled = false);
    setStatus('✅ ' + totalMeasures + ' ölçü yüklendi — Hazır!', 'ok');
    document.getElementById('play-status').textContent = 'Hazır';

  } catch(err) {
    console.error(err);
    setStatus('❌ ' + err.message + ' — musicxml dosyası HTML ile aynı klasörde olmalı', 'error');
  }
}

// ─── MusicXML'den notaları çıkart ─────────────────────────
function parseNotesFromXML(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'text/xml');
  const measures = doc.querySelectorAll('measure');
  noteData = [];

  let globalTime = 0; // saniye cinsinden
  const divisions = parseInt(doc.querySelector('divisions')?.textContent || 1);

  measures.forEach((measure, mIdx) => {
    const measureNotes = measure.querySelectorAll('note');
    let measureTime = globalTime;
    let measureDivisions = divisions;

    // Divisions güncellenmiş mi?
    const divEl = measure.querySelector('divisions');
    if (divEl) measureDivisions = parseInt(divEl.textContent);

    measureNotes.forEach(noteEl => {
      const isRest   = noteEl.querySelector('rest') !== null;
      const isChord  = noteEl.querySelector('chord') !== null;
      const dur      = parseInt(noteEl.querySelector('duration')?.textContent || 1);
      const durSec   = (dur / measureDivisions) * (60 / bpm) * 1; // 1 beat birim

      if (!isRest && !isChord) {
        const step   = noteEl.querySelector('step')?.textContent;
        const octave = parseInt(noteEl.querySelector('octave')?.textContent || 4);
        const alter  = parseInt(noteEl.querySelector('alter')?.textContent || 0);

        if (step) {
          const midi  = stepToMidi(step, octave, alter);
          const pitch = midiToTone(midi);
          noteData.push({
            time:    measureTime,
            pitch:   pitch,
            durSec:  durSec,
            measure: mIdx + 1
          });
        }
        measureTime += durSec;
      } else if (!isChord) {
        measureTime += durSec;
      }
    });

    globalTime = measureTime;
  });

  console.log('📝 Parse edilen nota sayısı:', noteData.length);
}

// ─── Notaları yeniden hesapla (tempo değişince) ────────────
function recalcNoteTimings() {
  if (!noteData.length) return;
  // BPM değişince tüm zamanları yeniden hesapla
  parseNotesFromXML._lastXML && parseNotesFromXML(_lastXML);
}

// ─── Çalma ────────────────────────────────────────────────
async function startPlaying() {
  await Tone.start(); // kullanıcı etkileşimi gerekiyor

  const startM = parseInt(document.getElementById('loop-start').value);
  const endM   = parseInt(document.getElementById('loop-end').value);

  stopPlaying();
  isPlaying = true;

  document.getElementById('play-btn').textContent = '⏸ Çalıyor';
  document.getElementById('play-btn').className   = 'btn green';
  document.getElementById('play-status').textContent = '▶ Oynatılıyor';

  playRange(startM, endM);
}

function playRange(startM, endM) {
  const tempoScale = 100 / bpm; // 100 BPM referans

  // Seçili ölçülerdeki notaları filtrele
  const filtered = noteData.filter(n => n.measure >= startM && n.measure <= endM);
  if (!filtered.length) return;

  // İlk notanın zamanını offset olarak al
  const timeOffset = filtered[0].time;
  const now = Tone.now() + 0.1;

  filtered.forEach(n => {
    const t    = now + (n.time - timeOffset) * tempoScale;
    const durS = Math.max(n.durSec * tempoScale * 0.9, 0.05);
    const ev   = Tone.Transport.schedule(() => {
      synth.triggerAttackRelease(n.pitch, durS, Tone.now());
      document.getElementById('cur-measure').textContent = n.measure;
    }, t - Tone.now());
    scheduledEvents.push(ev);
  });

  // Son notadan sonra bitir veya loop yap
  const lastNote = filtered[filtered.length - 1];
  const endTime  = now + (lastNote.time - timeOffset + lastNote.durSec) * tempoScale + 0.3;
  const finishEv = Tone.Transport.schedule(() => {
    if (!isPlaying) return;
    if (isLooping) {
      clearEvents();
      playRange(startM, endM);
    } else {
      stopPlaying();
      document.getElementById('play-status').textContent = '✓ Tamamlandı';
    }
  }, endTime - Tone.now());
  scheduledEvents.push(finishEv);

  if (Tone.Transport.state !== 'started') Tone.Transport.start();
}

function clearEvents() {
  scheduledEvents.forEach(id => Tone.Transport.clear(id));
  scheduledEvents = [];
}

function stopPlaying() {
  isPlaying = false;
  clearEvents();
  Tone.Transport.stop();
  synth.releaseAll();
  document.getElementById('play-btn').textContent = '▶ Çal';
  document.getElementById('play-btn').className   = 'btn primary';
  document.getElementById('cur-measure').textContent = '—';
  document.getElementById('play-status').textContent = 'Durduruldu';
}

// ─── Event Listener'lar ────────────────────────────────────
document.getElementById('play-btn').addEventListener('click', () => {
  if (isPlaying) stopPlaying();
  else startPlaying();
});

document.getElementById('stop-btn').addEventListener('click', stopPlaying);

document.getElementById('loop-btn').addEventListener('click', () => {
  isLooping = !isLooping;
  const btn = document.getElementById('loop-btn');
  btn.textContent = isLooping ? '🔄 Loop Açık' : '🔄 Loop Kapalı';
  btn.className   = isLooping ? 'btn green' : 'btn';
});

document.getElementById('tempo').addEventListener('input', e => {
  bpm = parseInt(e.target.value);
  document.getElementById('tempo-val').textContent = bpm + ' BPM';
  document.getElementById('bpm-info').textContent  = bpm + ' BPM';
  // Çalıyorsa yeniden başlat
  if (isPlaying) {
    const startM = parseInt(document.getElementById('loop-start').value);
    const endM   = parseInt(document.getElementById('loop-end').value);
    clearEvents();
    playRange(startM, endM);
  }
});

initOSMD();
</script>

<script type="module" src="/live-bar.js"></script>
</body>
</html>
