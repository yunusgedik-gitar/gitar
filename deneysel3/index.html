<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>alphaTab İnteraktif Müzik Çalar ve Nota Platformu</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: #faf6ed;
      color: #5a3e2b;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      background: #fff;
      border: 1.5px solid #e8e0d5;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 25px rgba(90,62,43,0.05);
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 1.5px solid #f2ece2;
      padding-bottom: 15px;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: #2c1f14;
    }
    header p {
      font-size: 0.9rem;
      color: #b09070;
      margin-top: 4px;
    }

    /* OYNATICI KONTROL PANELİ */
    .player-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      background: #fdfbf7;
      border: 1px solid #ebd3b8;
      padding: 12px 20px;
      border-radius: 14px;
      margin-bottom: 20px;
    }

    .btn-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alpha-btn {
      padding: 10px 16px;
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 10px;
      border: 1.5px solid #d4c4b0;
      background: #fff;
      color: #5a3e2b;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .alpha-btn:hover:not(:disabled) { background: #f5e6d3; border-color: #c4a88a; }
    .alpha-btn:active:not(:disabled) { transform: scale(0.96); }
    .alpha-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #play-btn.playing {
      background: #eaf3de;
      border-color: #6b8c42;
      color: #3b6d11;
    }

    /* Kanal / Enstrüman Seçici */
    .track-select-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .track-select-wrap label {
      font-size: 0.85rem;
      font-weight: 700;
      color: #8b7355;
    }
    .track-dropdown {
      padding: 8px 12px;
      font-family: inherit;
      border: 1.5px solid #d4c4b0;
      border-radius: 8px;
      background: #fff;
      color: #5a3e2b;
      font-weight: 600;
      outline: none;
      cursor: pointer;
    }

    /* NOTA EKRANI (VIEWER) */
    .alphatab-viewport {
      border: 1.5px solid #e8e0d5;
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
      position: relative;
      min-height: 300px;
    }

    /* Yükleniyor Katmanı */
    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(250, 246, 237, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 100;
      transition: opacity 0.3s ease;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #ebd3b8;
      border-top-color: #b8892a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SIHİRLİ TIMELINE VE NOTA BOYAMA CSS SINIFLARI ── */
    
    /* 1. O an çalınan dikey ölçü/periyot arka planı (Yeşil hat) */
    .at-cursor-bar {
      fill: rgba(59, 109, 17, 0.08) !important;
      background: rgba(59, 109, 17, 0.08) !important;
    }
    
    /* 2. O an basılan dikey çizgi/bar imleci */
    .at-cursor-beat {
      fill: #3b6d11 !important;
      stroke: #3b6d11 !important;
      opacity: 0.15;
    }

    /* 3. Tam o salisaniyede geçilen notaların başları ve sapları */
    .at-cursor-note, .at-selection-note {
      fill: #27ae60 !important;
      stroke: #27ae60 !important;
      font-weight: bold;
    }

    /* alphaTab'in kendi dahili imleç katmanı (Timeline çizgisi) */
    .at-player-cursor {
      border-left: 2px solid #3b6d11 !important;
      box-shadow: 0 0 10px rgba(59, 109, 17, 0.5);
      z-index: 10;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>🎸 alphaTab İnteraktif Nota Platformu</h1>
    <p>Vals – Ole Halen (Guitar Pro Oynatıcı Deneyimi)</p>
  </header>

  <div class="player-controls">
    <div class="btn-group">
      <button class="alpha-btn" id="play-btn" disabled><i class="fa-solid fa-play"></i> Çal</button>
      <button class="alpha-btn" id="stop-btn" disabled><i class="fa-solid fa-stop"></i> Durdur</button>
      <button class="alpha-btn" id="metronome-btn"><i class="fa-solid fa-drum"></i> Metronom</button>
    </div>

    <div class="btn-group">
      <button class="alpha-btn" id="speed-btn"><i class="fa-solid fa-gauge-high"></i> Hız: 1.0x</button>
    </div>

    <div class="track-select-wrap">
      <label for="track-select"><i class="fa-solid fa-guitar"></i> Enstrüman:</label>
      <select id="track-select" class="track-dropdown">
        <option>Yükleniyor...</option>
      </select>
    </div>
  </div>

  <div class="alphatab-viewport">
    <div id="loading" class="loading-overlay">
      <div class="spinner"></div>
      <p style="font-weight: 700; color: #8b7355;">Guitar Pro Dosyası ve Gitar Ses Bankası Yükleniyor...</p>
    </div>
    
    <div id="alphaTab"></div>
  </div>
</div>

<script>
  const el = document.getElementById('alphaTab');
  const playBtn = document.getElementById('play-btn');
  const stopBtn = document.getElementById('stop-btn');
  const speedBtn = document.getElementById('speed-btn');
  const metronomeBtn = document.getElementById('metronome-btn');
  const trackSelect = document.getElementById('track-select');
  const loading = document.getElementById('loading');

  let currentSpeed = 1.0;
  let isMetronomeActive = false;
  let currentScore = null; 

  // 1. ALPHATAB API INITIALIZE (TIMELINE AKTİF EDİLDİ)
  const api = new alphaTab.AlphaTabApi(el, {
    file: 'vals.gp', 
    player: {
      enablePlayer: true, 
      soundFont: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/soundfont/sonivox.sf2', 
      scrollElement: window,
      enableCursor: true // Motor seviyesinde imleç takibini açıyoruz kanka
    },
    display: {
      staveProfile: 'Default'
    },
    // Burası çok kritik: Çalma esnasında imlecin görsel güncellemelerini zorla tetikler
    useDisplayPlayer: true 
  });

  // 2. SES MOTORU VE YÜKLEME ETKİNLİKLERİ
  
  function handlePlayerReady() {
    loading.style.opacity = '0';
    setTimeout(() => loading.style.display = 'none', 300);
    playBtn.disabled = false;
    stopBtn.disabled = false;
    console.log("alphaTab Ses motoru ve Timeline sistemi hazır!");
  }

  function handleScoreLoad(score) {
    currentScore = score; 
    trackSelect.innerHTML = ''; 
    score.tracks.forEach((track) => {
      const option = document.createElement('option');
      option.value = track.index;
      option.textContent = track.name;
      trackSelect.appendChild(option);
    });
  }

  // Event bağlama kontrolleri
  if (api.playerReady) api.playerReady.on(handlePlayerReady);
  if (api.soundFontLoad) api.soundFontLoad.on(handlePlayerReady);
  if (api.soundFontLoaded) api.soundFontLoaded.on(handlePlayerReady);

  if (api.scoreLoad) api.scoreLoad.on(handleScoreLoad);
  if (api.scoreLoaded) api.scoreLoaded.on(handleScoreLoad);

  // Kanal değiştirme aksiyonu
  trackSelect.addEventListener('change', (e) => {
    const trackIndex = parseInt(e.target.value);
    if (currentScore && currentScore.tracks[trackIndex]) {
      api.renderTracks([currentScore.tracks[trackIndex]]); 
    }
  });

  // Çal / Duraklat mekanizması
  playBtn.addEventListener('click', () => {
    api.playPause();
  });

  // Play/Pause durum takibi ve görsel senkronizasyon
  if (api.playerStateChanged) {
    api.playerStateChanged.on((args) => {
      if (args.state === 1) { // 1 = Çalıyor
        playBtn.innerHTML = '<i class="fa-solid fa-pause"></i> Duraklat';
        playBtn.classList.add('playing');
      } else {
        playBtn.innerHTML = '<i class="fa-solid fa-play"></i> Çal';
        playBtn.classList.remove('playing');
      }
    });
  }

  // Şarkıyı durdurma düğmesi
  stopBtn.addEventListener('click', () => {
    api.stop();
  });

  // Hız döngüsü ayarlayıcı (0.75x - 1.0x - 1.25x - 1.5x)
  speedBtn.addEventListener('click', () => {
    if (currentSpeed === 1.0) currentSpeed = 1.25;
    else if (currentSpeed === 1.25) currentSpeed = 1.5;
    else if (currentSpeed === 1.5) currentSpeed = 0.75;
    else currentSpeed = 1.0;

    api.playbackRate = currentSpeed; 
    speedBtn.innerHTML = `<i class="fa-solid fa-gauge-high"></i> Hız: ${currentSpeed}x`;
  });

  // Metronom sesi aç/kapat
  metronomeBtn.addEventListener('click', () => {
    isMetronomeActive = !isMetronomeActive;
    api.metronomeVolume = isMetronomeActive ? 1.0 : 0.0; 
    
    if (isMetronomeActive) {
      metronomeBtn.style.background = '#eaf3de';
      metronomeBtn.style.borderColor = '#6b8c42';
    } else {
      metronomeBtn.style.background = '#fff';
      metronomeBtn.style.borderColor = '#d4c4b0';
    }
  });
</script>

</body>
</html>
