<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Guitar Pro Player</title>

<script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.5.3/dist/alphaTab.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#fafafa;
}

.topbar{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
background:white;
border-bottom:1px solid #ddd;
position:sticky;
top:0;
z-index:999;
}

button,select,input{
padding:8px;
}

#alphaTab{
padding:15px;
}

.measureBar{
display:flex;
flex-wrap:wrap;
gap:5px;
padding:10px;
border-top:1px solid #ddd;
background:white;
}

.measureBtn{
padding:5px 10px;
cursor:pointer;
}

.loopBox{
display:flex;
gap:5px;
align-items:center;
}

.at-cursor-bar{
fill:rgba(0,255,0,.15)!important;
}

.at-cursor-note{
fill:#00aa00!important;
stroke:#00aa00!important;
}
</style>
</head>
<body>

<div class="topbar">

<button id="playBtn">▶</button>
<button id="stopBtn">■</button>

<select id="speed">
<option value="0.25">0.25x</option>
<option value="0.5">0.5x</option>
<option value="0.75">0.75x</option>
<option value="1" selected>1x</option>
<option value="1.25">1.25x</option>
<option value="1.5">1.5x</option>
<option value="2">2x</option>
</select>

<select id="trackSelect"></select>

<button id="metroBtn">
Metronom
</button>

<div class="loopBox">
A:
<input id="loopStart" type="number" value="1" style="width:70px">

B:
<input id="loopEnd" type="number" value="4" style="width:70px">

<button id="loopBtn">
Loop Aç
</button>
</div>

</div>

<div id="alphaTab"></div>

<div id="measureBar" class="measureBar"></div>

<script>

let score;
let loopEnabled=false;

const api = new alphaTab.AlphaTabApi(
document.getElementById("alphaTab"),
{
file:"Vals - Ole Halen.gp",

player:{
enablePlayer:true,
soundFont:"https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.5.3/dist/soundfont/sonivox.sf2"
}
}
);

api.scoreLoaded.on(e=>{

score=e.score;

buildTracks();
buildMeasures();

});

function buildTracks(){

const sel=document.getElementById("trackSelect");
sel.innerHTML="";

score.tracks.forEach(track=>{

const o=document.createElement("option");

o.value=track.index;
o.textContent=track.name;

sel.appendChild(o);

});

}

document.getElementById("trackSelect")
.addEventListener("change",e=>{

const i=parseInt(e.target.value);

api.renderTracks(
[score.tracks[i]]
);

});

document.getElementById("playBtn")
.onclick=()=>api.playPause();

document.getElementById("stopBtn")
.onclick=()=>api.stop();

document.getElementById("speed")
.onchange=e=>{

api.playbackRate=
parseFloat(e.target.value);

};

let metro=false;

document.getElementById("metroBtn")
.onclick=()=>{

metro=!metro;

api.metronomeVolume=
metro?1:0;

};

function buildMeasures(){

const wrap=
document.getElementById("measureBar");

wrap.innerHTML="";

let total=0;

score.masterBars.forEach((bar,index)=>{

const b=document.createElement("button");

b.className="measureBtn";

b.textContent=index+1;

b.onclick=()=>{

api.tickPosition=
bar.start;

};

wrap.appendChild(b);

total++;

});

}

document.getElementById("loopBtn")
.onclick=()=>{

loopEnabled=!loopEnabled;

document.getElementById("loopBtn")
.innerText=
loopEnabled
? "Loop Kapat"
: "Loop Aç";

};

api.playerPositionChanged.on(pos=>{

if(!loopEnabled) return;

const a=
parseInt(
document.getElementById("loopStart").value
)-1;

const b=
parseInt(
document.getElementById("loopEnd").value
)-1;

if(
score &&
score.masterBars[b]
)
{
const endTick=
score.masterBars[b].start;

if(pos.currentTick>endTick)
{
api.tickPosition=
score.masterBars[a].start;
}
}

});

</script>

</body>
</html>
