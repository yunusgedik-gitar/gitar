<script>
  // Elementleri Seçelim
  const el = document.getElementById('alphaTab');
  const playBtn = document.getElementById('play-btn');
  const stopBtn = document.getElementById('stop-btn');
  const speedBtn = document.getElementById('speed-btn');
  const metronomeBtn = document.getElementById('metronome-btn');
  const trackSelect = document.getElementById('track-select');
  const loading = document.getElementById('loading');

  let currentSpeed = 1.0;
  let isMetronomeActive = false;
  let currentScore = null; // score nesnesini hafızada tutmak için global değişken

  // 1. ALPHATAB API AYARLARINI BAŞLATALIM (INITIALIZE)
  const api = new alphaTab.AlphaTabApi(el, {
    file: 'Vals - Ole Halen.gp', 
    player: {
      enablePlayer: true, 
      soundFont: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/soundfont/sonivox.sf2', 
      scrollElement: window 
    },
    display: {
      staveProfile: 'Default', 
    }
  });

  // 2. ETKİNLİKLER (EVENTS) & INTERACTION

  // Ses Motoru Çalmaya Tamamen Hazır Olduğunda Tetiklenir (Ses Sorununu Çözen Kısım)
  api.playerReady.on(() => {
    loading.style.opacity = '0';
    setTimeout(() => loading.style.display = 'none', 300);
    playBtn.disabled = false;
    stopBtn.disabled = false;
    console.log("Ses motoru ve SoundFont başarıyla yüklendi, çalmaya hazır!");
  });

  // Guitar Pro Dosyası Okunup İçindeki Kanallar Belirlenince Çalışır
  api.scoreLoad.on((score) => {
    currentScore = score; // global değişkene eşitleme yaptık kanka
    trackSelect.innerHTML = ''; 
    score.tracks.forEach((track) => {
      const option = document.createElement('option');
      option.value = track.index;
      option.textContent = track.name;
      trackSelect.appendChild(option);
    });
  });

  // Kullanıcı Dropdown'dan Enstrüman Değiştirirse Notayı Yeniden Çizer
  trackSelect.addEventListener('change', (e) => {
    const trackIndex = parseInt(e.target.value);
    if (currentScore && currentScore.tracks[trackIndex]) {
      api.renderTracks([currentScore.tracks[trackIndex]]); 
    }
  });

  // Oynat / Duraklat Butonu Kontrolü
  playBtn.addEventListener('click', () => {
    // Tarayıcının ses engelini aşmak için tıklama anında audio context'i canlandırır
    api.playPause();
  });

  // Çalma Durumu Değiştiğinde Buton Görselini Güncelle
  api.playerStateChanged.on((args) => {
    // 1 = Çalıyor, 0 = Durdu/Duraklatıldı
    if (args.state === 1) {
      playBtn.innerHTML = '<i class="fa-solid fa-pause"></i> Duraklat';
      playBtn.classList.add('playing');
    } else {
      playBtn.innerHTML = '<i class="fa-solid fa-play"></i> Çal';
      playBtn.classList.remove('playing');
    }
  });

  // Durdurma Butonu
  stopBtn.addEventListener('click', () => {
    api.stop();
  });

  // Hız Seçici Döngüsü (0.75x -> 1.0x -> 1.25x -> 1.5x)
  speedBtn.addEventListener('click', () => {
    if (currentSpeed === 1.0) currentSpeed = 1.25;
    else if (currentSpeed === 1.25) currentSpeed = 1.5;
    else if (currentSpeed === 1.5) currentSpeed = 0.75;
    else currentSpeed = 1.0;

    api.playbackRate = currentSpeed; 
    speedBtn.innerHTML = `<i class="fa-solid fa-gauge-high"></i> Hız: ${currentSpeed}x`;
  });

  // Metronom Aç / Kapat
  metronomeBtn.addEventListener('click', () => {
    isMetronomeActive = !isMetronomeActive;
    api.metronomeVolume = isMetronomeActive ? 1.0 : 0.0; 
    
    if (isMetronomeActive) {
      metronomeBtn.style.background = '#eaf3de';
      metronomeBtn.style.borderColor = '#6b8c42';
    } else {
      metronomeBtn.style.background = '#fff';
      metronomeBtn.style.borderColor = '#d4c4b0';
    }
  });
</script>
