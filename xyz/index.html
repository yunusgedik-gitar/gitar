<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nota Oynatıcı</title>
    <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.2.1/build/opensheetmusicdisplay.min.js"></script>
    <style>
        #osmd-container { width: 100%; overflow: auto; }
        .controls { margin-bottom: 20px; padding: 10px; background: #f0f0f0; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="osmd.zoom = osmd.zoom * 1.1; osmd.render();">Yakınlaştır</button>
        <button onclick="osmd.zoom = osmd.zoom * 0.9; osmd.render();">Uzaklaştır</button>
        <p>Nota görseli aşağıdadır:</p>
    </div>

    <div id="osmd-container"></div>

    <script>
        const osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay("osmd-container", {
            autoResize: true,
            backend: "svg", // Daha net görüntü için
        });

        // Kendi dosyanı yükle
        osmd.load("Grand Waltz - Anonim.musicxml").then(() => {
            osmd.render();
        });
    </script>
</body>
</html>
