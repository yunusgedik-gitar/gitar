    body { font-family: 'Lato', sans-serif; background: #faf6ed; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.2rem 1rem 2rem; color: #5a3e2b; }

    /* ── 🎸 TEL SEÇİM PANELİ STİLLERİ ── */

      background: #fff;

    .string-buttons {

      margin-bottom: 0.85rem;
    }
    .string-btn {

    .string-btn.all-btn {

    .string-btn.active {

    .start-exercise-btn {

      font-weight: 700;

    }

    @media (hover: hover) {
      .start-exercise-btn:hover:not(:disabled) { background: #ebd3b8; }
      .start-race-btn:hover:not(:disabled) { background: #f9d5d5; }

    .card { background: #fff; border: 1.5px solid #e8e0d5; border-radius: 20px; padding: 1.1rem 1.1rem 0.9rem; margin-bottom: 0.85rem; box-shadow: 0 4px 20px rgba(90,62,43,0.04); }

    .timer-badge { font-size: 0.85rem; font-weight: 700; color: #8b5a2b; background: #f5e6d3; padding: 5px 12px; border-radius: 12px; border: 1px solid #e8d5c0; }

    .q-title { text-align: center; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; color: #5a3e2b; }

    .hint-box { text-align: center; font-size: 1.15rem; font-weight: 700; color: #5a3e2b; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px; background: #fdfaf4; padding: 8px 12px; border-radius: 12px; border: 1px dashed #d4c4b0; }

    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
    .choice-card { background: #fff; border: 2px solid #e8e0d5; border-radius: 16px; padding: 8px 10px 6px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; position: relative; box-shadow: 0 2px 8px rgba(90,62,43,0.03); overflow: visible; -webkit-tap-highlight-color: transparent; outline: none; }
    @media (hover: hover) {

    }

    .choice-staff { width: 110px; height: 115px; margin: 4px 0 0; overflow: visible; }

    .choice-card.correct { background: #eaf3de; border-color: #6b8c42; }
    .choice-card.wrong { background: #fdf0f0; border-color: #c75b39; }

    .controls { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 8px; }
    .ctrl-btn { padding: 11px; font-size: 0.85rem; font-weight: 700; border-radius: 12px; border: 1.5px solid #d4c4b0; background: #fff; color: #5a3e2b; cursor: pointer; font-family: inherit; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px; }

      <button class="string-btn active note-toggle-btn" data-note="G4" onclick="toggleNote('G4')">Sol</button>
      <button class="string-btn active note-toggle-btn" data-note="A4" onclick="toggleNote('A4')">La</button>

<script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
<script>

  // 7 Temel Nota Bilgisi (C4 - B4 Arası Frekans ve Türkçe İsim Eşleşmeleri)
  const ALL_NOTES = {
    'C4': { name: 'Do', freq: 261.63, full: 'C4 (Do)' },
    'D4': { name: 'Re', freq: 293.66, full: 'D4 (Re)' },
    'E4': { name: 'Mi', freq: 329.63, full: 'E4 (Mi)' },
    'F4': { name: 'Fa', freq: 349.23, full: 'F4 (Fa)' },
    'G4': { name: 'Sol', freq: 392.00, full: 'G4 (Sol)' },
    'A4': { name: 'La', freq: 440.00, full: 'A4 (La)' },
    'B4': { name: 'Si', freq: 493.88, full: 'B4 (Si)' }
  };

  let selectedNotes = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4'];
  let currentQuestionIndex = 0;
  const totalQuestions = 10;
  let correctCount = 0;
  let wrongCount = 0;
  let currentNoteKey = '';
  let hasAnswered = false;
  
  let audioCtx = null;

  // Ses Çalma Fonksiyonu (Web Audio API)
  function playNoteAudio(frequency) {
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      // Gitara yakın daha tatlı bir tını için sine yerine triangle dalga boyu
      osc.type = 'triangle'; 
      osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

      // Çıtlamayı önlemek ve sustain hissi için yumuşak ses zarfı (Envelope)
      gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);

      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 1.2);

      // Buton görsel animasyon tetikleyicisi
      const listenBtn = document.getElementById('listen-btn');
      listenBtn.classList.add('playing');
      setTimeout(() => listenBtn.classList.remove('playing'), 1000);

    } catch (e) {
      console.error("Ses çalınamadı:", e);
    }
  }

  // Giriş Ekranı Nota Seçim mantığı
  function toggleNote(noteKey) {
    const btn = document.querySelector(`.note-toggle-btn[data-note="${noteKey}"]`);
    if (selectedNotes.includes(noteKey)) {
      if (selectedNotes.length === 1) {
        alert("En az bir nota seçili olmalıdır!");
        return;
      }
      selectedNotes = selectedNotes.filter(n => n !== noteKey);
      btn.classList.remove('active');
    } else {
      selectedNotes.push(noteKey);
      btn.classList.add('active');
    }
    checkAllBtnStatus();
  }

  function toggleAllNotes() {
    const allBtn = document.getElementById('btn-all');
    const noteBtns = document.querySelectorAll('.note-toggle-btn');
    
    if (selectedNotes.length === 7) {
      selectedNotes = ['C4']; // Varsayılan tek bırak
      noteBtns.forEach(btn => {
        if(btn.getAttribute('data-note') !== 'C4') btn.classList.remove('active');
      });
    } else {
      selectedNotes = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4'];
      noteBtns.forEach(btn => btn.classList.add('active'));
    }
    checkAllBtnStatus();
  }

  function checkAllBtnStatus() {
    const allBtn = document.getElementById('btn-all');
    if (selectedNotes.length === 7) {
      allBtn.classList.add('active');
    } else {
      allBtn.classList.remove('active');
    }
    document.getElementById('start-btn').disabled = selectedNotes.length === 0;
  }

  // Egzersizi Başlatma
  function startExercise() {
    if (selectedNotes.length === 0) return;
    
    document.getElementById('setup-area').style.display = 'none';
    document.getElementById('exercise-area').style.display = 'block';
    document.getElementById('result-area').style.display = 'none';
    
    currentQuestionIndex = 0;
    correctCount = 0;
    wrongCount = 0;
    
    loadQuestion();
  }

  // Yeni Soru Yükleme
  function loadQuestion() {
    hasAnswered = false;
    document.getElementById('next-btn').disabled = true;
    document.getElementById('feedback-message').className = 'message';
    document.getElementById('feedback-message').innerText = '';
    
    // Soru sayacı ve İlerleme Çubuğu güncelleme
    document.getElementById('question-counter').innerText = `Soru: ${currentQuestionIndex + 1} / ${totalQuestions}`;
    const progressPercent = (currentQuestionIndex / totalQuestions) * 100;
    document.getElementById('progress-bar-fill').style.width = `${progressPercent}%`;

    // Seçilen notalar arasından rastgele bir hedef nota belirleme
    const randomIndex = Math.floor(Math.random() * selectedNotes.length);
    currentNoteKey = selectedNotes[randomIndex];

    // Şıkları oluşturma: Her zaman hedef nota dahil toplam 4 benzersiz rastgele şık listele
    let choicePool = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4'];
    let choices = [currentNoteKey];
    
    choicePool = choicePool.filter(n => n !== currentNoteKey);
    while (choices.length < 4 && choicePool.length > 0) {
      const rIdx = Math.floor(Math.random() * choicePool.length);
      choices.push(choicePool[rIdx]);
      choicePool.splice(rIdx, 1);
    }
    
    // Şıkları kendi içinde karıştır (Randomize)
    choices.sort(() => Math.random() - 0.5);

    // Seçenek kartlarını HTML olarak basma (klavye-index kart yapısı)
    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    
    choices.forEach(noteKey => {
      const card = document.createElement('div');
      card.className = 'choice-card';
      card.setAttribute('data-note', noteKey);
      card.onclick = () => handleChoiceSelection(card, noteKey);
      
      card.innerHTML = `
        <div class="choice-name">${ALL_NOTES[noteKey].name}</div>
        <div class="choice-syllable">${noteKey}</div>
      `;
      container.appendChild(card);
    });

    // Soru gelir gelmez sesi otomatik çaldırıyoruz
    setTimeout(() => {
      playCurrentNote();
    }, 400);
  }

  function playCurrentNote() {
    if (!currentNoteKey) return;
    playNoteAudio(ALL_NOTES[currentNoteKey].freq);
  }

  // Kullanıcı Şık Seçim Algoritması (`klavye-index` birebir yapısı)
  function handleChoiceSelection(selectedCard, chosenNoteKey) {
    if (hasAnswered) return;
    hasAnswered = true;

    const cards = document.querySelectorAll('.choice-card');
    const feedback = document.getElementById('feedback-message');

    if (chosenNoteKey === currentNoteKey) {
      // Doğru Seçim
      selectedCard.classList.add('correct');
      feedback.className = 'message ok';
      feedback.innerHTML = `<i class="fa-solid fa-circle-check"></i> Doğru! Harika bir kulak.`;
      correctCount++;
    } else {
      // Yanlış Seçim
      selectedCard.classList.add('wrong');
      feedback.className = 'message no';
      feedback.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> Yanlış! Doğru cevap: <strong>${ALL_NOTES[currentNoteKey].name}</strong> olmalıydı.`;
      wrongCount++;

      // Doğru olan kartı da yeşil yakarak göster
      cards.forEach(card => {
        if (card.getAttribute('data-note') === currentNoteKey) {
          card.classList.add('correct');
        }
      });
    }

    // Diğer kartları devre dışı bırak
    cards.forEach(card => card.classList.add('disabled'));
    document.getElementById('next-btn').disabled = false;
  }

  // Sonraki Soru veya Bitirme
  function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < totalQuestions) {
      loadQuestion();
    } else {
      showResults();
    }
  }

  // Birebir Düello/Klavye Yapısında Sonuç Ekranı
  function showResults() {
    document.getElementById('exercise-area').style.display = 'none';
    document.getElementById('result-area').style.display = 'block';

    document.getElementById('stat-total').innerText = totalQuestions;
    document.getElementById('stat-correct').innerText = correctCount;
    document.getElementById('stat-wrong').innerText = wrongCount;
    
    const ratio = Math.round((correctCount / totalQuestions) * 100);
    document.getElementById('stat-ratio').innerText = `%${ratio}`;

    // Dinamik Koçluk Mesajı ve Rozet Ayarları
    const badge = document.getElementById('result-badge');
    const comment = document.getElementById('result-comment');

    if (ratio >= 80) {
      badge.innerText = "🏆 Mükemmel Kulak!";
      comment.innerText = `"Harika bir duyum seviyesi! İleri düzey solfej ve eşlik çalışmalarına tamamen hazırsınız. Yunus Hoca bu başarıdan gurur duyuyor! 🎵"`;
    } else if (ratio >= 50) {
      badge.innerText = "🤝 İyi Gelişim!";
      comment.innerText = `"Güzel sonuç, kulak hafızanız oturmaya başlamış. Birkaç pratikle hatasız bir seviyeye ulaşabilirsiniz. Çalışmaya devam! 🎸"`;
    } else {
      badge.innerText = "💪 Daha Çok Pratik!";
      comment.innerText = `"Notalar arasındaki frekans farklarına biraz daha odaklanarak tekrar deneyebilirsiniz. Her gün 5 dakika dinlemek algınızı uçuracaktır!"`;
    }
  }

  function exitExercise() {
    if (confirm("Alıştırmadan çıkmak istediğinize emin misiniz? İlerlemeniz kaybolacaktır.")) {
      restartSetup();
    }
  }

  function restartSetup() {
    document.getElementById('setup-area').style.display = 'block';
    document.getElementById('exercise-area').style.display = 'none';
    document.getElementById('result-area').style.display = 'none';
  }

</script>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js';
import {
  getDatabase, ref, set, get, update, remove,
  onValue, onDisconnect, runTransaction
} from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js';

const FIREBASE_CONFIG = {
  apiKey:"AIzaSyBkEd729B65y-NZIQ-sxScCgaEvlX-q7yA",
  authDomain:"gitar-yunus.firebaseapp.com",
  databaseURL:"https://gitar-yunus-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"gitar-yunus",
  storageBucket:"gitar-yunus.firebasestorage.app",
  messagingSenderId:"184803778782",
  appId:"1:184803778782:web:8f9fbeb4fe625eb386e24f"
};
const fbApp = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
const db = getDatabase(fbApp);

const mySid  = localStorage.getItem('gitar_session');
const myName = localStorage.getItem('gitar_student_name') || 'Öğrenci';

/* ── Düello Durum ── */
let dStrings   = new Set([1,2,3,4,5,6]);
let dRounds    = 5;
let myRole     = '';
let oppSid_    = '';
let oppName_   = '';
let roomCode_  = '';
let roomRef_   = null;
let onlineUnsub = null;
let roundUnsub  = null;
let statusUnsub = null;
let scoreUnsub  = null;
let myAnswered  = false;
let myScore_    = 0;
let oppScore_   = 0;
let cdTimer_    = null;
let currentRound_ = null;
let challengeExpiry_ = null;

function shuf(a){ return [...a].sort(()=>Math.random()-.5); }

/* ── Tel seçimi ── */
window.dToggleAll = ()=>{
  const a=document.getElementById('d-btn-all'),n=document.querySelectorAll('.d-str-btn');
  if(dStrings.size===6){dStrings.clear();a.classList.remove('active');n.forEach(b=>b.classList.remove('active'));}
  else{dStrings=new Set([1,2,3,4,5,6]);a.classList.add('active');n.forEach(b=>b.classList.add('active'));}
};
window.dToggleStr = num=>{
  const b=document.querySelector(`.d-str-btn[data-string="${num}"]`),a=document.getElementById('d-btn-all');
  if(dStrings.has(num)){dStrings.delete(num);b.classList.remove('active');}
  else{dStrings.add(num);b.classList.add('active');}
  dStrings.size===6?a.classList.add('active'):a.classList.remove('active');
};
window.selectDuelRounds = n=>{
  dRounds=n;
  document.querySelectorAll('.duel-round-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.rounds)===n));
};

/* ── Alan yönetimi ── */
function showOnly(id){
  ['setup-area','duel-setup-area','duel-waiting-area','duel-game-area','quiz-zone','result-zone']
    .forEach(x=>{ const e=document.getElementById(x); if(e) e.style.display='none'; });
  const t=document.getElementById(id); if(t) t.style.display='block';
}

/* ── Kurulum ── */
window.showDuelSetup = ()=>{
  showOnly('duel-setup-area');
  loadOnlinePlayers();
};
window.hideDuelSetup = ()=>{
  if(onlineUnsub){ onlineUnsub(); onlineUnsub=null; }
  showOnly('setup-area');
};

function loadOnlinePlayers(){
  if(onlineUnsub){ onlineUnsub(); onlineUnsub=null; }
  const listEl=document.getElementById('duel-online-list');
  onlineUnsub=onValue(ref(db,'online_users'),snap=>{
    const users=snap.val()||{};
    const others=Object.entries(users).filter(([sid])=>sid!==mySid);
    if(!others.length){
      listEl.innerHTML='<div class="duel-no-players">Şu an başka online oyuncu yok.</div>'; return;
    }
    listEl.innerHTML=others.map(([sid,u])=>`
      <div class="duel-online-row">
        <span><span class="online-dot"></span><span class="duel-online-name">${u.name}</span></span>
        <button class="duel-chal-btn" onclick="window.sendDuelChallenge('${sid}','${u.name.replace(/'/g,"\\'")}')">⚔️ Meydan Oku</button>
      </div>`).join('');
  });
}

/* ── Soru üretici (NOTES global olarak tanımlı) ── */
function makeDuelQuestion(strings){
  const FRET_CX={0:116,1:155,2:243,3:328,4:412};
  const STRING_CY={1:50,2:74,3:98,4:122,5:146,6:170};
  const pool=NOTES.filter(n=>strings.includes(n.string));
  const note=pool[Math.floor(Math.random()*pool.length)];
  const noteIdx=NOTES.indexOf(note);
  const wrongs=shuf(NOTES.filter(n=>n.name!==note.name)).slice(0,3);
  const wrongIdxs=wrongs.map(n=>NOTES.indexOf(n));
  return{noteIdx,noteName:note.name,string:note.string,fret:note.fret,choiceIdxs:shuf([noteIdx,...wrongIdxs])};
}

/* ── Davet gönderme ── */
window.sendDuelChallenge = async(toSid,toName)=>{
  if(dStrings.size===0){alert('En az bir tel seçin.');return;}
  if(onlineUnsub){onlineUnsub();onlineUnsub=null;}
  myRole='host'; oppSid_=toSid; oppName_=toName;
  roomCode_=Math.floor(100000+Math.random()*900000).toString();
  const firstQ=makeDuelQuestion([...dStrings]);
  roomRef_=ref(db,`duel_rooms/${roomCode_}`);
  await set(roomRef_,{
    host:{sid:mySid,name:myName}, guest:null, status:'waiting',
    config:{totalRounds:dRounds,strings:[...dStrings]},
    scores:{host:0,guest:0},
    round:{num:0,...firstQ,hostDone:false,guestDone:false,winner:null}
  });
  onDisconnect(roomRef_).update({status:'abandoned'});
  await set(ref(db,`duel_challenges/${toSid}`),{
    fromSid:mySid,fromName:myName,roomCode:roomCode_,
    status:'pending',strings:[...dStrings],totalRounds:dRounds,
    redirectTo:'/klavye/'
  });
  document.getElementById('duel-waiting-name').textContent=toName;
  showOnly('duel-waiting-area');

  const cref=ref(db,`duel_challenges/${toSid}`);
  const unsub=onValue(cref,snap=>{
    const c=snap.val(); if(!c) return;
    if(c.status==='accepted'){
      unsub(); clearTimeout(challengeExpiry_); oppName_=toName; beginDuelGame();
    } else if(c.status==='declined'){
      unsub(); clearTimeout(challengeExpiry_);
      remove(roomRef_);
      alert(`${toName} daveti reddetti.`);
      showOnly('setup-area');
    }
  });
  challengeExpiry_=setTimeout(async()=>{
    unsub();
    await remove(ref(db,`duel_challenges/${toSid}`));
    await remove(roomRef_);
    alert('Süre doldu, davet iptal edildi.');
    showOnly('setup-area');
  },30000);
};

window.cancelDuelChallenge = async()=>{
  clearTimeout(challengeExpiry_);
  if(oppSid_) await remove(ref(db,`duel_challenges/${oppSid_}`));
  if(roomRef_) await remove(roomRef_);
  showOnly('setup-area');
};

/* ── Handoff: başka sayfadan kabul edilen davet ── */
function checkHandoff(){
  const raw=localStorage.getItem('gitar_duel_handoff'); if(!raw) return false;
  localStorage.removeItem('gitar_duel_handoff');
  try{
    const h=JSON.parse(raw);
    myRole='guest'; roomCode_=h.roomCode; oppSid_=h.oppSid; oppName_=h.oppName;
    dStrings=new Set(h.strings); dRounds=h.totalRounds;
    roomRef_=ref(db,`duel_rooms/${roomCode_}`);
    beginDuelGame(); return true;
  }catch(e){return false;}
}

/* ── Oyun başlat ── */
function beginDuelGame(){
  myScore_=0; oppScore_=0;
  document.getElementById('dscore-me-name').textContent=myName;
  document.getElementById('dscore-opp-name').textContent=oppName_;
  document.getElementById('dscore-me').textContent='0';
  document.getElementById('dscore-opp').textContent='0';
  showOnly('duel-game-area');

  scoreUnsub=onValue(ref(db,`duel_rooms/${roomCode_}/scores`),snap=>{
    const s=snap.val(); if(!s) return;
    myScore_=myRole==='host'?s.host:s.guest;
    oppScore_=myRole==='host'?s.guest:s.host;
    document.getElementById('dscore-me').textContent=myScore_;
    document.getElementById('dscore-opp').textContent=oppScore_;
  });

  statusUnsub=onValue(ref(db,`duel_rooms/${roomCode_}/status`),snap=>{
    const s=snap.val();
    if(s==='abandoned'){cleanupDuel();alert('Rakibiniz oyundan ayrıldı.');showOnly('setup-area');}
    if(s==='finished') endDuel();
  });

  // İki taraf da ilk soruyu açmaya çalışır — transaction biri alır
  get(ref(db,`duel_rooms/${roomCode_}/config`)).then(snap=>{
    tryAdvance(0,snap.val());
  });
  listenRound();
}

/* ── Tur dinleyicisi ── */
function listenRound(){
  if(roundUnsub){roundUnsub();roundUnsub=null;}
  roundUnsub=onValue(ref(db,`duel_rooms/${roomCode_}/round`),snap=>{
    const r=snap.val(); if(!r||r.num===0) return;

    // Yeni tur numarası geldiyse her zaman soruyu göster
    if(!currentRound_ || currentRound_.num !== r.num){
      showDuelQ(r);
    }

    // Tur bitti — şıkları kilitle ve sonucu göster
    if(r.winner||(r.hostDone&&r.guestDone)){
      showRoundResult(r);
    }
  });
}

/* ── Soru göster ── */
function showDuelQ(round){
  myAnswered=false; currentRound_=round;
  const note=NOTES[round.noteIdx];
  document.getElementById('duel-round-label').textContent=`Tur ${round.num} / ${dRounds}`;
  document.getElementById('duel-hint-text').innerHTML=
    `💡 <span class="hint-string-badge">${note.string}</span>. Tel – <span class="hint-fret-text">${ROMAN_FRETS[note.fret]}</span>`;
  document.getElementById('duel-message').textContent='';
  document.getElementById('duel-message').className='message';
  document.getElementById('duel-cd-wrap').style.display='none';

  const FRET_CX={0:116,1:155,2:243,3:328,4:412};
  const STRING_CY={1:50,2:74,3:98,4:122,5:146,6:170};
  const hl=document.getElementById('duel-fret-hl');
  const hq=document.getElementById('duel-fret-hl-q');
  hl.setAttribute('cx',FRET_CX[note.fret]); hl.setAttribute('cy',STRING_CY[note.string]);
  hq.setAttribute('x',FRET_CX[note.fret]);  hq.setAttribute('y',STRING_CY[note.string]);
  hl.style.display=''; hq.style.display='';

  const box=document.getElementById('duel-choices'); box.innerHTML='';
  round.choiceIdxs.forEach(idx=>{
    const noteObj=NOTES[idx];
    const card=document.createElement('div');
    card.className='choice-card';
    card.dataset.noteName=noteObj.name;
    card.onclick=()=>duelAnswer(noteObj.name,card,round.num);
    const staffDiv=document.createElement('div'); staffDiv.className='choice-staff';
    card.appendChild(staffDiv); box.appendChild(card);
    drawMiniStaff(staffDiv,noteObj);
  });
}

/* ── Cevap ver ── */
function duelAnswer(name,card,roundNum){
  if(myAnswered||!currentRound_) return;
  myAnswered=true;
  document.querySelectorAll('#duel-choices .choice-card').forEach(c=>{c.classList.add('disabled');c.onclick=null;});
  const correct=name===currentRound_.noteName;
  card.classList.add(correct?'correct':'wrong');
  runTransaction(ref(db,`duel_rooms/${roomCode_}/round`),r=>{
    if(!r||r.num!==roundNum) return;
    if(correct){ if(r.winner) return; return{...r,winner:myRole,winnerName:myName,[myRole+'Done']:true}; }
    return{...r,[myRole+'Done']:true};
  }).then(({committed,snapshot})=>{
    if(committed&&correct){
      const v=snapshot.val();
      if(v&&v.winner===myRole) runTransaction(ref(db,`duel_rooms/${roomCode_}/scores/${myRole}`),s=>(s||0)+1);
    }
  });
}

/* ── Tur sonucu ── */
function showRoundResult(round){
  // Tüm şıkları kilitle, doğruyu data-note-name ile bul
  document.querySelectorAll('#duel-choices .choice-card').forEach(c=>{
    c.classList.add('disabled'); c.onclick=null;
    if(c.dataset.noteName===round.noteName) c.classList.add('correct');
  });
  const msg=document.getElementById('duel-message');
  if(round.winner===myRole){msg.textContent='🏅 Sen kazandın!';msg.className='message iwin';}
  else if(round.winner){msg.textContent=`😤 ${round.winnerName} daha hızlıydı!`;msg.className='message opwin';}
  else{msg.textContent='😅 İkisi de yanlış! Puan yok.';msg.className='message nobody';}

  if(document.getElementById('duel-cd-wrap').style.display==='flex') return;
  startCd(()=>{
    get(ref(db,`duel_rooms/${roomCode_}/config`)).then(snap=>{
      tryAdvance(round.num,snap.val());
    });
  });
}

/* ── Sonraki soruya geç (her iki taraf dener, transaction seçer) ── */
function tryAdvance(fromNum,config){
  const nextNum=fromNum+1;
  if(nextNum>dRounds){
    runTransaction(ref(db,`duel_rooms/${roomCode_}/status`),s=>{ if(s==='finished') return; return 'finished'; });
    return;
  }
  const strings=config?config.strings:[...dStrings];
  const q=makeDuelQuestion(strings);
  runTransaction(ref(db,`duel_rooms/${roomCode_}/round`),r=>{
    if(!r||r.num!==fromNum) return;
    return{num:nextNum,...q,hostDone:false,guestDone:false,winner:null};
  });
}

/* ── Geri sayım ── */
function startCd(onDone){
  if(cdTimer_) clearInterval(cdTimer_);
  let n=3;
  const wrap=document.getElementById('duel-cd-wrap'),el=document.getElementById('duel-cd-num');
  wrap.style.display='flex'; setCdNum(el,n);
  cdTimer_=setInterval(()=>{
    n--; if(n<=0){clearInterval(cdTimer_);wrap.style.display='none';if(onDone)onDone();}
    else setCdNum(el,n);
  },1000);
}
function setCdNum(el,n){el.textContent=n;el.classList.remove('duel-cd-circle');void el.offsetWidth;el.classList.add('duel-cd-circle');}

/* ── Cleanup ── */
function cleanupDuel(){
  if(cdTimer_) clearInterval(cdTimer_);
  if(roundUnsub){roundUnsub();roundUnsub=null;}
  if(statusUnsub){statusUnsub();statusUnsub=null;}
  if(scoreUnsub){scoreUnsub();scoreUnsub=null;}
}

/* ── Oyun sonu ── */
function endDuel(){
  cleanupDuel();
  const my=myScore_, op=oppScore_;
  let badge,comment;
  if(my>op){badge=`🏆 Kazanan: ${myName}`;comment=`${myName} perdeleri daha hızlı okudu! ${oppName_} daha çok çalışmalı 💪`;}
  else if(op>my){badge=`🏆 Kazanan: ${oppName_}`;comment=`${oppName_} bu sefer daha hızlıydı! Bir dahaki sefere ${myName} 🎸`;}
  else{badge='🤝 Beraberlik!';comment='İkisi de aynı seviyede! Yunus Hoca ikinizden de memnun 🎵';}
  const mc=my>=op?'win':'lose',oc=op>=my?'win':'lose';
  const wrap=document.getElementById('app-wrap');
  wrap.innerHTML=`
    <div class="duel-result-wrap">
      <h2>⚔️ Düello Bitti!</h2>
      <div class="duel-winner-badge">${badge}</div>
      <div class="duel-final-scores">
        <div class="dfsc"><div class="dfsc-name">${myName}</div><div class="dfsc-num ${mc}">${my}</div></div>
        <div class="dfsc-vs">VS</div>
        <div class="dfsc"><div class="dfsc-name">${oppName_}</div><div class="dfsc-num ${oc}">${op}</div></div>
      </div>
      <p class="duel-comment">"${comment}"</p>
      <div style="display:flex;gap:10px;">
        <button class="start-exercise-btn start-duel-btn" onclick="location.reload()">🔄 Tekrar Oyna</button>
        <button class="start-exercise-btn" onclick="location.href='https://gitar.yunusgedik.com.tr/'">🏠 Ana Sayfa</button>
      </div>
    </div>`;
}

window.leaveDuelGame = async()=>{
  cleanupDuel();
  if(roomRef_) await update(roomRef_,{status:'abandoned'});
  showOnly('setup-area');
};

/* ── Sayfa yüklenince handoff kontrolü ── */
checkHandoff();
</script>
