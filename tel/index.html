<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <title>Tel Okuma Egzersizi – Klasik Gitar</title>
  <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,600;1,400&family=Lato:wght=300;400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: #faf6ed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.4rem 1rem 2.5rem;
      color: #5a3e2b;
      overflow-x: hidden; 
    }

    header { text-align: center; margin-bottom: 1.2rem; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.45rem; font-weight: 600; color: #5a3e2b; }
    header p  { font-size: 0.8rem; color: #b09070; margin-top: 0.3rem; font-style: italic; }

    #app { width: 100%; max-width: 520px; }

    /* ── 🎛️ PANEL (TEL SEÇİMİ) STİLLERİ ── */
    .filter-card {
      background: #fff;
      border: 1.5px solid #e8e0d5;
      border-radius: 20px;
      padding: 1.2rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(90,62,43,0.04);
      text-align: center;
    }
    .filter-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #b09070;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.85rem;
    }
    .string-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 0.95rem;
    }
    .string-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1.5px solid #d4c4b0;
      background: #fff;
      color: #5a3e2b;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }
    .string-btn.all-btn {
      width: auto;
      height: 44px;
      padding: 0 16px;
      border-radius: 22px;
      font-size: 0.85rem;
      text-transform: uppercase;
    }
    .string-btn.active {
      background: #5a3e2b;
      border-color: #5a3e2b;
      color: #fff;
      box-shadow: 0 4px 10px rgba(90,62,43,0.15);
    }
    
    .action-buttons-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .start-exercise-btn {
      width: 100%;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 12px;
      border: 1.5px solid #d4a373;
      background: #f5e6d3;
      color: #5a3e2b;
      cursor: pointer;
      transition: all 0.12s;
    }
    @media (hover: hover) {
      .start-exercise-btn:hover:not(:disabled) { background: #ebd3b8; }
      .start-race-btn:hover:not(:disabled) { background: #f9d5d5; }
      .back-to-menu-btn:hover { background: #f5e6d3; border-color: #d4c4b0; color: #5a3e2b; }
      #listen-btn:hover { background: #f5e6d3; border-color: #c4a88a; }
      .ctrl-btn:hover:not(:disabled) { background: #f5e6d3; }
      .ctrl-btn.primary:hover:not(:disabled) { background: #ebd3b8; }
    }

    .start-race-btn {
      border: 1.5px solid #e24b4a;
      background: #fdf0f0;
      color: #a32d2d;
    }

    .start-exercise-btn:disabled {
      background: #f5f5f5;
      border-color: #e0e0e0;
      color: #b0b0b0;
      cursor: not-allowed;
    }

    /* ── ⏱️ GERİ SAYIM SAYACI VE MENÜ ÜST ALANI ── */
    .top-bar-exercise {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 0.85rem;
      min-height: 38px;
    }

    .back-to-menu-btn {
      font-size: 0.85rem;
      font-weight: 700;
      color: #b09070;
      background: #fff;
      border: 1.5px solid #e8e0d5;
      padding: 6px 14px;
      border-radius: 30px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
      box-shadow: 0 2px 8px rgba(90,62,43,0.02);
    }
    #timer-display {
      font-size: 1rem;
      font-weight: 700;
      color: #e24b4a;
      background: #fdf0f0;
      border: 1.5px solid #f9d5d5;
      padding: 6px 16px;
      border-radius: 30px;
      display: none; 
      box-shadow: 0 2px 8px rgba(226,75,74,0.05);
    }

    /* ── 🎯 EGZERSİZ ALANI STİLLERİ ── */
    #exercise-area { display: none; text-align: center; } 

    .card {
      background: #fff;
      border: 1.5px solid #e8e0d5;
      border-radius: 20px;
      padding: 1.25rem 1.25rem 0.5rem; 
      margin-bottom: 0.85rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 210px; 
      justify-content: space-between; 
      box-shadow: 0 4px 20px rgba(90,62,43,0.04);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 0.25rem;
    }

    .card-label { font-size: 0.8rem; color: #b09070; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

    #listen-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.8rem; padding: 6px 14px;
      border-radius: 10px; border: 1.5px solid #d4c4b0;
      background: #fff; color: #5a3e2b; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: all 0.12s;
    }
    #listen-btn.playing { border-color: #6b8c42; color: #3b6d11; background: #eaf3de; }

    #notation { width: 100%; display: flex; justify-content: center; overflow: hidden; }
    #notation svg { max-width: 100%; }

    #hint { font-size: 0.78rem; color: #b09070; text-align: center; margin-bottom: 1rem; font-style: italic; }

    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 0.75rem; }

    .cbtn {
      padding: 14px 10px; 
      font-size: 1.6rem;   
      font-weight: 700;    
      border-radius: 14px; 
      border: 1.5px solid #d4c4b0;
      background: #fff; 
      color: #5a3e2b;
      cursor: pointer; 
      text-align: center; 
      font-family: inherit;
      transition: background 0.12s, border-color 0.12s, transform 0.08s, box-shadow 0.12s;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
      outline: none;
    }
    @media (hover: hover) {
      .cbtn:hover:not(:disabled) { background: #f5e6d3; border-color: #c4a88a; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(90,62,43,0.08); }
    }
    .cbtn:active:not(:disabled) { transform: scale(0.97); box-shadow: none; }
    .cbtn.correct { background: #eaf3de; border-color: #6b8c42; color: #3b6d11; }
    .cbtn.wrong   { background: #fdf0f0; border-color: #e24b4a; color: #a32d2d; }
    .cbtn:disabled { cursor: default; transform: none; box-shadow: none; }

    #feedback { text-align: center; font-size: 0.92rem; font-weight: 700; min-height: 22px; margin-bottom: 0.6rem; padding: 0 5px; }
    #feedback.ok { color: #3b6d11; }
    #feedback.no { color: #a32d2d; }

    #progress-bar-wrap { height: 5px; background: #ede6d8; border-radius: 3px; margin-bottom: 0.8rem; overflow: hidden; display: none; border: 1px solid #e0d8c8; }
    #progress-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #8cb85f, #52a050); border-radius: 3px; transition: width 0.5s linear; }

    /* ── 🎛完整控制中心 ── */
    .controls {
      display: flex;
      gap: 10px;
      margin-top: 0.85rem;
      width: 100%;
    }
    .ctrl-btn {
      flex: 1;
      padding: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 12px;
      border: 1.5px solid #d4c4b0;
      background: #fff;
      color: #5a3e2b;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
    }
    .ctrl-btn.primary {
      background: #f5e6d3;
      border-color: #d4a373;
    }
    .ctrl-btn:disabled {
      background: #f5f5f5;
      border-color: #e0e0e0;
      color: #b0b0b0;
      cursor: not-allowed;
    }

    /* ── 🏆 SKOR EKRANI STİLİ ── */
    .result-card {
      background: #fff;
      border: 2px solid #d4a373;
      border-radius: 20px;
      padding: 2.2rem 1.5rem;
      text-align: center;
      box-shadow: 0 8px 30px rgba(90,62,43,0.1);
    }
    .result-card h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #5a3e2b; margin-bottom: 0.5rem; }
    .result-rank { font-size: 1.25rem; font-weight: 700; color: #d4a373; background: #faf6ed; display: inline-block; padding: 6px 18px; border-radius: 30px; margin-top: 0.5rem; border: 1px dashed #d4c4b0; }
    .result-score { font-size: 3.5rem; font-weight: 700; color: #6b8c42; margin: 0.8rem 0; }
    .result-text { font-size: 0.95rem; color: #5a3e2b; margin-bottom: 1.5rem; font-style: italic; line-height: 1.4rem; padding: 0 10px; }

    footer { margin-top: 2.5rem; font-size: 0.75rem; color: #c4b5a0; text-align: center; }

    @media (max-width: 400px) {
      .cbtn { font-size: 1.4rem; padding: 12px 6px; }
      .controls { flex-direction: column; gap: 8px; }
    }
	.site-footer {
  display: flex;
  justify-content: center;
  gap: 22px;
  margin-top: 2.5rem;
}

.site-footer a {
  color: #b0a392;
  font-size: 2.2rem;
  transition: all .2s ease;
}

.site-footer a:hover {
  color: var(--gold);
  transform: translateY(-2px);
}
  </style>
</head>
<body>

  <header>
    <h1>🎸 Tel Egzersizi</h1>
    <p>İyi ki Yunus Hoca var! :)</p>
  </header>

  <div id="app">
    
    <div id="setup-area" class="filter-card">
	<div style="display:flex; justify-content:flex-end; margin-bottom:0.5rem;">
    <button class="back-to-menu-btn" onclick="window.location.href='https://gitar.yunusgedik.com.tr/'">🏠 Başa Dön</button>
      </div>
      <div class="filter-title">Çalışılacak Telleri Seçin</div>
      <div class="string-buttons">
        <button id="btn-all" class="string-btn all-btn active" onclick="toggleAllStrings()">HEPSİ</button>
        <button class="string-btn active string-num-btn" data-string="1" onclick="toggleString(1)">①</button>
        <button class="string-btn active string-num-btn" data-string="2" onclick="toggleString(2)">②</button>
        <button class="string-btn active string-num-btn" data-string="3" onclick="toggleString(3)">③</button>
        <button class="string-btn active string-num-btn" data-string="4" onclick="toggleString(4)">④</button>
        <button class="string-btn active string-num-btn" data-string="5" onclick="toggleString(5)">⑤</button>
        <button class="string-btn active string-num-btn" data-string="6" onclick="toggleString(6)">⑥</button>
      </div>
      <div class="action-buttons-wrap">
        <button id="start-btn" class="start-exercise-btn" onclick="startExercise('practice')">Egzersize Başla (Zamansız) 🎯</button>
        <button id="race-btn" class="start-exercise-btn start-race-btn" onclick="startExercise('race')">Yarışmaya Başla (40 Saniye) 🏆</button>
      </div>
    </div>

    <div id="exercise-area">
      
      <div class="top-bar-exercise">
        <button class="back-to-menu-btn" onclick="goBackToMenu()">← Menüye Dön</button>
        <div id="timer-display">Kalan Süre: 40</div>
      </div>

      <div class="card">
        <div class="card-top">
          <span id="card-question-title" class="card-label">Bu Nota Hangi Telde?</span>
          <button id="listen-btn" onclick="replay()">🔊 Dinle</button>
        </div>
        <div id="notation"></div>
      </div>

      <p id="hint">🔊 Notayı duymak için "Dinle" tuşuna basın</p>

      <div class="choices" id="choices"></div>
      <div id="feedback"></div>
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
      
      <div class="controls">
        <button class="ctrl-btn" onclick="resetQuiz()">↻ Tekrar</button>
        <button class="ctrl-btn primary" id="next-btn" onclick="manualNext()" disabled>Sonraki Soru →</button>
        <button class="ctrl-btn" onclick="window.location.href='https://gitar.yunusgedik.com.tr/'">🏠 Başa Dön</button>
      </div>
    </div>

  </div>

  <footer class="site-footer">
  <a href="https://www.instagram.com/yunusgedik_/" target="_blank" aria-label="Instagram">
    <i class="fa-brands fa-instagram"></i>
  </a>

  <a href="https://x.com/yunusgedik_" target="_blank" aria-label="X">
    <i class="fa-brands fa-x-twitter"></i>
  </a>

  <a href="https://www.youtube.com/yunusgedik" target="_blank" aria-label="YouTube">
    <i class="fa-brands fa-youtube"></i>
  </a>
</footer>

  <script>
    const NOTES = [
      { key:'e/3', freq:164.81, sol:'⑥', stringVal:6, name:'Mi' },
      { key:'f/3', freq:174.61, sol:'⑥', stringVal:6, name:'Fa' },
      { key:'g/3', freq:196.00, sol:'⑥', stringVal:6, name:'Sol' },
      
      { key:'a/3', freq:220.00, sol:'⑤', stringVal:5, name:'La' },
      { key:'b/3', freq:246.94, sol:'⑤', stringVal:5, name:'Si' },
      { key:'c/4', freq:261.63, sol:'⑤', stringVal:5, name:'Do' },
      
      { key:'d/4', freq:293.66, sol:'④', stringVal:4, name:'Re' },
      { key:'e/4', freq:329.63, sol:'④', stringVal:4, name:'Mi' },
      { key:'f/4', freq:349.23, sol:'④', stringVal:4, name:'Fa' },
      
      { key:'g/4', freq:392.00, sol:'③', stringVal:3, name:'Sol' },
      { key:'a/4', freq:440.00, sol:'③', stringVal:3, name:'La' },
      
      { key:'b/4', freq:493.88, sol:'②', stringVal:2, name:'Si' },
      { key:'c/5', freq:523.25, sol:'②', stringVal:2, name:'Do' },
      { key:'d/5', freq:587.33, sol:'②', stringVal:2, name:'Re' },
      
      { key:'e/5', freq:659.25, sol:'①', stringVal:1, name:'Mi' },
      { key:'f/5', freq:698.46, sol:'①', stringVal:1, name:'Fa' },
      { key:'g/5', freq:783.99, sol:'①', stringVal:1, name:'Sol' },
      { key:'a/5', freq:880.00, sol:'①', stringVal:1, name:'La' },
      { key:'b/5', freq:987.77, sol:'①', stringVal:1, name:'Si' },
    ];
    
    const ALL_SOL = ['①','②','③','④','⑤','⑥'];
    
    const ERROR_MESSAGES = [
      "Yazıklar olsun!",
      "Kulaklarımız kanadı...",
      "Sende hiç utanma yok mu yaa",
      "Instagram'dan ekle beni seni engellim",
      "Tüm başarılar Yunus Hocadan, bunun gibi hatalar ise senden..",
      "Yunus Hoca bunu görmemiş olsun...",
      "Gitarı yavaşça yere bırak...",
      "Sen daha iyi enstrümanlara layıksın",
      "Aynen knk aynen sensin",
      "Iyyy yine mi hata",
      "Ağır popçusun belli knk",
      "Lâ havle..",
      "Sen en iyisi flüt çal knk",
	  "Tekrar deneme, yeter.",
	  "Bir yerde bırakmak lazım sanki",
	  "Bir durun olsun beea",
	  "Sen öyle bil aynen",
	  "En sevmediğim öğrencim naber",
	  "Ex'den Next olur senden öğrenci olmaz :D"
    ];

    let selectedStrings = new Set([1, 2, 3, 4, 5, 6]);
    let filteredNotes = [];

    let audioCtx = null, current = null, answered = false, interacted = false;
    let autoTimer = null;
    
    let currentMode = 'practice'; 
    let gameTimer = null;
    let timeLeft = 40;
    let correctCount = 0;
    let STUDENTS = [
      { id: 's01', name: 'Dr. Yunus GEDİK' }
    ];

    function toggleAllStrings() {
      const allBtn = document.getElementById('btn-all');
      const numBtns = document.querySelectorAll('.string-num-btn');
      
      if (selectedStrings.size === 6) {
        selectedStrings.clear();
        allBtn.classList.remove('active');
        numBtns.forEach(b => b.classList.remove('active'));
      } else {
        selectedStrings = new Set([1, 2, 3, 4, 5, 6]);
        allBtn.classList.add('active');
        numBtns.forEach(b => b.classList.add('active'));
      }
      checkStartButton();
    }

    function toggleString(num) {
      const btn = document.querySelector(`.string-num-btn[data-string="${num}"]`);
      const allBtn = document.getElementById('btn-all');
      
      if (selectedStrings.has(num)) {
        selectedStrings.delete(num);
        btn.classList.remove('active');
      } else {
        selectedStrings.add(num);
        btn.classList.add('active');
      }
      
      if (selectedStrings.size === 6) {
        allBtn.classList.add('active');
      } else {
        allBtn.classList.remove('active');
      }
      checkStartButton();
    }

    function checkStartButton() {
      const startBtn = document.getElementById('start-btn');
      const raceBtn = document.getElementById('race-btn');
      const isZero = selectedStrings.size === 0;
      startBtn.disabled = isZero;
      raceBtn.disabled = isZero;
    }

    function startExercise(mode) {
      filteredNotes = NOTES.filter(n => selectedStrings.has(n.stringVal));
      if (filteredNotes.length === 0) return;

      currentMode = mode;
      document.getElementById('setup-area').style.display = 'none';
      document.getElementById('exercise-area').style.display = 'block';
      
      if (currentMode === 'race') {
        timeLeft = 40;
        correctCount = 0;
        document.getElementById('timer-display').style.display = 'inline-block';
        document.getElementById('timer-display').textContent = 'Kalan Süre: ' + timeLeft;
        startGameTimer();
      } else {
        document.getElementById('timer-display').style.display = 'none';
      }
      
      nextCard();
      document.getElementById('exercise-area').scrollIntoView({ behavior: 'smooth' });
    }

    function goBackToMenu() {
      if (gameTimer) {
        clearInterval(gameTimer);
        gameTimer = null;
      }
      clearAutoTimer();
      
      document.getElementById('exercise-area').style.display = 'none';
      document.getElementById('setup-area').style.display = 'block';
      document.getElementById('setup-area').scrollIntoView({ behavior: 'smooth' });
    }

    function resetQuiz() {
      if (gameTimer) {
        clearInterval(gameTimer);
        gameTimer = null;
      }
      clearAutoTimer();
      startExercise(currentMode);
    }

    function startGameTimer() {
      if (gameTimer) clearInterval(gameTimer);
      
      gameTimer = setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) {
          document.getElementById('timer-display').textContent = 'Süre Bitti!';
          clearInterval(gameTimer);
          endGame();
        } else {
          document.getElementById('timer-display').textContent = 'Kalan Süre: ' + timeLeft;
        }
      }, 1000);
    }

    function endGame() {
      clearAutoTimer();
      const appContainer = document.getElementById('app');
      
      let rankName = "";
      let comment = "";

      if (correctCount >= 20) {
        rankName = "🏆 Master Gitarist 1 Numara!";
        comment = "İnanılmaz! Parmaklar ve kulak uçuyor! Yunus Hoca gözyaşları içinde seni ayakta alkışlıyor! 🎸";
      } else if (correctCount >= 15) {
        rankName = "🔥 Sahne Sanatçısı";
        comment = "Teller tıkır tıkır çözülüyor, parmaklar ısındı! Artık kulis kartını hak ettin kanka.";
      } else if (correctCount >= 10) {
        rankName = "⚡ Ritim Gitarist";
        comment = "Solo atamıyorsun ama arkada fena akor basmıyorsun hani. Bir tık daha hızlansan solist seni fark edecek.";
      } else if (correctCount >= 5) {
        rankName = "🎸 Akustikçi Popçu";
        comment = "Sahilde 'Akdeniz Akşamları' çalmaktan öteye geçemedin ama bir umut var. Teller seni çağırıyor kanka!";
      } else {
        rankName = "🐢 Kaplumbağa Gitarist";
        comment = "Gitarı yavaşça yere bırak ve tellere bir daha dokunma kanka... Hızın evlere şenlik!";
      }

      appContainer.innerHTML = `
        <div class="result-card">
          <h2>Yarışma Tamamlandı! 🏁</h2>
          <div class="result-rank">${rankName}</div>
          <div class="result-score">${correctCount} Doğru</div>
          <p class="result-text">"${comment}"</p>
          <button class="start-exercise-btn" onclick="window.location.reload()">Yeniden Dene 🔄</button>
        </div>
      `;
    }

    function shuffle(a){ return [...a].sort(()=>Math.random()-0.5); }

    function getAudio(){
      if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      return audioCtx;
    }

    function playNote(freq){
      try {
        const ctx = getAudio();
        if(ctx.state==='suspended') ctx.resume();
        const master = ctx.createGain();
        const now = ctx.currentTime;
        master.gain.setValueAtTime(0, now);
        master.gain.linearRampToValueAtTime(0.55, now+0.006);
        master.gain.exponentialRampToValueAtTime(0.001, now+2.2);
        master.connect(ctx.destination);
        [[1,0.5],[2,0.28],[3,0.12],[4,0.06]].forEach(([m,v])=>{
          const o=ctx.createOscillator(), g=ctx.createGain();
          o.type='sine'; o.frequency.value=freq*m; g.gain.value=v;
          o.connect(g); g.connect(master); o.start(now); o.stop(now+2.2);
        });
        const btn=document.getElementById('listen-btn');
        btn.classList.add('playing');
        setTimeout(()=>btn.classList.remove('playing'),600);
      } catch(e){}
    }

    function replay(){
      interacted=true;
      document.getElementById('hint').style.display='none';
      if(current) playNote(current.freq);
    }

    function drawNote(noteKey){
      const { Renderer, Stave, StaveNote, Voice, Formatter } = Vex.Flow;
      const container = document.getElementById('notation');
      container.innerHTML = '';
      
      const containerWidth = container.offsetWidth || 460;
      const scaleFactor = 1.45;
      const H = 150; 
      
      const renderer = new Renderer(container, Renderer.Backends.SVG);
      renderer.resize(containerWidth, H);
      
      const ctx = renderer.getContext();
      ctx.scale(scaleFactor, scaleFactor);
      
      const scaledWidth = containerWidth / scaleFactor;
      const staveW = Math.min(180, scaledWidth - 40);
      const staveX = (scaledWidth - staveW) / 2;
      
      const stave = new Stave(staveX, -18, staveW);
      stave.addClef('treble');
      stave.setContext(ctx).draw();
      
      const sn = new StaveNote({ keys:[noteKey], duration:'w' });
      const voice = new Voice({ num_beats:4, beat_value:4 });
      voice.addTickables([sn]);
      
      new Formatter().joinVoices([voice]).format([voice], staveW - 50);
      voice.draw(ctx, stave);
    }

    function clearAutoTimer(){
      if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; }
      document.getElementById('progress-bar-wrap').style.display='none';
    }

    function startAutoAdvance(){
      const wrap = document.getElementById('progress-bar-wrap');
      const bar  = document.getElementById('progress-bar');
      wrap.style.display = 'block';
      bar.style.width = '100%';
      bar.style.transition = 'none';
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          bar.style.transition = 'width 0.5s linear';
          bar.style.width = '0%';
        });
      });
      autoTimer = setTimeout(()=>{ clearAutoTimer(); nextCard(); }, 500);
    }

    function manualNext() { 
      if(currentMode === 'race' && timeLeft <= 0) return;
      clearAutoTimer(); 
      nextCard(); 
    }

    function nextCard(){
      if (currentMode === 'race' && timeLeft <= 0) return;
      
      answered = false;
      if(document.activeElement) document.activeElement.blur();
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = '';
      
      document.getElementById('next-btn').disabled = true; 
      clearAutoTimer();

      current = filteredNotes[Math.floor(Math.random() * filteredNotes.length)];
      
      document.getElementById('card-question-title').textContent = `"${current.name}" Notası Hangi Telde?`;

      const wrongs = shuffle(ALL_SOL.filter(s=>s!==current.sol)).slice(0,3);
      const choices = shuffle([current.sol, ...wrongs]);

      drawNote(current.key);
      if(interacted) setTimeout(()=>playNote(current.freq), 280);

      const box = document.getElementById('choices');
      box.innerHTML = '';
      choices.forEach(sol=>{
        const btn = document.createElement('button');
        btn.className = 'cbtn';
        btn.textContent = sol;
        btn.onclick = ()=>answer(sol, btn);
        box.appendChild(btn);
      });
    }

    function answer(sol, btn){
      if(answered) return;
      if(currentMode === 'race' && timeLeft <= 0) return;
      
      answered = true;
      interacted = true;
      document.getElementById('hint').style.display='none';
      document.querySelectorAll('.cbtn').forEach(b=>b.disabled=true);
      const fb = document.getElementById('feedback');
      
      document.getElementById('next-btn').disabled = false; 
      
      if(sol===current.sol){
        if(currentMode === 'race') {
          correctCount++; 
        }
        btn.className='cbtn correct';
        btn.blur();
        fb.textContent='✓ Doğru!';
        fb.className='ok';
        playNote(current.freq);
        startAutoAdvance();
      } else {
        btn.className='cbtn wrong';
        
        const randomMsg = ERROR_MESSAGES[Math.floor(Math.random() * ERROR_MESSAGES.length)];
        fb.textContent = '✗ ' + randomMsg + ' — Doğrusu: ' + current.sol;
        
        fb.className='no';
        document.querySelectorAll('.cbtn').forEach(b=>{
          if(b.textContent===current.sol) b.className='cbtn correct';
        });
      }
    }

    (function init() {
      const sid = localStorage.getItem('gitar_session');
      if (!sid) {
        window.location.href = 'https://gitar.yunusgedik.com.tr/';
        return;
      }
    })();
  </script>
<script type="module" src="/live-bar.js"></script>
