<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <title>Gitar Klavyesi – I. Pozisyon (Bas)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'Lato', sans-serif; background: #faf6ed; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.2rem 1rem 2rem; color: #5a3e2b; }
    header { text-align: center; margin-bottom: 0.5rem; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 600; color: #5a3e2b; }
    #app-wrap { width: 100%; max-width: 600px; }

    /* ── TEL SEÇİM PANELİ STİLLERİ ── */
    .filter-card {
      background: #fff;
      border: 1.5px solid #e8e0d5;
      border-radius: 20px;
      padding: 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(90,62,43,0.04);
      text-align: center;
    }
    .filter-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #b09070;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }
    .string-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 0.85rem;
    }
    .string-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1.5px solid #d4c4b0;
      background: #fff;
      color: #5a3e2b;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }
    .string-btn.all-btn {
      width: auto;
      height: 42px;
      padding: 0 16px;
      border-radius: 20px;
      font-size: 0.9rem;
    }
    .string-btn.active {
      background: #5a3e2b;
      border-color: #5a3e2b;
      color: #fff;
      box-shadow: 0 4px 10px rgba(90,62,43,0.2);
    }
    .action-buttons-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .start-exercise-btn {
      width: 100%;
      padding: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 12px;
      border: 1.5px solid #d4a373;
      background: #f5e6d3;
      color: #5a3e2b;
      cursor: pointer;
      transition: all 0.12s;
    }
    .start-race-btn {
      border: 1.5px solid #e24b4a;
      background: #fdf0f0;
      color: #a32d2d;
    }
    .start-exercise-btn:disabled {
      background: #f5f5f5;
      border-color: #ddd;
      color: #aaa;
      cursor: not-allowed;
    }
    .back-to-menu-btn {
      font-size: 0.85rem;
      font-weight: 700;
      color: #b09070;
      background: #fff;
      border: 1.5px solid #e8e0d5;
      padding: 6px 14px;
      border-radius: 30px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
      box-shadow: 0 2px 8px rgba(90,62,43,0.02);
    }

    /* ── OYUN VE KART STİLLERİ ── */
    .card { background: #fff; border: 1.5px solid #e8e0d5; border-radius: 20px; padding: 1.1rem 1.1rem 0.9rem; margin-bottom: 0.85rem; box-shadow: 0 4px 20px rgba(90,62,43,0.04); }
    .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; gap: 8px; }

    #listen-btn { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; padding: 6px 14px; border-radius: 20px; border: 1.5px solid #d4a373; background: #fff; color: #8b5a2b; cursor: pointer; font-family: inherit; font-weight: 600; transition: all 0.2s; }
    #listen-btn.playing { background: #eaf3de; border-color: #6b8c42; color: #3b6d11; }
    
    @media (hover: hover) {
      #listen-btn:hover { background: #f5e6d3; }
      .ctrl-btn:hover { background: #f5e6d3; border-color: #c4a88a; }
      .ctrl-btn.primary:hover { background: #ebd3b8; }
      .start-exercise-btn:hover:not(:disabled) { background: #ebd3b8; }
      .start-race-btn:hover:not(:disabled) { background: #f9d5d5; }
      .back-to-menu-btn:hover { background: #f5e6d3; border-color: #d4c4b0; color: #5a3e2b; }
    }

    .timer-badge { font-size: 0.85rem; font-weight: 700; color: #8b5a2b; background: #f5e6d3; padding: 5px 12px; border-radius: 12px; border: 1px solid #e8d5c0; white-space: nowrap; }

    .hint-box { text-align: center; font-size: 1.15rem; font-weight: 700; color: #5a3e2b; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px; background: #fdfaf4; padding: 8px 12px; border-radius: 12px; border: 1px dashed #d4c4b0; }
    .hint-string-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: #8b5a2b; color: #fff; border-radius: 50%; font-size: 0.95rem; font-weight: 700; }
    .hint-fret-text { color: #b37d4e; background: #f5e6d3; padding: 2px 10px; border-radius: 6px; }

    .guitar-wrap { width: 100%; display: flex; justify-content: center; align-items: center; margin: 0 auto 0.5rem; }
    .guitar-wrap svg { display: block; width: 100%; max-width: 440px; height: auto; }

    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
    .choice-card { background: #fff; border: 2px solid #e8e0d5; border-radius: 16px; padding: 8px 10px 6px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; position: relative; box-shadow: 0 2px 8px rgba(90,62,43,0.03); overflow: visible; -webkit-tap-highlight-color: transparent; outline: none; }
    @media (hover: hover) {
      .choice-card:hover:not(.disabled):not(.correct):not(.wrong) { border-color: #d4a373; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(90,62,43,0.1); }
    }
    .choice-card:active:not(.disabled) { transform: scale(0.98); }
    .choice-staff { width: 110px; height: 115px; margin: 4px 0 0; overflow: visible; }
    .choice-staff svg { max-width: 100%; height: auto; overflow: visible; }
    .choice-card.correct { background: #eaf3de; border-color: #6b8c42; }
    .choice-card.wrong { background: #fdf0f0; border-color: #c75b39; }
    .choice-card.disabled { cursor: default; opacity: 0.92; }

    .message { text-align: center; font-size: 0.9rem; font-weight: 700; color: #8b6b4e; margin-bottom: 0.65rem; min-height: 22px; }

    #auto-bar-wrap { height: 3px; background: #e0ddd6; border-radius: 2px; margin-bottom: 0.65rem; overflow: hidden; display: none; }
    #auto-bar { height: 100%; width: 100%; background: #6b8c42; border-radius: 2px; transition: width 1s linear; }

    .progress-area { display: flex; align-items: center; margin-bottom: 1.2rem; }
    .progress-track { flex: 1; height: 10px; background: #ede6d8; border-radius: 5px; overflow: hidden; border: 1px solid #e0d8c8; }
    .progress-fill { height: 100%; width: 0%; background: #8cb85f; border-radius: 5px; transition: width 0.4s ease; }

    /* Orijinal referanstaki gibi tekli ve tam genişlikte buton kontrolü */
    .controls { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .ctrl-btn { padding: 11px; font-size: 0.85rem; font-weight: 700; border-radius: 12px; border: 1.5px solid #d4c4b0; background: #fff; color: #5a3e2b; cursor: pointer; font-family: inherit; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px; width: 100%; }
    .ctrl-btn.primary { background: #f5e6d3; border-color: #d4a373; }
    .ctrl-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .result-screen { display: none; text-align: center; padding: 1.5rem 1rem; }
    .result-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #6b8c42; margin-bottom: 1rem; }
    .result-stats { background: #fdfaf4; border: 1.5px dashed #d4c4b0; border-radius: 16px; padding: 1.2rem; margin-bottom: 1.5rem; text-align: left; }
    .stat-row { display: flex; justify-content: space-between; font-size: 1.1rem; padding: 8px 0; border-bottom: 1px dashed #e8e0d5; color: #5a3e2b; }
    .stat-row:last-child { border-bottom: none; }
    .stat-val { font-weight: 700; color: #8b5a2b; }
    .stat-val.correct-val { color: #6b8c42; }
    .stat-val.wrong-val { color: #c75b39; }

    @media (max-width: 420px) {
      .choices { gap: 8px; }
      .choice-card { padding: 10px 6px; }
      .choice-staff { width: 90px; height: 100px; }
    }
    .site-footer {
      display: flex;
      justify-content: center;
      gap: 22px;
      margin-top: 2.5rem;
    }
    .site-footer a {
      color: #b0a392;
      font-size: 2.2rem;
      transition: all .2s ease;
    }
    .site-footer a:hover {
      color: #d4a373;
      transform: translateY(-2px);
    }
  </style>
</head>

<script>
(function() {
  const sid = localStorage.getItem('gitar_session');
  if (!sid) window.location.href = 'https://gitar.yunusgedik.com.tr/';
})();

const NOTES = [
  { id:'s1f0', string:1, fret:0, name:'Sol', freq:98.00,  key:'g/3' },
  { id:'s1f2', string:1, fret:2, name:'La',  freq:110.00, key:'a/3' },
  { id:'s2f0', string:2, fret:0, name:'Re',  freq:73.42,  key:'d/3' },
  { id:'s2f2', string:2, fret:2, name:'Mi',  freq:82.41,  key:'e/3' },
  { id:'s2f3', string:2, fret:3, name:'Fa',  freq:87.31,  key:'f/3' },
  { id:'s3f0', string:3, fret:0, name:'La',  freq:55.00,  key:'a/2' },
  { id:'s3f2', string:3, fret:2, name:'Si',  freq:61.74,  key:'b/2' },
  { id:'s3f3', string:3, fret:3, name:'Do',  freq:65.41,  key:'c/3' },
  { id:'s4f0', string:4, fret:0, name:'Mi',  freq:41.20,  key:'e/2' },
  { id:'s4f1', string:4, fret:1, name:'Fa',  freq:43.65,  key:'f/2' },
  { id:'s4f3', string:4, fret:3, name:'Sol', freq:49.00,  key:'g/2' }
];

// Klavyedeki doğal sıraya göre (frekans küçükten büyüğe) tüm pozisyonların id listesi.
// "Yanaşık şık bloğu" bu sıra üzerinden seçilir.
const ALL_POSITIONS = [...NOTES].sort((a, b) => a.freq - b.freq).map(n => n.id);

const ROMAN_FRETS = { 0:'Boş Tel', 1:'I. Perde', 2:'II. Perde', 3:'III. Perde', 4:'IV. Perde' };
const ERR = [
  "Yazıklar olsun!",
  "Kulaklarımız kanadı...",
  "Sende hiç utanma yok mu yaa",
  "Instagram'dan ekle beni seni engellim",
  "Tüm başarılar Yunus Hocadan, bunun gibi hatalar ise senden..",
  "Yunus Hoca bunu görmemiş olsun...",
  "Gitarı yavaşça yere bırak...",
  "Sen daha iyi enstrümanlara layıksın",
  "Aynen knk aynen sensin",
  "Iyyy yine mi hata",
  "Ağır popçusun belli knk",
  "Lâ havle..",
  "Sen en iyisi flüt çal knk",
  "Tekrar deneme, yeter.",
  "Bir yerde bırakmak lazım sanki",
  "Bir durun olsun beea",
  "Sen öyle bil aynen",
  "En sevmediğim öğrencim naber",
  "Ex'den Next olur senden öğrenci olmaz :D"
];

const FRET_CX = { 0:116, 1:155, 2:243, 3:328, 4:412 };
const STRING_CY = { 1:36, 2:60, 3:84, 4:108 };
const TOTAL_QUESTIONS_COUNT = 12;

let audioCtx=null, current=null, answered=false, interacted=false, autoTimer=null;
let correctCount=0, wrongCount=0, startTime=null, timerInterval=null;

let selectedStrings = new Set([1, 2, 3, 4]);
let filteredNotes = [];
let currentMode = 'practice';
let gameTimer = null;
let timeLeft = 40;
let currentIndex = 0;

function shuffle(a) { return [...a].sort(() => Math.random() - 0.5); }

// Pozisyon bazlı yanlış sayacı — soru seçiminde ağırlık olarak kullanılır
let missCounts = {};
let prevPositionId = null;

// Bir sonraki soru pozisyonunu seçer:
// 1) Bir önceki soruyla aynı pozisyon (tel+perde) ASLA peş peşe gelmez (havuzda başka seçenek varsa).
//    Not: Aynı isimli farklı pozisyonlar (örn. Sol③ ve Sol①) ardışık SAYILMAZ, sadece tıpatıp aynı pozisyon sayılır.
// 2) Daha önce yanlış yapılmış pozisyonlar, doğru yapılanlara göre 7 kat daha sık çıkar.
function pickNextQuestionPosition(pool) {
  let candidates = pool;
  if (prevPositionId && pool.length > 1) {
    candidates = pool.filter(n => n.id !== prevPositionId);
  }
  if (candidates.length === 0) candidates = pool;

  const weights = candidates.map(n => 1 + 6 * (missCounts[n.id] || 0)); // yanlış başına +6 -> doğruya göre 7 kat
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < candidates.length; i++) {
    r -= weights[i];
    if (r <= 0) return candidates[i];
  }
  return candidates[candidates.length - 1];
}

// Doğru cevabı içeren, ALL_POSITIONS (klavye sırasına göre) YANAŞIK (ardışık) bir pozisyon bloğu döndürür.
// Blok içinde nota ADI asla tekrar etmez (örn. Sol③ ve Sol① aynı blokta birlikte çıkamaz) — gerekirse blok küçültülür.
function pickAdjacentChoiceBlock(correctId, pool) {
  const poolIds = new Set(pool.map(n => n.id));
  const availablePositions = ALL_POSITIONS.filter(id => poolIds.has(id));
  const idx = availablePositions.indexOf(correctId);
  const maxBlockSize = Math.min(4, availablePositions.length);

  // En büyük blok boyutundan başlayıp, isim çakışması olmayan bir blok bulana kadar küçült
  for (let blockSize = maxBlockSize; blockSize >= 1; blockSize--) {
    const minStart = Math.max(0, idx - (blockSize - 1));
    const maxStart = Math.min(idx, availablePositions.length - blockSize);
    const possibleStarts = [];
    for (let s = minStart; s <= maxStart; s++) {
      const blockIds = availablePositions.slice(s, s + blockSize);
      const blockNames = blockIds.map(id => NOTES.find(n => n.id === id).name);
      if (new Set(blockNames).size === blockNames.length) {
        possibleStarts.push(s); // isim çakışması yok, geçerli aday
      }
    }
    if (possibleStarts.length > 0) {
      const start = possibleStarts[Math.floor(Math.random() * possibleStarts.length)];
      const blockIds = availablePositions.slice(start, start + blockSize);
      return blockIds.map(id => NOTES.find(n => n.id === id));
    }
  }

  // Son çare: sadece doğru cevabı döndür (teorik olarak buraya düşmemeli)
  return [NOTES.find(n => n.id === correctId)];
}

function toggleAllStrings() {
  const allBtn = document.getElementById('btn-all');
  const numBtns = document.querySelectorAll('.string-num-btn');
  if (selectedStrings.size === 4) {
    selectedStrings.clear();
    allBtn.classList.remove('active');
    numBtns.forEach(b => b.classList.remove('active'));
  } else {
    selectedStrings = new Set([1, 2, 3, 4]);
    allBtn.classList.add('active');
    numBtns.forEach(b => b.classList.add('active'));
  }
  checkStartButton();
}

function toggleString(num) {
  const btn = document.querySelector(`.string-num-btn[data-string="${num}"]`);
  const allBtn = document.getElementById('btn-all');
  if (selectedStrings.has(num)) {
    selectedStrings.delete(num);
    btn.classList.remove('active');
  } else {
    selectedStrings.add(num);
    btn.classList.add('active');
  }
  if (selectedStrings.size === 4) {
    allBtn.classList.add('active');
  } else {
    allBtn.classList.remove('active');
  }
  checkStartButton();
}

function checkStartButton() {
  const startBtn = document.getElementById('start-btn');
  const raceBtn = document.getElementById('race-btn');
  const isZero = selectedStrings.size === 0;
  startBtn.disabled = isZero;
  raceBtn.disabled = isZero;
}

function startExercise(mode) {
  filteredNotes = NOTES.filter(n => selectedStrings.has(n.string));
  if (filteredNotes.length === 0) return;

  currentMode = mode;
  prevPositionId = null;
  document.getElementById('setup-area').style.display = 'none';
  document.getElementById('quiz-zone').style.display = 'block';
  document.getElementById('result-zone').style.display = 'none';

  correctCount = 0;
  wrongCount = 0;
  currentIndex = 0;
  answered = false;

  if (currentMode === 'race') {
    timeLeft = 40;
    document.getElementById('timer-display').textContent = 'Kalan Süre: ' + timeLeft;
    startGameTimer();
  } else {
    document.getElementById('timer-display').textContent = 'Süre: 00:00';
    startTimer();
  }

  nextQuestion();
}

function goBackToMenu() {
  if (timerInterval) clearInterval(timerInterval);
  if (gameTimer) clearInterval(gameTimer);
  clearAutoTimer();
  document.getElementById('quiz-zone').style.display = 'none';
  document.getElementById('result-zone').style.display = 'none';
  document.getElementById('setup-area').style.display = 'block';
}

function startGameTimer() {
  if (gameTimer) clearInterval(gameTimer);
  gameTimer = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) {
      document.getElementById('timer-display').textContent = 'Süre Bitti!';
      clearInterval(gameTimer);
      showFinalResults();
    } else {
      document.getElementById('timer-display').textContent = 'Kalan Süre: ' + timeLeft;
    }
  }, 1000);
}

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playGuitar(freq) {
  try {
    const ctx = getAudio();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    const master = ctx.createGain();
    master.connect(ctx.destination);

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = freq * 2.8; filter.Q.value = 0.7;
    filter.connect(master);

    const osc = ctx.createOscillator(); osc.type = 'triangle'; osc.frequency.value = freq;
    const og = ctx.createGain();
    og.gain.setValueAtTime(0, now); og.gain.linearRampToValueAtTime(0.45, now + 0.006); og.gain.exponentialRampToValueAtTime(0.001, now + 2.2);
    osc.connect(og); og.connect(filter); osc.start(now); osc.stop(now + 2.2);

    const sine = ctx.createOscillator(); sine.type = 'sine'; sine.frequency.value = freq;
    const sg = ctx.createGain();
    sg.gain.setValueAtTime(0, now); sg.gain.linearRampToValueAtTime(0.25, now + 0.006); sg.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
    sine.connect(sg); sg.connect(filter); sine.start(now); sine.stop(now + 1.8);

    [2, 3, 4].forEach(h => {
      const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq * h;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.1 / h, now + 0.005); g.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
      o.connect(g); g.connect(filter); o.start(now); o.stop(now + 1.2);
    });

    master.gain.setValueAtTime(0.75, now); master.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
    const btn = document.getElementById('listen-btn');
    btn.classList.add('playing'); setTimeout(() => btn.classList.remove('playing'), 700);
  } catch(e) {}
}

function replay() { interacted = true; if (current) playGuitar(current.freq); }

function moveHighlight(stringN, fretN) {
  const cx = FRET_CX[fretN], cy = STRING_CY[stringN];
  const dot = document.getElementById('fret-highlight');
  const qtxt = document.getElementById('fret-highlight-q');
  dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
  qtxt.setAttribute('x', cx); qtxt.setAttribute('y', cy);
  dot.style.display = ''; qtxt.style.display = '';
}

function drawMiniStaff(div, noteObj) {
  div.innerHTML = '';
  try {
    const { Renderer, Stave, StaveNote, Voice, Formatter } = Vex.Flow;
    const renderer = new Renderer(div, Renderer.Backends.SVG);
    renderer.resize(110, 115);
    const ctx = renderer.getContext();
    const stave = new Stave(0, -10, 110);
    stave.addClef('bass').setContext(ctx).draw();
    const note = new StaveNote({ keys: [noteObj.key], clef: 'bass', duration: 'w' });
    const voice = new Voice({ num_beats: 4, beat_value: 4 });
    voice.addTickables([note]);
    new Formatter().joinVoices([voice]).format([voice], 85);
    voice.draw(ctx, stave);
  } catch(e) { console.log(e); }
}

function startTimer() {
  startTime = Date.now();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('timer-display').textContent = 'Süre: ' + String(Math.floor(s / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
  }, 1000);
}

function clearAutoTimer() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  document.getElementById('auto-bar-wrap').style.display = 'none';
}

function startAutoAdvance() {
  const wrap = document.getElementById('auto-bar-wrap'), bar = document.getElementById('auto-bar');
  wrap.style.display = 'block'; bar.style.width = '100%'; bar.style.transition = 'none';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    bar.style.transition = 'width 1s linear'; bar.style.width = '0%';
  }));
  autoTimer = setTimeout(() => { clearAutoTimer(); nextQuestion(); }, 1000);
}

function manualNext() {
  if (currentMode === 'race' && timeLeft <= 0) return;
  clearAutoTimer();
  nextQuestion();
}

function showFinalResults() {
  if (timerInterval) clearInterval(timerInterval);
  if (gameTimer) clearInterval(gameTimer);
  clearAutoTimer();

  document.getElementById('quiz-zone').style.display = 'none';
  document.getElementById('result-zone').style.display = 'block';
  
  const statsBox = document.getElementById('result-stats');
  const commentTxt = document.getElementById('result-comment');

  if (currentMode === 'race') {
    document.querySelector('.result-title').textContent = "Yarışma Tamamlandı! 🏁";
    let rankName = "";
    let comment = "";

    if (correctCount >= 20) {
      rankName = "🏆 Master Basçı 1 Numara!";
      comment = "İnanılmaz! Parmaklar ve kulak uçuyor! Yunus Hoca gözyaşları içinde seni ayakta alkışlıyor! 🎸";
    } else if (correctCount >= 15) {
      rankName = "🔥 Sahne Sanatçısı";
      comment = "Notalar tıkır tıkır çözülüyor, gözler ve duyum hızlandı! Artık kulis kartını hak ettin kanka.";
    } else if (correctCount >= 10) {
      rankName = "⚡ Groove Basçı";
      comment = "Solo atamıyorsun belki ama harika groove tutuyorsun hani! Bir tık daha hızlansan solist seni fark edecek.";
    } else if (correctCount >= 5) {
      rankName = "🎸 Sahildeki Akustikçi";
      comment = "Sahilde 'Akdeniz Akşamları'na bas bas eşlik etmekten öteye geçemedin ama bir umut var kanka!";
    } else {
      rankName = "🐢 Kaplumbağa Basçı";
      comment = "Gitarı yavaşça yere bırak ve tellere bir daha dokunma kanka... Hızın tam evlere şenlik!";
    }

    statsBox.innerHTML = `
      <div class="stat-row"><span>Unvan:</span><span class="stat-val" style="color:#d4a373">${rankName}</span></div>
      <div class="stat-row"><span>Doğru Cevap:</span><span class="stat-val correct-val">${correctCount} Doğru</span></div>
    `;
    commentTxt.innerHTML = `"${comment}"`;
  } else {
    document.querySelector('.result-title').textContent = "🎉 Test Tamamlandı!";
    const s = Math.floor((Date.now() - startTime) / 1000);
    const mins = Math.floor(s / 60), secs = s % 60;
    statsBox.innerHTML = `
      <div class="stat-row"><span>Toplam Süre:</span><span class="stat-val">${mins > 0 ? mins + ' dk ' + secs + ' sn' : secs + ' sn'}</span></div>
      <div class="stat-row"><span>Doğru Cevap:</span><span class="stat-val correct-val">${correctCount}</span></div>
      <div class="stat-row"><span>Yanlış Cevap:</span><span class="stat-val wrong-val">${wrongCount}</span></div>
    `;
    commentTxt.textContent = "Bravo! Ekran görüntüsü al ve grupta paylaş 🎸";
  }
}

function nextQuestion() {
  if (currentMode === 'race' && timeLeft <= 0) return;

  clearAutoTimer(); answered = false;
  if (document.activeElement) document.activeElement.blur();
  document.getElementById('message').textContent = '🎵 Doğru cevabı seç ve öğrenmeye devam et!';
  document.getElementById('message').style.color = '#8b6b4e';
  document.getElementById('next-btn').disabled = true;

  if (currentMode === 'practice' && currentIndex >= TOTAL_QUESTIONS_COUNT) { showFinalResults(); return; }

  current = pickNextQuestionPosition(filteredNotes);
  prevPositionId = current.id;
  moveHighlight(current.string, current.fret);
  document.getElementById('hint-text').innerHTML = `💡 <span class="hint-string-badge">${current.string}</span> . Tel – <span class="hint-fret-text">${ROMAN_FRETS[current.fret]}</span>`;

  const choices = pickAdjacentChoiceBlock(current.id, filteredNotes);
  const box = document.getElementById('choices');
  box.innerHTML = '';

  choices.forEach(noteObj => {
    const card = document.createElement('div');
    card.className = 'choice-card'; card.dataset.choice = noteObj.name;
    card.onclick = () => selectChoice(card, noteObj.name);
    const staffDiv = document.createElement('div'); staffDiv.className = 'choice-staff';
    card.appendChild(staffDiv);
    box.appendChild(card);
    drawMiniStaff(staffDiv, noteObj);
  });

  if (currentMode === 'practice') {
    document.getElementById('progress-fill').parentElement.parentElement.style.display = 'block';
    document.getElementById('progress-fill').style.width = (currentIndex / TOTAL_QUESTIONS_COUNT * 100) + '%';
  } else {
    document.getElementById('progress-fill').parentElement.parentElement.style.display = 'none';
  }

  if (interacted) setTimeout(() => playGuitar(current.freq), 300);
}

function selectChoice(card, name) {
  if (answered) return;
  if (currentMode === 'race' && timeLeft <= 0) return;

  answered = true; interacted = true;
  document.querySelectorAll('.choice-card').forEach(c => { c.classList.add('disabled'); c.onclick = null; });
  const msg = document.getElementById('message');

  if (name === current.name) {
    card.classList.add('correct');
    card.blur();
    msg.textContent = '✓ Doğru! İyi iş çıkardın, devam et!'; msg.style.color = '#6b8c42';
    playGuitar(current.freq);
    correctCount++;
    document.getElementById('next-btn').disabled = false;
    startAutoAdvance();
  } else {
    missCounts[current.id] = (missCounts[current.id] || 0) + 1;
    card.classList.add('wrong');
    card.blur();
    msg.textContent = '✗ ' + ERR[Math.floor(Math.random() * ERR.length)] + ' — Doğrusu: ' + current.name;
    msg.style.color = '#c75b39';
    wrongCount++;
    document.querySelectorAll('.choice-card').forEach(c => { if (c.dataset.choice === current.name) c.classList.add('correct'); });
    document.getElementById('next-btn').disabled = false;
  }
  
  if (currentMode === 'practice') {
    currentIndex++;
  }
}
