<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <title>Bas Gitar Nota Okuma Eğitimi</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'Lato', sans-serif; background: #faf6ed; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.2rem 1rem 2rem; color: #5a3e2b; }
    header { text-align: center; margin-bottom: 0.5rem; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 600; color: #5a3e2b; }
    #app-wrap { width: 100%; max-width: 600px; }

    /* ── TEL SEÇİM PANELİ STİLLERİ ── */
    .filter-card {
      background: #fff;
      border: 1.5px solid #e8e0d5;
      border-radius: 20px;
      padding: 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(90,62,43,0.04);
      text-align: center;
    }
    .filter-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #b09070;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }
    .string-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 0.85rem;
    }
    .string-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1.5px solid #d4c4b0;
      background: #fff;
      color: #5a3e2b;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }
    .string-btn.all-btn {
      width: auto;
      height: 42px;
      padding: 0 16px;
      border-radius: 20px;
      font-size: 0.9rem;
    }
    .string-btn.active {
      background: #5a3e2b;
      border-color: #5a3e2b;
      color: #fff;
      box-shadow: 0 4px 10px rgba(90,62,43,0.2);
    }
    .action-buttons-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .start-exercise-btn {
      width: 100%;
      padding: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 12px;
      border: 1.5px solid #d4a373;
      background: #f5e6d3;
      color: #5a3e2b;
      cursor: pointer;
      transition: all 0.12s;
    }
    .start-race-btn {
      border: 1.5px solid #e24b4a;
      background: #fdf0f0;
      color: #a32d2d;
    }
    .start-exercise-btn:disabled {
      background: #f5f5f5;
      border-color: #ddd;
      color: #aaa;
      cursor: not-allowed;
    }
    .back-to-menu-btn {
      font-size: 0.85rem;
      font-weight: 700;
      color: #b09070;
      background: #fff;
      border: 1.5px solid #e8e0d5;
      padding: 6px 14px;
      border-radius: 30px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
      box-shadow: 0 2px 8px rgba(90,62,43,0.02);
    }

    /* ── OYUN VE KART STİLLERİ ── */
    .card { background: #fff; border: 1.5px solid #e8e0d5; border-radius: 20px; padding: 1.1rem 1.1rem 0.9rem; margin-bottom: 0.85rem; box-shadow: 0 4px 20px rgba(90,62,43,0.04); }
    .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; gap: 8px; }

    #listen-btn { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; padding: 6px 14px; border-radius: 20px; border: 1.5px solid #d4a373; background: #fff; color: #8b5a2b; cursor: pointer; font-family: inherit; font-weight: 600; transition: all 0.2s; }
    #listen-btn.playing { background: #eaf3de; border-color: #6b8c42; color: #3b6d11; }
    
    @media (hover: hover) {
      #listen-btn:hover { background: #f5e6d3; }
      .ctrl-btn:hover { background: #f5e6d3; border-color: #c4a88a; }
      .ctrl-btn.primary:hover { background: #ebd3b8; }
      .start-exercise-btn:hover:not(:disabled) { background: #ebd3b8; }
      .start-race-btn:hover:not(:disabled) { background: #f9d5d5; }
      .back-to-menu-btn:hover { background: #f5e6d3; border-color: #d4c4b0; color: #5a3e2b; }
    }

    .timer-badge { font-size: 0.85rem; font-weight: 700; color: #8b5a2b; background: #f5e6d3; padding: 5px 12px; border-radius: 12px; border: 1px solid #e8d5c0; white-space: nowrap; }

    /* ── 2 KAT BÜYÜTÜLMÜŞ NOTA GÖSTERİM KARTI VE YENİ ÖLÇÜLER ── */
    .question-staff-card {
      background: #fff;
      border: 1.5px solid #e8e0d5;
      border-radius: 20px;
      padding: 1.5rem 1rem;
      margin-bottom: 0.85rem;
      box-shadow: 0 4px 20px rgba(90,62,43,0.04);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #question-staff {
      width: 300px;
      height: 110px; /* Üstteki inatçı boşluğu tamamen yok etmek için 130px'den 110px'e düşürüldü */
      overflow: visible;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #question-staff svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Genişletilmiş Klavye Alanı */
    .guitar-wrap { width: 100%; display: flex; justify-content: center; align-items: center; margin: 0.5rem auto; }
    .guitar-wrap svg { display: block; width: 100%; max-width: 480px; height: auto; overflow: visible; }

    /* Perde interaktif buton ve tıklama alanları */
    .fret-btn {
      cursor: pointer;
      transition: fill 0.15s, stroke 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .fret-btn.disabled {
      cursor: default;
      pointer-events: none;
    }

    .message { text-align: center; font-size: 0.9rem; font-weight: 700; color: #8b6b4e; margin-bottom: 0.65rem; min-height: 22px; padding: 0 5px; }

    #auto-bar-wrap { height: 3px; background: #e0ddd6; border-radius: 2px; margin-bottom: 0.65rem; overflow: hidden; display: none; }
    #auto-bar { height: 100%; width: 100%; background: #6b8c42; border-radius: 2px; transition: width 1s linear; }

    .progress-area { display: flex; align-items: center; margin-bottom: 1.2rem; }
    .progress-track { flex: 1; height: 10px; background: #ede6d8; border-radius: 5px; overflow: hidden; border: 1px solid #e0d8c8; }
    .progress-fill { height: 100%; width: 0%; background: #8cb85f; border-radius: 5px; transition: width 0.4s ease; }

    .controls { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .ctrl-btn { padding: 11px; font-size: 0.85rem; font-weight: 700; border-radius: 12px; border: 1.5px solid #d4c4b0; background: #fff; color: #5a3e2b; cursor: pointer; font-family: inherit; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px; width: 100%; }
    .ctrl-btn.primary { background: #f5e6d3; border-color: #d4a373; }
    .ctrl-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .result-screen { display: none; text-align: center; padding: 1.5rem 1rem; }
    .result-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #6b8c42; margin-bottom: 1rem; }
    .result-stats { background: #fdfaf4; border: 1.5px dashed #d4c4b0; border-radius: 16px; padding: 1.2rem; margin-bottom: 1.5rem; text-align: left; }
    .stat-row { display: flex; justify-content: space-between; font-size: 1.1rem; padding: 8px 0; border-bottom: 1px dashed #e8e0d5; color: #5a3e2b; }
    .stat-row:last-child { border-bottom: none; }
    .stat-val { font-weight: 700; color: #8b5a2b; }
    .stat-val.correct-val { color: #6b8c42; }
    .stat-val.wrong-val { color: #c75b39; }

    .site-footer {
      display: flex;
      justify-content: center;
      gap: 22px;
      margin-top: 2.5rem;
    }
    .site-footer a {
      color: #b0a392;
      font-size: 2.2rem;
      transition: all .2s ease;
    }
    .site-footer a:hover {
      color: #d4a373;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

<header>
  <h1>🎸 Bas Gitar Klavyesi – Notayı Bul</h1>
</header>

<div id="app-wrap">

  <div id="setup-area" class="filter-card">
    <div class="filter-title">Çalışılacak Telleri Seçin</div>
    <div class="string-buttons">
      <button id="btn-all" class="string-btn all-btn active" onclick="toggleAllStrings()">Hepsi</button>
      <button class="string-btn active string-num-btn" data-string="1" onclick="toggleString(1)">①</button>
      <button class="string-btn active string-num-btn" data-string="2" onclick="toggleString(2)">②</button>
      <button class="string-btn active string-num-btn" data-string="3" onclick="toggleString(3)">③</button>
      <button class="string-btn active string-num-btn" data-string="4" onclick="toggleString(4)">④</button>
    </div>
    <div class="action-buttons-wrap">
      <button id="start-btn" class="start-exercise-btn" onclick="startExercise('practice')">Egzersize Başla (Zamansız) 🎯</button>
      <button id="race-btn" class="start-exercise-btn start-race-btn" onclick="startExercise('race')">Yarışmaya Başla (40 Saniye) 🏆</button>
    </div>
  </div>

  <div id="quiz-zone" style="display:none;">
    
    <div class="question-staff-card">
      <div class="card-top" style="width: 100%;">
        <button class="back-to-menu-btn" onclick="goBackToMenu()">← Menüye Dön</button>
        <button id="listen-btn" onclick="replay()">🔊 Dinle</button>
        <div class="timer-badge" id="timer-display">Süre: 00:00</div>
      </div>
      
      <div id="question-staff"></div>
    </div>

    <div class="card">
      <div class="guitar-wrap">
        <svg id="guitar-svg" viewBox="60 0 400 160" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="fbGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#2a1a0e"/>
              <stop offset="100%" stop-color="#1a0f06"/>
            </linearGradient>
            <linearGradient id="nutGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#f0e0b0"/>
              <stop offset="100%" stop-color="#c8a050"/>
            </linearGradient>
            <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <rect x="62" y="24" width="392" height="120" rx="6" fill="url(#fbGrad)" stroke="#3a2010" stroke-width="1.5"/>
          <rect x="62" y="24" width="392" height="3" rx="1" fill="#c8a050" opacity="0.5"/>
          <rect x="62" y="141" width="392" height="3" rx="1" fill="#c8a050" opacity="0.5"/>
          
          <rect x="112" y="22" width="8" height="124" rx="2" fill="url(#nutGrad)" stroke="#c0a040" stroke-width="0.8"/>
          <rect x="198" y="24" width="4" height="120" rx="1" fill="#b0b8b0" opacity="0.85"/>
          <rect x="285" y="24" width="4" height="120" rx="1" fill="#b0b8b0" opacity="0.85"/>
          <rect x="370" y="24" width="4" height="120" rx="1" fill="#b0b8b0" opacity="0.85"/>
          <rect x="450" y="24" width="4" height="120" rx="1" fill="#b0b8b0" opacity="0.85"/>

          <text x="155" y="14" text-anchor="middle" fill="#8b6b4e" font-size="12" font-weight="700" font-family="Lato,sans-serif">I</text>
          <text x="243" y="14" text-anchor="middle" fill="#8b6b4e" font-size="12" font-weight="700" font-family="Lato,sans-serif">II</text>
          <text x="328" y="14" text-anchor="middle" fill="#8b6b4e" font-size="12" font-weight="700" font-family="Lato,sans-serif">III</text>
          <text x="412" y="14" text-anchor="middle" fill="#8b6b4e" font-size="12" font-weight="700" font-family="Lato,sans-serif">IV</text>

          <line x1="70" y1="40"  x2="454" y2="40"  stroke="#e8d09a" stroke-width="1.0" opacity="0.95"/>
          <line x1="70" y1="68"  x2="454" y2="68"  stroke="#e0c880" stroke-width="1.6" opacity="0.95"/>
          <line x1="70" y1="96"  x2="454" y2="96"  stroke="#c8a84a" stroke-width="2.2" opacity="0.95"/>
          <line x1="70" y1="124" x2="454" y2="124" stroke="#a87820" stroke-width="3.0" opacity="0.95"/>

          <g id="fret-buttons-group"></g>

          <circle id="fret-highlight" cx="0" cy="0" r="16" fill="#f4d03f" stroke="#d4ac0d" stroke-width="2.5" filter="url(#dotGlow)" opacity="0.95" style="display:none;pointer-events:none;"/>
          <text id="fret-highlight-q" x="0" y="0" text-anchor="middle" dominant-baseline="central" fill="#5a3000" font-size="12" font-weight="700" font-family="Lato,sans-serif" style="display:none;pointer-events:none;">?</text>
        </svg>
      </div>
    </div>

    <div class="message" id="message">🎵 Notayı incele ve klavye üzerinde doğru perdeye bas!</div>
    <div id="auto-bar-wrap"><div id="auto-bar"></div></div>

    <div class="progress-area">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
  </div>

  <div id="result-zone" class="result-screen">
    <h2 class="result-title">🎉 Test Tamamlandı!</h2>
    <div class="result-stats" id="result-stats">
      <div class="stat-row"><span>Toplam Süre:</span><span class="stat-val" id="res-time">00:00</span></div>
      <div class="stat-row"><span>Doğru Cevap:</span><span class="stat-val correct-val" id="res-correct">0</span></div>
      <div class="stat-row"><span>Yanlış Cevap:</span><span class="stat-val wrong-val" id="res-wrong">0</span></div>
    </div>
    <p id="result-comment" style="color:#8b6b4e; font-weight:700; margin-bottom:1.5rem;"></p>
  </div>

  <div class="controls">
    <button class="ctrl-btn primary" id="next-btn" onclick="manualNext()" disabled>Sonraki Soru →</button>
  </div>
</div>

<footer class="site-footer">
  <a href="https://www.instagram.com/yunusgedik_/" target="_blank" aria-label="Instagram">
    <i class="fa-brands fa-instagram"></i>
  </a>
  <a href="https://x.com/yunusgedik_" target="_blank" aria-label="X">
    <i class="fa-brands fa-x-twitter"></i>
  </a>
  <a href="https://www.youtube.com/yunusgedik" target="_blank" aria-label="YouTube">
    <i class="fa-brands fa-youtube"></i>
  </a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
<script>
(function() {
  const sid = localStorage.getItem('gitar_session');
  if (!sid) window.location.href = 'https://gitar.yunusgedik.com.tr/';
})();

const NOTES = [
  { string:1, fret:0, name:'Sol', freq:98.00,  key:'g/3' },
  { string:1, fret:2, name:'La',  freq:110.00, key:'a/3' },
  { string:2, fret:0, name:'Re',  freq:73.42,  key:'d/3' },
  { string:2, fret:2, name:'Mi',  freq:82.41,  key:'e/3' },
  { string:2, fret:3, name:'Fa',  freq:87.31,  key:'f/3' },
  { string:3, fret:0, name:'La',  freq:55.00,  key:'a/2' },
  { string:3, fret:2, name:'Si',  freq:61.74,  key:'b/2' },
  { string:3, fret:3, name:'Do',  freq:65.41,  key:'c/3' },
  { string:4, fret:0, name:'Mi',  freq:41.20,  key:'e/2' },
  { string:4, fret:1, name:'Fa',  freq:43.65,  key:'f/2' },
  { string:4, fret:3, name:'Sol', freq:49.00,  key:'g/2' }
];

const ROMAN_FRETS = { 0:'Boş Tel', 1:'I. Perde', 2:'II. Perde', 3:'III. Perde', 4:'IV. Perde' };
const ERR = [
  "Yazıklar olsun!",
  "Kulaklarımız kanadı...",
  "Sende hiç utanma yok mu yaa",
  "Instagram'dan ekle beni seni engellim",
  "Tüm başarılar Yunus Hocadan, bunun gibi hatalar ise senden..",
  "Yunus Hoca bunu görmemiş olsun...",
  "Gitarı yavaşça yere bırak...",
  "Sen daha iyi enstrümanlara layıksın",
  "Aynen knk aynen sensin",
  "Iyyy yine mi hata",
  "Ağır popçusun belli knk",
  "Lâ havle..",
  "Sen en iyisi flüt çal knk",
  "Tekrar deneme, yeter.",
  "Bir yerde bırakmak lazım sanki",
  "Bir durun olsun beea",
  "Sen öyle bil aynen",
  "En sevmediğim öğrencim naber",
  "Ex'den Next olur senden öğrenci olmaz :D"
];

// DEĞİŞİKLİK: JavaScript dikey tel koordinat merkezleri yeni tel konumlarına göre senkronize edildi.
const STRING_CY = { 1:40, 2:68, 3:96, 4:124 };
const TOTAL_QUESTIONS_COUNT = 12;

let audioCtx=null, current=null, answered=false, interacted=false, autoTimer=null;
let correctCount=0, wrongCount=0, startTime=null, timerInterval=null;

let selectedStrings = new Set([1, 2, 3, 4]);
let filteredNotes = [];
let currentMode = 'practice';
let gameTimer = null;
let timeLeft = 40;
let currentIndex = 0;

const ALL_FRETS_MAP = [
  { string: 1, fret: 0 }, { string: 1, fret: 1 }, { string: 1, fret: 2 }, { string: 1, fret: 3 }, { string: 1, fret: 4 },
  { string: 2, fret: 0 }, { string: 2, fret: 1 }, { string: 2, fret: 2 }, { string: 2, fret: 3 }, { string: 2, fret: 4 },
  { string: 3, fret: 0 }, { string: 3, fret: 1 }, { string: 3, fret: 2 }, { string: 3, fret: 3 }, { string: 3, fret: 4 },
  { string: 4, fret: 0 }, { string: 4, fret: 1 }, { string: 4, fret: 2 }, { string: 4, fret: 3 }, { string: 4, fret: 4 }
];

function shuffle(a) { return [...a].sort(() => Math.random() - 0.5); }

function toggleAllStrings() {
  const allBtn = document.getElementById('btn-all');
  const numBtns = document.querySelectorAll('.string-num-btn');
  if (selectedStrings.size === 4) {
    selectedStrings.clear();
    allBtn.classList.remove('active');
    numBtns.forEach(b => b.classList.remove('active'));
  } else {
    selectedStrings = new Set([1, 2, 3, 4]);
    allBtn.classList.add('active');
    numBtns.forEach(b => b.classList.add('active'));
  }
  checkStartButton();
}

function toggleString(num) {
  const btn = document.querySelector(`.string-num-btn[data-string="${num}"]`);
  const allBtn = document.getElementById('btn-all');
  if (selectedStrings.has(num)) {
    selectedStrings.delete(num);
    btn.classList.remove('active');
  } else {
    selectedStrings.add(num);
    btn.classList.add('active');
  }
  if (selectedStrings.size === 4) {
    allBtn.classList.add('active');
  } else {
    allBtn.classList.remove('active');
  }
  checkStartButton();
}

function checkStartButton() {
  const startBtn = document.getElementById('start-btn');
  const raceBtn = document.getElementById('race-btn');
  const isZero = selectedStrings.size === 0;
  startBtn.disabled = isZero;
  raceBtn.disabled = isZero;
}

function startExercise(mode) {
  filteredNotes = NOTES.filter(n => selectedStrings.has(n.string));
  if (filteredNotes.length === 0) return;

  currentMode = mode;
  document.getElementById('setup-area').style.display = 'none';
  document.getElementById('quiz-zone').style.display = 'block';
  document.getElementById('result-zone').style.display = 'none';

  correctCount = 0;
  wrongCount = 0;
  currentIndex = 0;
  answered = false;

  buildGuitarInteraction();

  if (currentMode === 'race') {
    timeLeft = 40;
    document.getElementById('timer-display').textContent = 'Kalan Süre: ' + timeLeft;
    startGameTimer();
  } else {
    document.getElementById('timer-display').textContent = 'Süre: 00:00';
    startTimer();
  }

  nextQuestion();
}

function goBackToMenu() {
  if (timerInterval) clearInterval(timerInterval);
  if (gameTimer) clearInterval(gameTimer);
  clearAutoTimer();
  document.getElementById('quiz-zone').style.display = 'none';
  document.getElementById('result-zone').style.display = 'none';
  document.getElementById('setup-area').style.display = 'block';
}

function startGameTimer() {
  if (gameTimer) clearInterval(gameTimer);
  gameTimer = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) {
      document.getElementById('timer-display').textContent = 'Süre Bitti!';
      clearInterval(gameTimer);
      showFinalResults();
    } else {
      document.getElementById('timer-display').textContent = 'Kalan Süre: ' + timeLeft;
    }
  }, 1000);
}

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playGuitar(freq) {
  try {
    const ctx = getAudio();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    const master = ctx.createGain();
    master.connect(ctx.destination);

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = freq * 2.8; filter.Q.value = 0.7;
    filter.connect(master);

    const osc = ctx.createOscillator(); osc.type = 'triangle'; osc.frequency.value = freq;
    const og = ctx.createGain();
    og.gain.setValueAtTime(0, now); og.gain.linearRampToValueAtTime(0.45, now + 0.006); og.gain.exponentialRampToValueAtTime(0.001, now + 2.2);
    osc.connect(og); og.connect(filter); osc.start(now); osc.stop(now + 2.2);

    const sine = ctx.createOscillator(); sine.type = 'sine'; sine.frequency.value = freq;
    const sg = ctx.createGain();
    sg.gain.setValueAtTime(0, now); sg.gain.linearRampToValueAtTime(0.25, now + 0.006); sg.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
    sine.connect(sg); sg.connect(filter); sine.start(now); sine.stop(now + 1.8);

    [2, 3, 4].forEach(h => {
      const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq * h;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.1 / h, now + 0.005); g.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
      o.connect(g); g.connect(filter); o.start(now); o.stop(now + 1.2);
    });

    master.gain.setValueAtTime(0.75, now); master.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
    const btn = document.getElementById('listen-btn');
    btn.classList.add('playing'); setTimeout(() => btn.classList.remove('playing'), 700);
  } catch(e) {}
}

function replay() { interacted = true; if (current) playGuitar(current.freq); }

function buildGuitarInteraction() {
  const group = document.getElementById('fret-buttons-group');
  group.innerHTML = '';

  ALL_FRETS_MAP.forEach(item => {
    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.setAttribute("class", "fret-btn");
    g.setAttribute("data-string", item.string);
    g.setAttribute("data-fret", item.fret);
    
    let clickArea = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    
    if (item.fret === 0) {
      // Boş tel butonu arayüzü
      clickArea = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      clickArea.setAttribute("cx", 93);
      clickArea.setAttribute("cy", STRING_CY[item.string]);
      clickArea.setAttribute("r", 12);
      clickArea.setAttribute("fill", "#fff8ef");
      clickArea.setAttribute("stroke", "#d4a373");
      clickArea.setAttribute("stroke-width", "1.5");

      const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
      txt.setAttribute("x", 93);
      // DEĞİŞİKLİK: Yuvarlak buton içi numaraların dikey hizası yeni merkezlere göre ortalandı (+4 payı korundu)
      txt.setAttribute("y", STRING_CY[item.string] + 4);
      txt.setAttribute("text-anchor", "middle");
      txt.setAttribute("fill", "#5a3e2b");
      txt.setAttribute("font-size", "11");
      txt.setAttribute("font-weight", "700");
      txt.setAttribute("font-family", "Lato,sans-serif");
      txt.textContent = item.string;
      
      g.appendChild(clickArea);
      g.appendChild(txt);
    } else {
      let width = 0, x = 0;
      if (item.fret === 1) { x = 116; width = 82; }
      else if (item.fret === 2) { x = 198; width = 87; }
      else if (item.fret === 3) { x = 285; width = 85; }
      else if (item.fret === 4) { x = 370; width = 80; }

      clickArea.setAttribute("x", x);
      clickArea.setAttribute("y", STRING_CY[item.string] - 14);
      clickArea.setAttribute("width", width);
      clickArea.setAttribute("height", 28);
      clickArea.setAttribute("fill", "transparent");
      
      const centerCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      let cx = x + (width / 2);
      centerCircle.setAttribute("cx", cx);
      centerCircle.setAttribute("cy", STRING_CY[item.string]);
      centerCircle.setAttribute("r", 4);
      centerCircle.setAttribute("fill", "#b0b8b0");
      centerCircle.setAttribute("opacity", "0.35");
      
      g.appendChild(clickArea);
      g.appendChild(centerCircle);
    }

    g.onclick = () => handleFretClick(g, item.string, item.fret);
    group.appendChild(g);
  });
}

// 2 KAT BÜYÜTÜLMÜŞ FA ANAHTARI NOTA ÇİZİMİ VE SIKIŞTIRILMIŞ ALAN
function drawQuestionStaff(noteObj) {
  const div = document.getElementById('question-staff');
  div.innerHTML = '';
  try {
    const { Renderer, Stave, StaveNote, Voice, Formatter } = Vex.Flow;
    const renderer = new Renderer(div, Renderer.Backends.SVG);
    
    // DEĞİŞİKLİK: Alt taraftaki gereksiz boşluğu kapatmak için yükseklik 200'den 130'a indirildi
    renderer.resize(300, 130);
    const ctx = renderer.getContext();
    
    ctx.scale(1.8, 1.8); 
    
    // DEĞİŞİKLİK: Notanın yukarısındaki inatçı boşluğu sıfırlamak için 2. parametre (Y konumu) 0 yerine -5 yapıldı
    const stave = new Stave(10, -5, 140);
    stave.addClef('bass').setContext(ctx).draw();
    
    const note = new StaveNote({ keys: [noteObj.key], clef: 'bass', duration: 'w' });
    const voice = new Voice({ num_beats: 4, beat_value: 4 });
    voice.addTickables([note]);
    
    new Formatter().joinVoices([voice]).format([voice], 80);
    voice.draw(ctx, stave);
  } catch(e) { console.log(e); }
}

function startTimer() {
  startTime = Date.now();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('timer-display').textContent = 'Süre: ' + String(Math.floor(s / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
  }, 1000);
}

function clearAutoTimer() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  document.getElementById('auto-bar-wrap').style.display = 'none';
}

function startAutoAdvance() {
  const wrap = document.getElementById('auto-bar-wrap'), bar = document.getElementById('auto-bar');
  wrap.style.display = 'block'; bar.style.width = '100%'; bar.style.transition = 'none';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    bar.style.transition = 'width 1s linear'; bar.style.width = '0%';
  }));
  autoTimer = setTimeout(() => { clearAutoTimer(); nextQuestion(); }, 1000);
}

function manualNext() {
  if (currentMode === 'race' && timeLeft <= 0) return;
  clearAutoTimer();
  nextQuestion();
}

function showFinalResults() {
  if (timerInterval) clearInterval(timerInterval);
  if (gameTimer) clearInterval(gameTimer);
  clearAutoTimer();

  document.getElementById('quiz-zone').style.display = 'none';
  document.getElementById('result-zone').style.display = 'block';
  
  const statsBox = document.getElementById('result-stats');
  const commentTxt = document.getElementById('result-comment');

  if (currentMode === 'race') {
    document.querySelector('.result-title').textContent = "Yarışma Tamamlandı! 🏁";
    let rankName = "";
    let comment = "";

    if (correctCount >= 20) {
      rankName = "🏆 Master Basçı 1 Numara!";
      comment = "İnanılmaz! Parmaklar ve kulak uçuyor! Yunus Hoca gözyaşları içinde seni ayakta alkışlıyor! 🎸";
    } else if (correctCount >= 15) {
      rankName = "🔥 Sahne Sanatçısı";
      comment = "Notalar tıkır tıkır çözülüyor, gözler ve duyum hızlandı! Artık kulis kartını hak ettin kanka.";
    } else if (correctCount >= 10) {
      rankName = "⚡ Groove Basçı";
      comment = "Solo atamıyorsun belki ama harika groove tutuyorsun hani! Bir tık daha hızlansan solist seni fark edecek.";
    } else if (correctCount >= 5) {
      rankName = "🎸 Sahildeki Akustikçi";
      comment = "Sahilde 'Akdeniz Akşamları'na bas bas eşlik etmekten öteye geçemedin ama bir umut var kanka!";
    } else {
      rankName = "🐢 Kaplumbağa Basçı";
      comment = "Gitarı yavaşça yere bırak ve tellere bir daha dokunma kanka... Hızın tam evlene şenlik!";
    }

    statsBox.innerHTML = `
      <div class="stat-row"><span>Unvan:</span><span class="stat-val" style="color:#d4a373">${rankName}</span></div>
      <div class="stat-row"><span>Doğru Cevap:</span><span class="stat-val correct-val">${correctCount} Doğru</span></div>
    `;
    commentTxt.innerHTML = `"${comment}"`;
  } else {
    document.querySelector('.result-title').textContent = "🎉 Test Tamamlandı!";
    const s = Math.floor((Date.now() - startTime) / 1000);
    const mins = Math.floor(s / 60), secs = s % 60;
    statsBox.innerHTML = `
      <div class="stat-row"><span>Toplam Süre:</span><span class="stat-val">${mins > 0 ? mins + ' dk ' + secs + ' sn' : secs + ' sn'}</span></div>
      <div class="stat-row"><span>Doğru Cevap:</span><span class="stat-val correct-val">${correctCount}</span></div>
      <div class="stat-row"><span>Yanlış Cevap:</span><span class="stat-val wrong-val">${wrongCount}</span></div>
    `;
    commentTxt.textContent = "Bravo! Ekran görüntüsü al ve grupta paylaş 🎸";
  }
}

function nextQuestion() {
  if (currentMode === 'race' && timeLeft <= 0) return;

  clearAutoTimer(); answered = false;
  if (document.activeElement) document.activeElement.blur();
  document.getElementById('message').textContent = '🎵 Notayı incele ve klavye üzerinde doğru perdeye bas!';
  document.getElementById('message').style.color = '#8b6b4e';
  document.getElementById('next-btn').disabled = true;

  document.querySelectorAll('.fret-btn').forEach(g => {
    g.classList.remove('disabled');
    const feedback = g.querySelector('.fret-feedback');
    if(feedback) feedback.remove();
  });
  
  const dot = document.getElementById('fret-highlight');
  const qtxt = document.getElementById('fret-highlight-q');
  dot.style.display = 'none'; qtxt.style.display = 'none';

  if (currentMode === 'practice' && currentIndex >= TOTAL_QUESTIONS_COUNT) { showFinalResults(); return; }

  current = filteredNotes[Math.floor(Math.random() * filteredNotes.length)];
  
  drawQuestionStaff(current);

  if (currentMode === 'practice') {
    document.getElementById('progress-fill').parentElement.parentElement.style.display = 'block';
    document.getElementById('progress-fill').style.width = (currentIndex / TOTAL_QUESTIONS_COUNT * 100) + '%';
  } else {
    document.getElementById('progress-fill').parentElement.parentElement.style.display = 'none';
  }

  if (interacted) setTimeout(() => playGuitar(current.freq), 300);
}

function handleFretClick(element, stringNum, fretNum) {
  if (answered) return;
  if (currentMode === 'race' && timeLeft <= 0) return;

  answered = true; interacted = true;
  document.querySelectorAll('.fret-btn').forEach(g => g.classList.add('disabled'));
  const msg = document.getElementById('message');

  let cx = 0, cy = STRING_CY[stringNum];
  if (fretNum === 0) {
    cx = 93;
  } else {
    let x = 0, width = 0;
    if (fretNum === 1) { x = 116; width = 82; }
    else if (fretNum === 2) { x = 198; width = 87; }
    else if (fretNum === 3) { x = 285; width = 85; }
    else if (fretNum === 4) { x = 370; width = 80; }
    cx = x + (width / 2);
  }

  const clickedNoteObj = NOTES.find(n => n.string === stringNum && n.fret === fretNum);
  
  if (clickedNoteObj && clickedNoteObj.name === current.name) {
    createFeedbackCircle(element, cx, cy, '#6b8c42');
    msg.textContent = `✓ Doğru! ${current.name} notası, ${stringNum}. Tel - ${ROMAN_FRETS[fretNum]}`;
    msg.style.color = '#6b8c42';
    playGuitar(current.freq);
    correctCount++;
    document.getElementById('next-btn').disabled = false;
    startAutoAdvance();
  } else {
    createFeedbackCircle(element, cx, cy, '#6b8c42'); 
    msg.textContent = '✗ ' + ERR[Math.floor(Math.random() * ERR.length)] + ' — Doğrusu: ' + current.string + '. Tel - ' + ROMAN_FRETS[current.fret] + ` (${current.name})`;
    msg.style.color = '#c75b39';
    wrongCount++;
    
    showCorrectTarget();
    document.getElementById('next-btn').disabled = false;
  }
  
  if (currentMode === 'practice') {
    currentIndex++;
  }
}

function createFeedbackCircle(parentG, cx, cy, color) {
  const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  circle.setAttribute("class", "fret-feedback");
  circle.setAttribute("cx", cx);
  circle.setAttribute("cy", cy);
  circle.setAttribute("r", 14); 
  circle.setAttribute("fill", color);
  circle.setAttribute("opacity", "0.9");
  circle.setAttribute("filter", "url(#dotGlow)");
  parentG.appendChild(circle);
}

function showCorrectTarget() {
  let cx = 0, cy = STRING_CY[current.string];
  if (current.fret === 0) {
    cx = 93;
  } else {
    let x = 0, width = 0;
    if (current.fret === 1) { x = 116; width = 82; }
    else if (current.fret === 2) { x = 198; width = 87; }
    else if (current.fret === 3) { x = 285; width = 85; }
    else if (current.fret === 4) { x = 370; width = 80; }
    cx = x + (width / 2);
  }
  
  const dot = document.getElementById('fret-highlight');
  const qtxt = document.getElementById('fret-highlight-q');
  dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
  qtxt.setAttribute('x', cx); qtxt.setAttribute('y', cy);
  dot.style.display = ''; qtxt.style.display = '';
}
