<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎸 Dr. Yunus GEDİK – Gitar Akademisi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f7f4ef;
      --brown: #2c1f14;
      --gold:  #b8892a;
      --muted: #7a6a5a;
      --border: #e2d9cc;
      --green: #3b6d11;
      --green-bg: #eaf3de;
      --red: #a32d2d;
      --red-bg: #fdf0f0;
      --orange: #c9650f;
      --orange-bg: #fdf0e1;
      --orange-border: #f0c896;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--brown);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #login-overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: rgba(247, 244, 239, 0.40);
      backdrop-filter: blur(14px) saturate(1.2);
      -webkit-backdrop-filter: blur(14px) saturate(1.2);
      animation: fadeIn .3s ease both;
    }

    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes fadeOut { from{opacity:1} to{opacity:0} }
    #login-overlay.hiding {
      animation: fadeOut .25s ease forwards;
      pointer-events: none;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(226, 217, 204, 0.9);
      border-radius: 28px;
      padding: 2.75rem 2.25rem 2.25rem;
      box-shadow: 0 24px 64px rgba(44, 31, 20, 0.18);
      width: 100%;
      max-width: 340px;
      text-align: center;
      animation: popIn .35s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes popIn {
      from { opacity:0; transform:scale(.88) translateY(12px); }
      to   { opacity:1; transform:scale(1)   translateY(0);    }
    }

    .login-logo { font-size: 2.6rem; line-height: 1; margin-bottom: .6rem; }
    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem; font-weight: 700;
      color: var(--brown); margin-bottom: .25rem;
    }
    .login-sub { font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 2rem; }
    .gold-line { width: 40px; height: 2px; background: var(--gold); margin: .8rem auto 2rem; border-radius: 2px; }

    .pin-label { font-size: .78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .9rem; }

    #pin-input {
      width: 100%;
      height: 56px;
      border: 2px solid var(--border);
      border-radius: 16px;
      background: var(--cream);
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: .4em;
      text-align: center;
      color: var(--brown);
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      padding: 0 1rem;
      -webkit-text-security: disc;
    }
    #pin-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,137,42,.15);
    }
    #pin-input::placeholder { color: var(--border); letter-spacing: .3em; font-size: 1.5rem; }

    #pin-error {
      margin-top: .9rem;
      font-size: .82rem;
      font-weight: 600;
      color: var(--red);
      min-height: 20px;
      transition: opacity .2s;
    }

    .login-hint { font-size: .72rem; color: var(--muted); margin-top: 1.25rem; }

    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
    .shake { animation: shake .35s ease; }

    #screen-dash { width: 100%; }
    .dash-inner { width: 100%; max-width: 920px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }

    .welcome-bar {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
      background: #fff; border: 1px solid var(--border); border-radius: 18px;
      padding: 1rem 1.4rem; margin-bottom: 1.4rem;
      box-shadow: 0 2px 14px rgba(44,31,20,.05);
    }
    .welcome-left { display: flex; align-items: center; gap: 10px; }
    .welcome-info { display: flex; flex-direction: column; gap: 2px; }
    .avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), #7a4a08);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 0;
      color: #fff; font-weight: 900;
      font-family: 'Playfair Display', serif; flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(184,137,42,.35);
    }
    .avatar-rank {
      font-size: 1.25rem; line-height: 1; letter-spacing: -.02em;
    }
    .avatar-label {
      font-size: .5rem; font-weight: 600; opacity: .85; letter-spacing: .06em; text-transform: uppercase; margin-top: 1px;
    }
    .welcome-badges { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
    .w-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .72rem; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; letter-spacing: .02em; white-space: nowrap;
    }
    .w-badge-grade { background: var(--brown); color: #fff; }
    .w-badge-score { background: #fff7e8; color: var(--gold); border: 1px solid #e8c97a; }
    .w-badge-rank  { background: var(--green-bg); color: var(--green); border: 1px solid #b0d890; }
    .welcome-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; }
    
    .online-pill { font-size: .75rem; font-weight: 600; background: var(--green-bg); color: var(--green); padding: 5px 14px; border-radius: 20px; display: flex; align-items: center; gap: 6px; box-shadow: 0 2px 6px rgba(59,109,17,0.08); }
    #online-badges-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .online-name-badge { font-size: .75rem; font-weight: 600; background: var(--green-bg); color: var(--green); padding: 4px 11px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; box-shadow: 0 2px 6px rgba(59,109,17,0.08); border: 1px solid #b0d890; white-space: nowrap; }
    .student-select-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 10px; margin-bottom: 1.4rem; }
    .student-all-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:12px 14px; display:flex; flex-direction:column; gap:6px; }
    .student-all-header { display:flex; flex-direction:column; cursor:pointer; gap:2px; }
    .student-all-header:hover strong { color:var(--gold); }
    .cat-chips-row { display:flex; flex-wrap:wrap; gap:5px; margin-top:2px; }
    .cat-chip { font-size:.68rem; font-weight:700; padding:3px 9px; border-radius:20px; border:1.5px solid; cursor:pointer; background:transparent; font-family:inherit; transition:all .15s; line-height:1.4; }
    .cat-chip:hover { opacity:.8; transform:scale(1.03); }
    .grade-tab.cat-tab { border-style:dashed; font-size:.72rem; }
    .grade-tab.cat-tab.active { border-style:solid; }
    
    .logout-btn { font-size: .78rem; color: var(--muted); background: none; border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-family: inherit; transition: all .15s; }
    .logout-btn:hover { background: var(--red-bg); color: var(--red); border-color: #e8b8b8; }

    .section-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; margin: 1rem 0 1.2rem 0; letter-spacing: 0.02em; color: var(--brown); }

    /* ===== TEACHER PANEL STYLES ===== */
    .teacher-panel-btn {
      font-size: .78rem;
      color: var(--gold);
      background: none;
      border: 1px solid var(--gold);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
      font-weight: 600;
    }
    .teacher-panel-btn:hover {
      background: #fff7e8;
    }

    #teacher-panel-overlay {
      position: fixed;
      inset: 0;
      z-index: 998;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: rgba(0,0,0,0.5);
      animation: fadeIn .3s ease both;
    }
    #teacher-panel-overlay.show {
      display: flex;
    }

    .teacher-panel-card {
      background: #fff;
      border: 2px solid var(--gold);
      border-radius: 28px;
      padding: 2.5rem;
      box-shadow: 0 24px 64px rgba(44, 31, 20, 0.25);
      width: 100%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      animation: popIn .35s cubic-bezier(.34,1.56,.64,1) both;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--gold);
      padding-bottom: 1rem;
    }

    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--brown);
    }

    .close-panel-btn {
      background: var(--red-bg);
      color: var(--red);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .close-panel-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 12px rgba(163, 45, 45, 0.2);
    }

    .section-config {
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: var(--cream);
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .section-emoji {
      font-size: 1.3rem;
    }

    .grades-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .grade-checkbox {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      transition: all .15s;
    }

    .grade-checkbox input {
      cursor: pointer;
      margin: 0;
      width: 18px;
      height: 18px;
    }

    .grade-checkbox:hover {
      border-color: var(--gold);
      background: #fef9f3;
    }

    .grade-checkbox input:checked + label {
      color: var(--gold);
      font-weight: 700;
    }

    .grade-checkbox label {
      cursor: pointer;
      font-weight: 500;
      margin: 0;
    }

    .save-config-btn {
      width: 100%;
      padding: 12px 20px;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
      margin-top: 1.5rem;
    }
    .save-config-btn:hover {
      background: #a67a21;
      box-shadow: 0 8px 20px rgba(184, 137, 42, 0.3);
    }

    .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.2rem; }
    .card {
      background: #fff; border: 1px solid var(--border); border-radius: 20px;
      padding: 2rem 1.75rem; cursor: pointer; text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 1rem;
      position: relative; overflow: hidden;
      transition: transform .2s, box-shadow .2s, border-color .2s;
    }
    .card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; background:var(--gold); opacity:0; transition:opacity .2s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(44, 31, 20, 0.08); border-color: #c8b8a8; }
    .card:hover::before { opacity: 1; }
    .card.disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .card-icon { font-size: 2.2rem; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; margin-bottom: .35rem; }
    .card-desc  { font-size: .84rem; color: var(--muted); line-height: 1.65; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--gold);
      color: #fff;
      padding: 1rem 1.5rem;
      border-radius: 16px;
      font-size: 0.85rem;
      font-weight: 600;
      animation: slideUp .3s ease both;
      z-index: 1000;
      box-shadow: 0 8px 24px rgba(184, 137, 42, 0.3);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>
  <div id="login-overlay">
    <div class="login-card">
      <div class="login-logo">🎸</div>
      <div class="login-title">Dr. Yunus GEDİK</div>
      <div class="login-sub">Gitar Akademisi</div>
      <div class="gold-line"></div>
      <div class="pin-label">PIN Kodunu Girin</div>
      <input
        id="pin-input"
        type="password"
        placeholder="••••••"
        autocomplete="off"
      />
      <div id="pin-error"></div>
      <div class="login-hint">🎵 Akademiye hoşgeldiniz</div>
    </div>
  </div>

  <div id="teacher-panel-overlay">
    <div class="teacher-panel-card">
      <div class="panel-header">
        <div class="panel-title">⚙️ Bölümler Yönetimi</div>
        <button class="close-panel-btn" onclick="closeTeacherPanel()">✕</button>
      </div>
      
      <div id="sections-config-container">
        <!-- Dinamik olarak doldurulacak -->
      </div>
      
      <button class="save-config-btn" onclick="saveAllSectionConfig()">💾 Ayarları Kaydet</button>
    </div>
  </div>

  <div id="screen-dash">
    <div class="dash-inner">
      <div class="welcome-bar">
        <div class="welcome-left">
          <div class="avatar">
            <div class="avatar-rank" id="welcome-avatar-rank">🎸</div>
            <div class="avatar-label" id="welcome-avatar-label"></div>
          </div>
          <div class="welcome-info">
            <div class="welcome-name" id="welcome-name">Hoşgeldiniz</div>
            <div id="welcome-badges" class="welcome-badges"></div>
          </div>
        </div>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
          <button id="teacher-panel-btn" class="teacher-panel-btn" style="display:none;" onclick="openTeacherPanel()">⚙️ Yönetim Paneli</button>
          <button class="logout-btn" onclick="logout()">Çıkış Yap</button>
        </div>
      </div>

      <div style="display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem;" id="online-badges-row"></div>

      <div id="sections-container">
        <!-- Dinamik olarak doldurulacak -->
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.14.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.14.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.14.0/firebase-auth.js"></script>

  <script>
const firebaseConfig = {
  apiKey: "AIzaSyAEV_YcvPFGDXI1lIGWI-REYNDWrAP0AiA",
  authDomain: "gitar-akademisi-8c6bc.firebaseapp.com",
  projectId: "gitar-akademisi-8c6bc",
  storageBucket: "gitar-akademisi-8c6bc.appspot.com",
  messagingSenderId: "123456789",
  databaseURL: "https://gitar-akademisi-8c6bc-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const TEACHER_PIN = "5678";
const TEACHER_ID = "teacher";

// ===== SECTIONS CONFIGURATION =====
const SECTIONS = [
  {
    id: 'repertoire',
    label: 'Repertuvar',
    emoji: '📚',
    description: 'Öğrenilen şarkılar ve eserler',
    defaultGrades: [1, 2, 3, 4, 5, 6]
  },
  {
    id: 'kulak',
    label: 'Kulak Eğitimi',
    emoji: '👂',
    description: 'Ses ve nota tanıma egzersizleri',
    defaultGrades: [1, 2, 3, 4, 5, 6]
  },
  {
    id: 'bas',
    label: 'Bas Gitar',
    emoji: '🎸',
    description: 'Bas gitar dersleri',
    defaultGrades: [1, 2, 3, 4, 5, 6]
  },
  {
    id: 'bas_v2',
    label: 'Bas Gitar v2',
    emoji: '🎸',
    description: 'Gelişmiş bas gitar dersleri',
    defaultGrades: [2, 3, 4, 5, 6]
  },
];

let sectionConfig = {};
let userLoggedIn = false;
let isTeacher = false;
let currentUserId = null;

// ===== INIT =====
async function init() {
  loadSectionConfig();
  document.getElementById('pin-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') login();
  });
}

init();

// ===== LOGIN =====
async function login() {
  const pin = document.getElementById('pin-input').value.trim();
  const errorEl = document.getElementById('pin-error');
  errorEl.textContent = '';

  if (!pin) {
    errorEl.textContent = 'PIN kodunu girin';
    return;
  }

  try {
    if (pin === TEACHER_PIN) {
      isTeacher = true;
      currentUserId = TEACHER_ID;
    } else {
      const snap = await firebase.database().ref('students').orderByChild('pin').equalTo(pin).once('value');
      if (snap.exists()) {
        const students = snap.val();
        const sid = Object.keys(students)[0];
        currentUserId = sid;
        isTeacher = false;
      } else {
        throw new Error('Invalid PIN');
      }
    }

    userLoggedIn = true;
    document.getElementById('login-overlay').classList.add('hiding');
    setTimeout(() => {
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('screen-dash').style.display = '';
      renderDashboard();
    }, 250);
  } catch (e) {
    errorEl.textContent = 'Hatalı PIN';
    document.getElementById('pin-input').classList.add('shake');
    setTimeout(() => document.getElementById('pin-input').classList.remove('shake'), 350);
  }
}

function logout() {
  userLoggedIn = false;
  isTeacher = false;
  currentUserId = null;
  document.getElementById('login-overlay').classList.remove('hiding');
  document.getElementById('login-overlay').style.display = '';
  document.getElementById('screen-dash').style.display = 'none';
  document.getElementById('pin-input').value = '';
}

// ===== SECTION CONFIG =====
async function loadSectionConfig() {
  try {
    const snap = await firebase.database().ref('section_config').once('value');
    sectionConfig = snap.exists() ? snap.val() : {};
    
    // Varsayılan değerleri ayarla
    SECTIONS.forEach(section => {
      if (!sectionConfig[section.id]) {
        sectionConfig[section.id] = {
          grades: section.defaultGrades,
          enabled: true
        };
      }
    });
  } catch (e) {
    console.error('Bölüm ayarları yüklenemedi:', e);
  }
}

async function saveAllSectionConfig() {
  try {
    const newConfig = {};
    
    SECTIONS.forEach(section => {
      const checkboxes = document.querySelectorAll(`input[data-section="${section.id}"]`);
      const selectedGrades = Array.from(checkboxes)
        .filter(cb => cb.checked)
        .map(cb => parseInt(cb.value));
      
      newConfig[section.id] = {
        grades: selectedGrades,
        enabled: selectedGrades.length > 0
      };
    });

    await firebase.database().ref('section_config').set(newConfig);
    sectionConfig = newConfig;
    
    showToast('✅ Ayarlar başarıyla kaydedildi!');
    closeTeacherPanel();
    renderDashboard();
  } catch (e) {
    showToast('❌ Kaydedilemedi: ' + e.message);
  }
}

function openTeacherPanel() {
  const container = document.getElementById('sections-config-container');
  
  container.innerHTML = SECTIONS.map(section => {
    const config = sectionConfig[section.id] || { grades: [], enabled: false };
    const availableGrades = [1, 2, 3, 4, 5, 6];
    
    return `
      <div class="section-config">
        <div class="section-header">
          <span class="section-emoji">${section.emoji}</span>
          <span>${section.label}</span>
        </div>
        <p style="font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem;">
          ${section.description}
        </p>
        <div class="grades-selector">
          ${availableGrades.map(grade => `
            <label class="grade-checkbox">
              <input 
                type="checkbox" 
                value="${grade}"
                data-section="${section.id}"
                ${config.grades.includes(grade) ? 'checked' : ''}
              />
              <label>Grade ${grade}</label>
            </label>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('teacher-panel-overlay').classList.add('show');
}

function closeTeacherPanel() {
  document.getElementById('teacher-panel-overlay').classList.remove('show');
}

// ===== DASHBOARD RENDER =====
async function renderDashboard() {
  if (isTeacher) {
    document.getElementById('teacher-panel-btn').style.display = '';
    document.getElementById('welcome-name').textContent = '👨‍🏫 Öğretmen Paneli';
    renderTeacherDashboard();
  } else {
    document.getElementById('teacher-panel-btn').style.display = 'none';
    document.getElementById('welcome-name').textContent = getStudentName();
    renderStudentDashboard();
  }
}

function renderTeacherDashboard() {
  const container = document.getElementById('sections-container');
  
  container.innerHTML = `
    <div style="padding: 2rem; text-align: center; background: var(--green-bg); border-radius: 20px; border: 2px dashed var(--green);">
      <div style="font-size: 2rem; margin-bottom: 1rem;">⚙️</div>
      <h2 style="color: var(--brown); margin-bottom: 0.5rem;">Yönetim Paneli</h2>
      <p style="color: var(--muted); margin-bottom: 1.5rem;">Bölümleri ayarlamak için aşağıdaki butonu tıklayın</p>
      <button class="teacher-panel-btn" onclick="openTeacherPanel()" style="border: 2px solid var(--gold); padding: 10px 20px; font-size: 0.9rem;">
        ⚙️ Bölümleri Yönet
      </button>
    </div>
  `;
}

function renderStudentDashboard() {
  const container = document.getElementById('sections-container');
  const studentGrade = getStudentGrade();
  
  const accessibleSections = SECTIONS.filter(section => {
    const config = sectionConfig[section.id] || { enabled: false };
    return config.enabled && config.grades.includes(studentGrade);
  });

  if (accessibleSections.length === 0) {
    container.innerHTML = `
      <div style="padding: 2rem; text-align: center; background: var(--red-bg); border-radius: 20px; border: 2px dashed var(--red);">
        <div style="font-size: 2rem; margin-bottom: 1rem;">🔒</div>
        <p style="color: var(--red);">Henüz erişebileceğiniz bölüm yok. Lütfen öğretmeninizle iletişim kurun.</p>
      </div>
    `;
    return;
  }

  const cardsHtml = accessibleSections.map(section => {
    const config = sectionConfig[section.id];
    return `
      <div class="card" onclick="accessSection('${section.id}')">
        <div class="card-icon">${section.emoji}</div>
        <div class="card-title">${section.label}</div>
        <div class="card-desc">${section.description}</div>
        <div style="font-size: 0.75rem; color: var(--gold); font-weight: 600; margin-top: auto;">
          📊 Grade ${config.grades.join(', Grade ')}
        </div>
      </div>
    `;
  }).join('');

  container.innerHTML = `
    <h2 class="section-title">📚 Bölümlerim</h2>
    <div class="game-grid">
      ${cardsHtml}
    </div>
  `;
}

// ===== HELPER FUNCTIONS =====
function getStudentName() {
  // This should fetch from your students database
  return `Öğrenci #${currentUserId.substring(0, 4)}`;
}

function getStudentGrade() {
  // This should fetch from your students database
  // For now returning a default
  return parseInt(localStorage.getItem(`grade_${currentUserId}`) || '1');
}

function accessSection(sectionId) {
  const section = SECTIONS.find(s => s.id === sectionId);
  if (section) {
    showToast(`🎵 ${section.label} açılıyor...`);
    // Burada ilgili bölüme yönlendirme yapılır
  }
}

function showToast(message) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.remove();
  }, 3000);
}

// ===== ONLINE BADGES SETUP =====
(function setupOnlineBadges() {
  function buildBadges(rawText) {
    const row = document.getElementById('online-badges-row');
    if (!row) return;
    const clean = (rawText || '').replace(/🟢\s*/g, '').trim();
    if (!clean || clean === 'Canlı Oda...') {
      row.innerHTML = '<span class="online-name-badge">🟢</span>';
      return;
    }
    const names = clean.split(',').map(n => n.trim()).filter(Boolean);
    row.innerHTML = names.map(n => `<span class="online-name-badge">🟢 ${n}</span>`).join('');
  }
  const pill = document.getElementById('_gs_active_count');
  if (!pill) return;
  const obs = new MutationObserver(() => buildBadges(pill.textContent || pill.innerText || ''));
  obs.observe(pill, { childList: true, subtree: true, characterData: true });
  buildBadges(pill.textContent || '');
})();
</script>
