<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <title>Gitar Klavyesi – I. Pozisyon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'Lato', sans-serif; background: #faf6ed; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.2rem 1rem 2rem; color: #5a3e2b; }
    header { text-align: center; margin-bottom: 0.7rem; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 600; color: #5a3e2b; }
    #app-wrap { width: 100%; max-width: 600px; }

    /* ── MOD SEÇİM KARTLARI ── */
    .mode-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1rem;
    }
    .mode-card {
      background: #fff;
      border: 2px solid #e8e0d5;
      border-radius: 18px;
      padding: 1rem 0.7rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.18s ease;
      box-shadow: 0 3px 14px rgba(90,62,43,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .mode-card:hover { border-color: #d4a373; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(90,62,43,0.1); }
    .mode-card.selected {
      border-color: #5a3e2b;
      background: #fdf6ed;
      box-shadow: 0 6px 20px rgba(90,62,43,0.12);
    }
    .mode-card-icon { font-size: 2rem; line-height: 1; }
    .mode-card-title { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 600; color: #5a3e2b; line-height: 1.3; }
    .mode-card-sub { font-size: 0.73rem; color: #b09070; font-weight: 600; line-height: 1.3; }
    .mode-card.selected .mode-card-title { color: #3a2010; }
    .mode-card-check {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid #d4c4b0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: transparent;
      transition: all 0.15s;
      margin-top: 2px;
    }
    .mode-card.selected .mode-card-check {
      background: #5a3e2b; border-color: #5a3e2b; color: #fff;
    }

    /* ── SETUP PANEL ── */
    .filter-card { background: #fff; border: 1.5px solid #e8e0d5; border-radius: 20px; padding: 1rem; margin-bottom: 1rem; box-shadow: 0 4px 20px rgba(90,62,43,0.04); text-align: center; }
    .filter-title { font-size: 0.85rem; font-weight: 700; color: #b09070; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .string-buttons { display: flex; justify-content: center; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 0.85rem; }
    .string-btn { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid #d4c4b0; background: #fff; color: #5a3e2b; font-size: 1.1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s ease; }
    .string-btn.all-btn { width: auto; height: 42px; padding: 0 16px; border-radius: 20px; font-size: 0.9rem; }
    .string-btn.active { background: #5a3e2b; border-color: #5a3e2b; color: #fff; box-shadow: 0 4px 10px rgba(90,62,43,0.2); }
    .action-buttons-wrap { display: flex; flex-direction: column; gap: 10px; }
    .start-exercise-btn { width: 100%; padding: 10px; font-size: 0.95rem; font-weight: 700; border-radius: 12px; border: 1.5px solid #d4a373; background: #f5e6d3; color: #5a3e2b; cursor: pointer; transition: all 0.12s; }
    .start-race-btn { border: 1.5px solid #e24b4a; background: #fdf0f0; color: #a32d2d; }
    .start-exercise-btn:disabled { background: #f5f5f5; border-color: #ddd; color: #aaa; cursor: not-allowed; }
    .back-to-menu-btn { font-size: 0.85rem; font-weight: 700; color: #b09070; background: #fff; border: 1.5px solid #e8e0d5; padding: 6px 14px; border-radius: 30px; cursor: pointer; font-family: inherit; transition: all 0.12s; box-shadow: 0 2px 8px rgba(90,62,43,0.02); }

    @media (hover: hover) {
      .start-exercise-btn:hover:not(:disabled) { background: #ebd3b8; }
      .start-race-btn:hover:not(:disabled) { background: #f9d5d5; }
      .back-to-menu-btn:hover { background: #f5e6d3; border-color: #d4c4b0; color: #5a3e2b; }
    }

    /* ── KART ── */
    .card { background: #fff; border: 1.5px solid #e8e0d5; border-radius: 20px; padding: 1.1rem 1.1rem 0.9rem; margin-bottom: 0.85rem; box-shadow: 0 4px 20px rgba(90,62,43,0.04); }
    .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; gap: 8px; }
    .timer-badge { font-size: 0.85rem; font-weight: 700; color: #8b5a2b; background: #f5e6d3; padding: 5px 12px; border-radius: 12px; border: 1px solid #e8d5c0; white-space: nowrap; }
    .timer-badge.race-mode { background: #fdf0f0; border: 1.5px solid #f9d5d5; color: #e24b4a; }

    #listen-btn { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; padding: 6px 14px; border-radius: 20px; border: 1.5px solid #d4a373; background: #fff; color: #8b5a2b; cursor: pointer; font-family: inherit; font-weight: 600; transition: all 0.2s; }
    #listen-btn.playing { background: #eaf3de; border-color: #6b8c42; color: #3b6d11; }
    @media (hover: hover) { #listen-btn:hover { background: #f5e6d3; } }

    /* ── FTN (Klavyeden Notaya): ipucu kutusu ── */
    .hint-box { text-align: center; font-size: 1.15rem; font-weight: 700; color: #5a3e2b; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px; background: #fdfaf4; padding: 8px 12px; border-radius: 12px; border: 1px dashed #d4c4b0; }
    .hint-string-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: #8b5a2b; color: #fff; border-radius: 50%; font-size: 0.95rem; font-weight: 700; }
    .hint-fret-text { color: #b37d4e; background: #f5e6d3; padding: 2px 10px; border-radius: 6px; }

    /* ── FTN: Şık kartları ── */
    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
    .choice-card { background: #fff; border: 2px solid #e8e0d5; border-radius: 16px; padding: 8px 10px 6px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; position: relative; box-shadow: 0 2px 8px rgba(90,62,43,0.03); overflow: visible; -webkit-tap-highlight-color: transparent; outline: none; }
    @media (hover: hover) { .choice-card:hover:not(.disabled):not(.correct):not(.wrong) { border-color: #d4a373; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(90,62,43,0.1); } }
    .choice-card:active:not(.disabled) { transform: scale(0.98); }
    .choice-staff { width: 110px; height: 115px; margin: 4px 0 0; overflow: visible; }
    .choice-staff svg { max-width: 100%; height: auto; overflow: visible; }
    .choice-card.correct { background: #eaf3de; border-color: #6b8c42; }
    .choice-card.wrong { background: #fdf0f0; border-color: #c75b39; }
    .choice-card.disabled { cursor: default; opacity: 0.92; }

    /* ── NTF (Notadan Klavyeye): soru staff ── */
    .question-staff-card { background: #fff; border: 1.5px solid #e8e0d5; border-radius: 20px; padding: 1.2rem 1rem 1rem; margin-bottom: 0.85rem; box-shadow: 0 4px 20px rgba(90,62,43,0.04); display: flex; flex-direction: column; align-items: center; }
    #question-staff { width: 300px; height: 120px; overflow: visible; display: flex; justify-content: center; align-items: center; }
    #question-staff svg { width: 100%; height: 100%; overflow: visible; }

    /* ── KLAVYE SVG ── */
    .guitar-wrap { width: 100%; display: flex; justify-content: center; align-items: center; margin: 0 auto 0.5rem; }
    .guitar-wrap svg { display: block; width: 100%; max-width: 440px; height: auto; overflow: visible; }

    /* NTF modunda fret butonları */
    .fret-btn { cursor: pointer; transition: fill 0.15s; -webkit-tap-highlight-color: transparent; }
    .fret-btn.disabled { cursor: default; pointer-events: none; }

    /* ── ORTAK ── */
    .message { text-align: center; font-size: 0.9rem; font-weight: 700; color: #8b6b4e; margin-bottom: 0.65rem; min-height: 22px; padding: 0 5px; }
    #auto-bar-wrap { height: 3px; background: #e0ddd6; border-radius: 2px; margin-bottom: 0.65rem; overflow: hidden; display: none; }
    #auto-bar { height: 100%; width: 100%; background: #6b8c42; border-radius: 2px; transition: width 1s linear; }
    .progress-area { display: flex; align-items: center; margin-bottom: 1.2rem; }
    .progress-track { flex: 1; height: 10px; background: #ede6d8; border-radius: 5px; overflow: hidden; border: 1px solid #e0d8c8; }
    .progress-fill { height: 100%; width: 0%; background: #8cb85f; border-radius: 5px; transition: width 0.4s ease; }
    .controls { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .ctrl-btn { padding: 11px; font-size: 0.85rem; font-weight: 700; border-radius: 12px; border: 1.5px solid #d4c4b0; background: #fff; color: #5a3e2b; cursor: pointer; font-family: inherit; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px; width: 100%; }
    .ctrl-btn.primary { background: #f5e6d3; border-color: #d4a373; }
    .ctrl-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    @media (hover: hover) { .ctrl-btn:hover:not(:disabled) { background: #f5e6d3; } .ctrl-btn.primary:hover:not(:disabled) { background: #ebd3b8; } }

    /* ── SONUÇ ── */
    .result-screen { display: none; text-align: center; padding: 1.5rem 1rem; }
    .result-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #6b8c42; margin-bottom: 1rem; }
    .result-stats { background: #fdfaf4; border: 1.5px dashed #d4c4b0; border-radius: 16px; padding: 1.2rem; margin-bottom: 1.5rem; text-align: left; }
    .stat-row { display: flex; justify-content: space-between; font-size: 1.1rem; padding: 8px 0; border-bottom: 1px dashed #e8e0d5; color: #5a3e2b; }
    .stat-row:last-child { border-bottom: none; }
    .stat-val { font-weight: 700; color: #8b5a2b; }
    .stat-val.correct-val { color: #6b8c42; }
    .stat-val.wrong-val { color: #c75b39; }

    .site-footer { display: flex; justify-content: center; gap: 22px; margin-top: 2.5rem; }
    .site-footer a { color: #b0a392; font-size: 2.2rem; transition: all .2s ease; }
    .site-footer a:hover { color: #d4a373; transform: translateY(-2px); }

    @media (max-width: 420px) {
      .mode-cards { gap: 8px; }
      .mode-card { padding: 0.85rem 0.5rem; }
      .choices { gap: 8px; }
      .choice-card { padding: 10px 6px; }
      .choice-staff { width: 90px; height: 100px; }
    }
  </style>
</head>
<body>

<header>
  <h1>🎸 Gitar Klavyesi – I. Pozisyon</h1>
</header>

<div id="app-wrap">

  <!-- ── GİRİŞ EKRANI ── -->
  <div id="setup-area">

    <!-- MOD SEÇİMİ -->
    <div class="mode-cards">
      <div class="mode-card selected" id="mode-card-ftn" onclick="selectQuizMode('ftn')">
        <div class="mode-card-icon">🎸</div>
        <div class="mode-card-title">Klavyeden<br>Notaya</div>
        <div class="mode-card-sub">Perdedeki konumu gör,<br>notayı bul</div>
        <div class="mode-card-check">✓</div>
      </div>
      <div class="mode-card" id="mode-card-ntf" onclick="selectQuizMode('ntf')">
        <div class="mode-card-icon">🎵</div>
        <div class="mode-card-title">Notadan<br>Klavyeye</div>
        <div class="mode-card-sub">Notayı gör,<br>klavyede yerini bul</div>
        <div class="mode-card-check">✓</div>
      </div>
    </div>

    <!-- TEL SEÇİMİ + BAŞLAT -->
    <div class="filter-card">
      <div class="filter-title">Çalışılacak Telleri Seçin</div>
      <div class="string-buttons">
        <button id="btn-all" class="string-btn all-btn active" onclick="toggleAllStrings()">Hepsi</button>
        <button class="string-btn active string-num-btn" data-string="1" onclick="toggleString(1)">①</button>
        <button class="string-btn active string-num-btn" data-string="2" onclick="toggleString(2)">②</button>
        <button class="string-btn active string-num-btn" data-string="3" onclick="toggleString(3)">③</button>
        <button class="string-btn active string-num-btn" data-string="4" onclick="toggleString(4)">④</button>
        <button class="string-btn active string-num-btn" data-string="5" onclick="toggleString(5)">⑤</button>
        <button class="string-btn active string-num-btn" data-string="6" onclick="toggleString(6)">⑥</button>
      </div>
      <div class="action-buttons-wrap">
        <button id="start-btn" class="start-exercise-btn" onclick="startExercise('practice')">Egzersize Başla (Zamansız) 🎯</button>
        <button id="race-btn" class="start-exercise-btn start-race-btn" onclick="startExercise('race')">Yarışmaya Başla (40 Saniye) 🏆</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       QUIZ ALANI
  ══════════════════════════════════════ -->
  <div id="quiz-zone" style="display:none;">

    <!-- ── FTN: Klavyeden Notaya ── -->
    <div id="ftn-quiz" style="display:none;">
      <div class="card">
        <div class="card-top">
          <button id="listen-btn-ftn" onclick="replay()">🔊 Dinle</button>
          <div class="timer-badge" id="timer-ftn">Süre: 00:00</div>
        </div>
        <div class="hint-box" id="hint-text">
          💡 <span class="hint-string-badge">1</span>. Tel – <span class="hint-fret-text">I. Perde</span>
        </div>
        <div class="guitar-wrap">
          <svg id="guitar-svg-ftn" viewBox="60 0 400 210" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
            <defs>
              <linearGradient id="fbGrad2" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#2a1a0e"/><stop offset="100%" stop-color="#1a0f06"/>
              </linearGradient>
              <linearGradient id="nutGrad2" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#f0e0b0"/><stop offset="100%" stop-color="#c8a050"/>
              </linearGradient>
              <filter id="dotGlow2" x="-80%" y="-80%" width="260%" height="260%">
                <feGaussianBlur stdDeviation="3.5" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <rect x="62" y="32" width="392" height="148" rx="5" fill="url(#fbGrad2)" stroke="#3a2010" stroke-width="1.5"/>
            <rect x="62" y="32" width="392" height="3" rx="1" fill="#c8a050" opacity="0.5"/>
            <rect x="62" y="177" width="392" height="3" rx="1" fill="#c8a050" opacity="0.5"/>
            <rect x="112" y="30" width="8" height="152" rx="2" fill="url(#nutGrad2)" stroke="#c0a040" stroke-width="0.8"/>
            <rect x="198" y="32" width="4" height="148" rx="1" fill="#b0b8b0" opacity="0.85"/>
            <rect x="285" y="32" width="4" height="148" rx="1" fill="#b0b8b0" opacity="0.85"/>
            <rect x="370" y="32" width="4" height="148" rx="1" fill="#b0b8b0" opacity="0.85"/>
            <rect x="450" y="32" width="4" height="148" rx="1" fill="#b0b8b0" opacity="0.85"/>
            <text x="155" y="24" text-anchor="middle" fill="#8b6b4e" font-size="12" font-weight="700" font-family="Lato,sans-serif">I</text>
            <text x="243" y="24" text-anchor="middle" fill="#8b6b4e" font-size="12" font-weight="700" font-family="Lato,sans-serif">II</text>
            <text x="328" y="24" text-anchor="middle" fill="#8b6b4e" font-size="12" font-weight="700" font-family="Lato,sans-serif">III</text>
            <text x="412" y="24" text-anchor="middle" fill="#8b6b4e" font-size="12" font-weight="700" font-family="Lato,sans-serif">IV</text>
            <line x1="70" y1="50"  x2="454" y2="50"  stroke="#e8d09a" stroke-width="0.9" opacity="0.95"/>
            <line x1="70" y1="74"  x2="454" y2="74"  stroke="#e0c880" stroke-width="1.2" opacity="0.95"/>
            <line x1="70" y1="98"  x2="454" y2="98"  stroke="#d8bc6a" stroke-width="1.5" opacity="0.95"/>
            <line x1="70" y1="122" x2="454" y2="122" stroke="#c8a84a" stroke-width="1.9" opacity="0.95"/>
            <line x1="70" y1="146" x2="454" y2="146" stroke="#b89030" stroke-width="2.3" opacity="0.95"/>
            <line x1="70" y1="170" x2="454" y2="170" stroke="#a87820" stroke-width="2.8" opacity="0.95"/>
            <circle cx="93" cy="50"  r="10" fill="#fff8ef" stroke="#d4a373" stroke-width="1.2"/>
            <text   x="93" y="54"  text-anchor="middle" fill="#5a3e2b" font-size="10" font-weight="700" font-family="Lato,sans-serif">1</text>
            <circle cx="93" cy="74"  r="10" fill="#fff8ef" stroke="#d4a373" stroke-width="1.2"/>
            <text   x="93" y="78"  text-anchor="middle" fill="#5a3e2b" font-size="10" font-weight="700" font-family="Lato,sans-serif">2</text>
            <circle cx="93" cy="98"  r="10" fill="#fff8ef" stroke="#d4a373" stroke-width="1.2"/>
            <text   x="93" y="102" text-anchor="middle" fill="#5a3e2b" font-size="10" font-weight="700" font-family="Lato,sans-serif">3</text>
            <circle cx="93" cy="122" r="10" fill="#fff8ef" stroke="#d4a373" stroke-width="1.2"/>
            <text   x="93" y="126" text-anchor="middle" fill="#5a3e2b" font-size="10" font-weight="700" font-family="Lato,sans-serif">4</text>
            <circle cx="93" cy="146" r="10" fill="#fff8ef" stroke="#d4a373" stroke-width="1.2"/>
            <text   x="93" y="150" text-anchor="middle" fill="#5a3e2b" font-size="10" font-weight="700" font-family="Lato,sans-serif">5</text>
            <circle cx="93" cy="170" r="10" fill="#fff8ef" stroke="#d4a373" stroke-width="1.2"/>
            <text   x="93" y="174" text-anchor="middle" fill="#5a3e2b" font-size="10" font-weight="700" font-family="Lato,sans-serif">6</text>
            <circle id="fret-highlight-ftn" cx="0" cy="0" r="14" fill="#f4d03f" stroke="#d4ac0d" stroke-width="2.5" filter="url(#dotGlow2)" opacity="0.95" style="display:none;pointer-events:none;"/>
            <text id="fret-hl-q-ftn" x="0" y="0" text-anchor="middle" dominant-baseline="central" fill="#5a3000" font-size="11" font-weight="700" font-family="Lato,sans-serif" style="display:none;pointer-events:none;">?</text>
          </svg>
        </div>
      </div>
      <div class="choices" id="choices-ftn"></div>
    </div>

    <!-- ── NTF: Notadan Klavyeye ── -->
    <div id="ntf-quiz" style="display:none;">
      <div class="question-staff-card">
        <div class="card-top" style="width:100%;">
          <button id="listen-btn-ntf" onclick="replay()">🔊 Dinle</button>
          <div class="timer-badge" id="timer-ntf">Süre: 00:00</div>
        </div>
        <div id="question-staff"></div>
      </div>
      <div class="card">
        <div class="guitar-wrap">
          <svg id="guitar-svg-ntf" viewBox="60 0 400 210" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
            <defs>
              <linearGradient id="fbGrad3" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#2a1a0e"/><stop offset="100%" stop-color="#1a0f06"/>
              </linearGradient>
              <linearGradient id="nutGrad3" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#f0e0b0"/><stop offset="100%" stop-color="#c8a050"/>
              </linearGradient>
              <filter id="dotGlow3" x="-80%" y="-80%" width="260%" height="260%">
                <feGaussianBlur stdDeviation="4" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <rect x="62" y="32" width="392" height="148" rx="5" fill="url(#fbGrad3)" stroke="#3a2010" stroke-width="1.5"/>
            <rect x="62" y="32" width="392" height="3" rx="1" fill="#c8a050" opacity="0.5"/>
            <rect x="62" y="177" width="392" height="3" rx="1" fill="#c8a050" opacity="0.5"/>
            <rect x="112" y="30" width="8" height="152" rx="2" fill="url(#nutGrad3)" stroke="#c0a040" stroke-width="0.8"/>
            <rect x="198" y="32" width="4" height="148" rx="1" fill="#b0b8b0" opacity="0.85"/>
            <rect x="285" y="32" width="4" height="148" rx="1" fill="#b0b8b0" opacity="0.85"/>
            <rect x="370" y="32" width="4" height="148" rx="1" fill="#b0b8b0" opacity="0.85"/>
            <rect x="450" y="32" width="4" height="148" rx="1" fill="#b0b8b0" opacity="0.85"/>

<script>

// ══════════════════════════════════════════
//  VERİ
// ══════════════════════════════════════════
const NOTES = [
  { string:1, fret:0, name:'Mi',  freq:329.63, key:'e/5', line:4.0 },
  { string:1, fret:1, name:'Fa',  freq:349.23, key:'f/5', line:4.5 },

  { string:2, fret:3, name:'Re',  freq:293.66, key:'d/5', line:3.0 },
  { string:3, fret:0, name:'Sol', freq:196.00, key:'g/4', line:1.0 },
  { string:3, fret:2, name:'La',  freq:220.00, key:'a/4', line:1.5 },
  { string:4, fret:0, name:'Re',  freq:146.83, key:'d/4', line:-0.5 },
  { string:4, fret:2, name:'Mi',  freq:164.81, key:'e/4', line:0.0 },
  { string:4, fret:3, name:'Fa',  freq:174.61, key:'f/4', line:0.5 },
  { string:5, fret:0, name:'La',  freq:110.00, key:'a/3', line:-1.5 },
  { string:5, fret:2, name:'Si',  freq:123.47, key:'b/3', line:-1.0 },
  { string:5, fret:3, name:'Do',  freq:130.81, key:'c/4', line:-0.5 },
  { string:6, fret:0, name:'Mi',  freq:82.41,  key:'e/3', line:-3.0 },
  { string:6, fret:1, name:'Fa',  freq:87.31,  key:'f/3', line:-2.5 },
  { string:6, fret:3, name:'Sol', freq:98.00,  key:'g/3', line:-2.0 }
];

const ROMAN_FRETS = { 0:'Boş Tel', 1:'I. Perde', 2:'II. Perde', 3:'III. Perde', 4:'IV. Perde' };
const FRET_CX = { 0:93, 1:157, 2:243, 3:328, 4:412 };
const STRING_CY = { 1:50, 2:74, 3:98, 4:122, 5:146, 6:170 };
const TOTAL_QUESTIONS_COUNT = 12;
const ALL_NOTE_NAMES = ['Mi','Fa','Sol','La','Si','Do','Re'];

// Tüm perde kombinasyonları (NTF modu için)
const ALL_FRETS_MAP = [];
for (let s=1; s<=6; s++) for (let f=0; f<=4; f++) ALL_FRETS_MAP.push({string:s, fret:f});

const ERR = [
  "Yazıklar olsun!","Kulaklarımız kanadı...","Sende hiç utanma yok mu yaa",
  "Instagram'dan ekle beni seni engellim","Tüm başarılar Yunus Hocadan, bunun gibi hatalar ise senden..",
  "Yunus Hoca bunu görmemiş olsun...","Gitarı yavaşça yere bırak...","Sen daha iyi enstrümanlara layıksın",
  "Aynen knk aynen sensin","Iyyy yine mi hata","Ağır popçusun belli knk","Lâ havle..",
  "Sen en iyisi flüt çal knk","Tekrar deneme, yeter.","Bir yerde bırakmak lazım sanki",
  "Bir durun olsun beea","Sen öyle bil aynen","En sevmediğim öğrencim naber",
  "Ex'den Next olur senden öğrenci olmaz :D"
];

// ══════════════════════════════════════════
//  DURUM
// ══════════════════════════════════════════
let quizMode     = 'ftn';   // 'ftn' = Klavyeden Notaya | 'ntf' = Notadan Klavyeye
let currentMode  = 'practice';
let selectedStrings = new Set([1,2,3,4,5,6]);
let filteredNotes = [];
let current = null;
let answered = false;
let interacted = false;
let autoTimer = null;
let correctCount = 0;
let wrongCount = 0;
let currentIndex = 0;
let startTime = null;
let timerInterval = null;
let gameTimer = null;
let timeLeft = 40;
let audioCtx = null;

// Ağırlık sistemi
const noteWeights = {};
NOTES.forEach(n => { noteWeights[nk(n)] = 1; });
let lastNoteKey = null;
function nk(n) { return `${n.string}-${n.fret}`; }

function pickWeightedNote(pool) {
  const candidates = pool.filter(n => nk(n) !== lastNoteKey);
  const eligible = candidates.length > 0 ? candidates : pool;
  const weights = eligible.map(n => noteWeights[nk(n)]);
  const total = weights.reduce((a,b)=>a+b, 0);
  let r = Math.random() * total;
  for (let i=0; i<eligible.length; i++) { r -= weights[i]; if (r<=0) return eligible[i]; }
  return eligible[eligible.length-1];
}
function onCorrect(note) { noteWeights[nk(note)] = Math.max(1, noteWeights[nk(note)] * 0.7); }
function onWrong(note)   { noteWeights[nk(note)] = Math.min(12, noteWeights[nk(note)] * 2.2); }

// ══════════════════════════════════════════
//  MOD SEÇİMİ
// ══════════════════════════════════════════
function selectQuizMode(mode) {
  quizMode = mode;
  document.getElementById('mode-card-ftn').classList.toggle('selected', mode==='ftn');
  document.getElementById('mode-card-ntf').classList.toggle('selected', mode==='ntf');
}

// ══════════════════════════════════════════
//  TEL SEÇİMİ
// ══════════════════════════════════════════
function toggleAllStrings() {
  const allBtn = document.getElementById('btn-all');
  const numBtns = document.querySelectorAll('.string-num-btn');
  if (selectedStrings.size===6) {
    selectedStrings.clear(); allBtn.classList.remove('active'); numBtns.forEach(b=>b.classList.remove('active'));
  } else {
    selectedStrings=new Set([1,2,3,4,5,6]); allBtn.classList.add('active'); numBtns.forEach(b=>b.classList.add('active'));
  }
  checkStartButton();
}
function toggleString(num) {
  const btn=document.querySelector(`.string-num-btn[data-string="${num}"]`);
  const allBtn=document.getElementById('btn-all');
  if (selectedStrings.has(num)){ selectedStrings.delete(num); btn.classList.remove('active'); }
  else { selectedStrings.add(num); btn.classList.add('active'); }
  allBtn.classList.toggle('active', selectedStrings.size===6);
  checkStartButton();
}
function checkStartButton() {
  const z = selectedStrings.size===0;
  document.getElementById('start-btn').disabled=z;
  document.getElementById('race-btn').disabled=z;
}

// ══════════════════════════════════════════
//  SES
// ══════════════════════════════════════════
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playGuitar(freq) {
  try {
    const ctx=getAudio(); if(ctx.state==='suspended') ctx.resume();
    const now=ctx.currentTime;
    const master=ctx.createGain(); master.connect(ctx.destination);
    const filter=ctx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=freq*2.8; filter.Q.value=0.7; filter.connect(master);
    const osc=ctx.createOscillator(); osc.type='triangle'; osc.frequency.value=freq;
    const og=ctx.createGain(); og.gain.setValueAtTime(0,now); og.gain.linearRampToValueAtTime(0.45,now+0.006); og.gain.exponentialRampToValueAtTime(0.001,now+2.2);
    osc.connect(og); og.connect(filter); osc.start(now); osc.stop(now+2.2);
    const sine=ctx.createOscillator(); sine.type='sine'; sine.frequency.value=freq;
    const sg=ctx.createGain(); sg.gain.setValueAtTime(0,now); sg.gain.linearRampToValueAtTime(0.25,now+0.006); sg.gain.exponentialRampToValueAtTime(0.001,now+1.8);
    sine.connect(sg); sg.connect(filter); sine.start(now); sine.stop(now+1.8);
    [2,3,4].forEach(h=>{ const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=freq*h; const g=ctx.createGain(); g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.1/h,now+0.005); g.gain.exponentialRampToValueAtTime(0.001,now+1.2); o.connect(g); g.connect(filter); o.start(now); o.stop(now+1.2); });
    master.gain.setValueAtTime(0.75,now); master.gain.exponentialRampToValueAtTime(0.001,now+2.5);
    const listenId = quizMode==='ftn'?'listen-btn-ftn':'listen-btn-ntf';
    const btn=document.getElementById(listenId); btn.classList.add('playing'); setTimeout(()=>btn.classList.remove('playing'),700);
  } catch(e){}
}
function replay() { interacted=true; if(current) playGuitar(current.freq); }

// ══════════════════════════════════════════
//  FTN – Klavyeden Notaya
// ══════════════════════════════════════════
function ftn_moveHighlight(stringN, fretN) {
  const cx=FRET_CX[fretN], cy=STRING_CY[stringN];
  const dot=document.getElementById('fret-highlight-ftn');
  const qtxt=document.getElementById('fret-hl-q-ftn');
  dot.setAttribute('cx',cx); dot.setAttribute('cy',cy);
  qtxt.setAttribute('x',cx); qtxt.setAttribute('y',cy);
  dot.style.display=''; qtxt.style.display='';
}

function drawMiniStaff(div, noteObj) {
  div.innerHTML='';
  try {
    const {Renderer,Stave,StaveNote,Voice,Formatter}=Vex.Flow;
    const renderer=new Renderer(div, Renderer.Backends.SVG);
    renderer.resize(110,115);
    const ctx=renderer.getContext();
    const stave=new Stave(0,-10,110);
    stave.addClef('treble').setContext(ctx).draw();
    const note=new StaveNote({keys:[noteObj.key],duration:'w'});
    if(note.keyProps&&note.keyProps[0]){ note.keyProps[0].line=noteObj.line; note.keyProps[0].clef='treble'; }
    const voice=new Voice({num_beats:4,beat_value:4});
    voice.addTickables([note]);
    new Formatter().joinVoices([voice]).format([voice],85);
    voice.draw(ctx,stave);
    const s=div.querySelector('svg'); if(s){s.style.width='100%';s.style.height='auto';}
  } catch(e){}
}

function ftn_showQuestion() {
  ftn_moveHighlight(current.string, current.fret);
  document.getElementById('hint-text').innerHTML =
    `💡 <span class="hint-string-badge">${current.string}</span>. Tel – <span class="hint-fret-text">${ROMAN_FRETS[current.fret]}</span>`;

  const allNames=ALL_NOTE_NAMES;
  const wrongs=[...allNames.filter(n=>n!==current.name)].sort(()=>Math.random()-0.5).slice(0,3);
  const wrongNotes=wrongs.map(n=>NOTES.find(x=>x.name===n)||NOTES.find(x=>x.name!==current.name));
  const choices=[current,...wrongNotes].sort(()=>Math.random()-0.5);
  const box=document.getElementById('choices-ftn'); box.innerHTML='';
  choices.forEach(noteObj=>{
    const card=document.createElement('div'); card.className='choice-card'; card.dataset.choice=noteObj.name;
    card.onclick=()=>ftn_selectChoice(card, noteObj.name);
    const staffDiv=document.createElement('div'); staffDiv.className='choice-staff';
    card.appendChild(staffDiv); box.appendChild(card);
    drawMiniStaff(staffDiv, noteObj);
  });
}

function ftn_selectChoice(card, name) {
  if (answered) return;
  answered=true; interacted=true;
  document.querySelectorAll('#choices-ftn .choice-card').forEach(c=>{c.classList.add('disabled');c.onclick=null;});
  const msg=document.getElementById('message');
  if (name===current.name) {
    card.classList.add('correct');
    msg.textContent='✓ Doğru! İyi iş çıkardın, devam et!'; msg.style.color='#6b8c42';
    playGuitar(current.freq); correctCount++;
    onCorrect(current);
    document.getElementById('next-btn').disabled=false;
    startAutoAdvance();
  } else {
    card.classList.add('wrong');
    msg.textContent='✗ '+ERR[Math.floor(Math.random()*ERR.length)]+' — Doğrusu: '+current.name; msg.style.color='#c75b39';
    wrongCount++; onWrong(current);
    document.querySelectorAll('#choices-ftn .choice-card').forEach(c=>{ if(c.dataset.choice===current.name) c.classList.add('correct'); });
    document.getElementById('next-btn').disabled=false;
  }
  if (currentMode!=='race') currentIndex++;
}

// ══════════════════════════════════════════
//  NTF – Notadan Klavyeye
// ══════════════════════════════════════════
function drawQuestionStaff(noteObj) {
  const div=document.getElementById('question-staff'); div.innerHTML='';
  try {
    const {Renderer,Stave,StaveNote,Voice,Formatter}=Vex.Flow;
    const renderer=new Renderer(div, Renderer.Backends.SVG);
    renderer.resize(300,130);
    const ctx=renderer.getContext();
    ctx.scale(1.8,1.8);
    const stave=new Stave(10,-20,140);
    stave.addClef('treble').setContext(ctx).draw();
    const note=new StaveNote({keys:[noteObj.key],duration:'w'});
    if(note.keyProps&&note.keyProps[0]){ note.keyProps[0].line=noteObj.line; note.keyProps[0].clef='treble'; }
    const voice=new Voice({num_beats:4,beat_value:4});
    voice.addTickables([note]);
    new Formatter().joinVoices([voice]).format([voice],80);
    voice.draw(ctx,stave);
  } catch(e){ console.error(e); }
}

function ntf_getCx(fret) {
  const d={0:{x:116,w:0},1:{x:116,w:82},2:{x:198,w:87},3:{x:285,w:85},4:{x:370,w:80}};
  return fret===0 ? 93 : d[fret].x + d[fret].w/2;
}

function buildGuitarInteraction() {
  const group=document.getElementById('fret-buttons-group'); group.innerHTML='';
  ALL_FRETS_MAP.forEach(item=>{
    if (!selectedStrings.has(item.string)) return;
    const g=document.createElementNS("http://www.w3.org/2000/svg","g");
    g.setAttribute("class","fret-btn");
    g.setAttribute("data-string",item.string);
    g.setAttribute("data-fret",item.fret);
    const cy=STRING_CY[item.string];
    if (item.fret===0) {
      const circle=document.createElementNS("http://www.w3.org/2000/svg","circle");
      circle.setAttribute("cx",93); circle.setAttribute("cy",cy); circle.setAttribute("r",12);
      circle.setAttribute("fill","#fff8ef"); circle.setAttribute("stroke","#d4a373"); circle.setAttribute("stroke-width","1.5");
      const txt=document.createElementNS("http://www.w3.org/2000/svg","text");
      txt.setAttribute("x",93); txt.setAttribute("y",cy+4); txt.setAttribute("text-anchor","middle");
      txt.setAttribute("fill","#5a3e2b"); txt.setAttribute("font-size","11"); txt.setAttribute("font-weight","700");
      txt.setAttribute("font-family","Lato,sans-serif"); txt.textContent=item.string; txt.style.pointerEvents='none';
      g.appendChild(circle); g.appendChild(txt);
    } else {
      let x=0,width=0;
      if(item.fret===1){x=116;width=82;} else if(item.fret===2){x=198;width=87;}
      else if(item.fret===3){x=285;width=85;} else if(item.fret===4){x=370;width=80;}
      const rect=document.createElementNS("http://www.w3.org/2000/svg","rect");
      rect.setAttribute("x",x); rect.setAttribute("y",cy-14); rect.setAttribute("width",width); rect.setAttribute("height",28);
      rect.setAttribute("fill","transparent");
      const cx2=x+width/2;
      const dot=document.createElementNS("http://www.w3.org/2000/svg","circle");
      dot.setAttribute("cx",cx2); dot.setAttribute("cy",cy); dot.setAttribute("r",4);
      dot.setAttribute("fill","#b0b8b0"); dot.setAttribute("opacity","0.35"); dot.style.pointerEvents='none';
      g.appendChild(rect); g.appendChild(dot);
    }
    g.onclick=()=>ntf_handleFretClick(g,item.string,item.fret);
    group.appendChild(g);
  });
}

function ntf_createFeedback(parentG,cx,cy,color) {
  const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
  c.setAttribute("class","fret-feedback"); c.setAttribute("cx",cx); c.setAttribute("cy",cy);
  c.setAttribute("r",14); c.setAttribute("fill",color); c.setAttribute("opacity","0.92");
  c.setAttribute("filter","url(#dotGlow3)"); c.style.pointerEvents='none';
  parentG.appendChild(c);
}

function ntf_showCorrectTarget() {
  const cx=ntf_getCx(current.fret), cy=STRING_CY[current.string];
  const dot=document.getElementById('fret-highlight-ntf');
  const txt=document.getElementById('fret-hl-q-ntf');
  dot.setAttribute('cx',cx); dot.setAttribute('cy',cy);
  txt.setAttribute('x',cx); txt.setAttribute('y',cy);
  dot.style.display=''; txt.style.display='';
}

function ntf_handleFretClick(element, stringNum, fretNum) {
  if (answered) return;
  answered=true; interacted=true;
  document.querySelectorAll('.fret-btn').forEach(g=>g.classList.add('disabled'));
  const msg=document.getElementById('message');
  const cx=ntf_getCx(fretNum), cy=STRING_CY[stringNum];
  const clickedNote=NOTES.find(n=>n.string===stringNum&&n.fret===fretNum);
  const isCorrect=clickedNote&&clickedNote.name===current.name;
  if (isCorrect) {
    ntf_createFeedback(element,cx,cy,'#6b8c42');
    msg.textContent=`✓ Doğru! ${current.name} — ${stringNum}. Tel, ${ROMAN_FRETS[fretNum]}`; msg.style.color='#6b8c42';
    playGuitar(current.freq); correctCount++; onCorrect(current);
    document.getElementById('next-btn').disabled=false;
    startAutoAdvance();
  } else {
    ntf_createFeedback(element,cx,cy,'#c75b39');
    msg.textContent='✗ '+ERR[Math.floor(Math.random()*ERR.length)]+' — Doğrusu: '+current.string+'. Tel, '+ROMAN_FRETS[current.fret]+` (${current.name})`; msg.style.color='#c75b39';
    wrongCount++; onWrong(current);
    ntf_showCorrectTarget();
    document.getElementById('next-btn').disabled=false;
  }
  if (currentMode!=='race') currentIndex++;
}

// ══════════════════════════════════════════
//  ORTAK SORU AKIŞI
// ══════════════════════════════════════════
function nextQuestion() {
  if (currentMode==='race'&&timeLeft<=0) return;
  clearAutoTimer(); answered=false;
  if (document.activeElement) document.activeElement.blur();
  document.getElementById('message').textContent='🎵 Soruyu incele!'; document.getElementById('message').style.color='#8b6b4e';
  document.getElementById('next-btn').disabled=true;

  if (quizMode==='ntf') {
    document.querySelectorAll('.fret-btn').forEach(g=>{ g.classList.remove('disabled'); g.querySelectorAll('.fret-feedback').forEach(f=>f.remove()); });
    document.getElementById('fret-highlight-ntf').style.display='none';
    document.getElementById('fret-hl-q-ntf').style.display='none';
  } else {
    document.getElementById('fret-highlight-ftn').style.display='none';
    document.getElementById('fret-hl-q-ftn').style.display='none';
  }

  if (currentMode==='practice'&&currentIndex>=TOTAL_QUESTIONS_COUNT) { showFinalResults(); return; }

  current=pickWeightedNote(filteredNotes);
  lastNoteKey=nk(current);

  if (quizMode==='ftn') { ftn_showQuestion(); }
  else                  { drawQuestionStaff(current); }

  if (currentMode!=='race') {
    document.getElementById('progress-fill').parentElement.parentElement.style.display='flex';
    document.getElementById('progress-fill').style.width=(currentIndex/TOTAL_QUESTIONS_COUNT*100)+'%';
  } else {
    document.getElementById('progress-fill').parentElement.parentElement.style.display='none';
  }
  if (interacted) setTimeout(()=>playGuitar(current.freq),300);
}

function manualNext() {
  if (currentMode==='race'&&timeLeft<=0) return;
  clearAutoTimer(); nextQuestion();
}

// ══════════════════════════════════════════
//  OTOMATİK GEÇİŞ
// ══════════════════════════════════════════
function startAutoAdvance() {
  const wrap=document.getElementById('auto-bar-wrap'), bar=document.getElementById('auto-bar');
  wrap.style.display='block'; bar.style.width='100%'; bar.style.transition='none';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ bar.style.transition='width 1s linear'; bar.style.width='0%'; }));
  autoTimer=setTimeout(()=>{ clearAutoTimer(); nextQuestion(); },1000);
}
function clearAutoTimer() {
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  document.getElementById('auto-bar-wrap').style.display='none';
}

// ══════════════════════════════════════════
//  ZAMANLAYICILAR
// ══════════════════════════════════════════
function startTimer() {
  startTime=Date.now(); if(timerInterval) clearInterval(timerInterval);
  const timerId=quizMode==='ftn'?'timer-ftn':'timer-ntf';
  timerInterval=setInterval(()=>{
    const s=Math.floor((Date.now()-startTime)/1000);
    document.getElementById(timerId).textContent='Süre: '+String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  },1000);
}
function startGameTimer() {
  if(gameTimer) clearInterval(gameTimer);
  const timerId=quizMode==='ftn'?'timer-ftn':'timer-ntf';
  gameTimer=setInterval(()=>{
    timeLeft--;
    if(timeLeft<=0){ document.getElementById(timerId).textContent='Süre Bitti!'; clearInterval(gameTimer); showFinalResults(); }
    else { document.getElementById(timerId).textContent='Kalan Süre: '+timeLeft; }
  },1000);
}

// ══════════════════════════════════════════
//  OYUN YÖNETİMİ
// ══════════════════════════════════════════
function startExercise(mode) {
  filteredNotes=NOTES.filter(n=>selectedStrings.has(n.string));
  if(filteredNotes.length===0) return;
  currentMode=mode; correctCount=0; wrongCount=0; currentIndex=0; answered=false; interacted=false; lastNoteKey=null;

  document.getElementById('setup-area').style.display='none';
  document.getElementById('quiz-zone').style.display='block';
  document.getElementById('result-zone').style.display='none';

  // Mod'a göre doğru quiz bölümünü göster
  document.getElementById('ftn-quiz').style.display = quizMode==='ftn' ? 'block':'none';
  document.getElementById('ntf-quiz').style.display = quizMode==='ntf' ? 'block':'none';

  // Timer sıfırla
  const timerId=quizMode==='ftn'?'timer-ftn':'timer-ntf';
  if (currentMode==='race') {
    timeLeft=40;
    document.getElementById(timerId).textContent='Kalan Süre: 40';
    document.getElementById(timerId).classList.add('race-mode');
    startGameTimer();
  } else {
    document.getElementById(timerId).textContent='Süre: 00:00';
    document.getElementById(timerId).classList.remove('race-mode');
    startTimer();
  }

  if (quizMode==='ntf') buildGuitarInteraction();

  nextQuestion();
}

function goBackToMenu() {
  if(timerInterval) clearInterval(timerInterval);
  if(gameTimer) clearInterval(gameTimer);
  clearAutoTimer();
  document.getElementById('quiz-zone').style.display='none';
  document.getElementById('result-zone').style.display='none';
  document.getElementById('setup-area').style.display='block';
  document.getElementById('next-btn').disabled=true;
}

function showFinalResults() {
  if(timerInterval) clearInterval(timerInterval);
  if(gameTimer) clearInterval(gameTimer);
  clearAutoTimer();
  document.getElementById('quiz-zone').style.display='none';
  document.getElementById('result-zone').style.display='block';
  const statsBox=document.getElementById('result-stats');
  const commentTxt=document.getElementById('result-comment');
  const titleEl=document.getElementById('result-title');
  if (currentMode==='race') {
    titleEl.textContent='Yarışma Tamamlandı! 🏁';
    let rank,comment;
    if(correctCount>=18){rank='🏆 Gitar Virtüözü!';comment='İnanılmaz! Parmaklar ve kulak uçuyor! Yunus Hoca seni ayakta alkışlıyor! 🎸';}
    else if(correctCount>=14){rank='🔥 Sahne Sanatçısı';comment='Notalar tıkır tıkır! Kulis kartını hak ettin kanka.';}
    else if(correctCount>=10){rank='⚡ Groove Gitarist';comment='İyi gidiyorsun! Bir tık daha hızlansan solist seni fark edecek.';}
    else if(correctCount>=5){rank='🎸 Sahildeki Akustikçi';comment='Bir umut var ama biraz daha çalışman lazım kanka!';}
    else{rank='🐢 Kaplumbağa Gitarist';comment='Gitarı yavaşça yere bırak kanka...';}
    statsBox.innerHTML=`<div class="stat-row"><span>Unvan:</span><span class="stat-val" style="color:#d4a373">${rank}</span></div><div class="stat-row"><span>Doğru:</span><span class="stat-val correct-val">${correctCount} Doğru</span></div>`;
    commentTxt.innerHTML=`"${comment}"`;
  } else {
    titleEl.textContent='🎉 Test Tamamlandı!';
    const s=Math.floor((Date.now()-startTime)/1000);
    const mins=Math.floor(s/60),secs=s%60;
    statsBox.innerHTML=`
      <div class="stat-row"><span>Toplam Süre:</span><span class="stat-val">${mins>0?mins+' dk '+secs+' sn':secs+' sn'}</span></div>
      <div class="stat-row"><span>Doğru:</span><span class="stat-val correct-val">${correctCount}</span></div>
      <div class="stat-row"><span>Yanlış:</span><span class="stat-val wrong-val">${wrongCount}</span></div>`;
    commentTxt.textContent='Bravo! Ekran görüntüsü al ve grupta paylaş 🎸';
  }
}

</script>
