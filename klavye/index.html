<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gitar Klavyesi – Pozisyon 1 (Sınav Modu)</title>
  <script src="/score-save.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;700&display=swap');
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Lato', sans-serif;
      background: #faf6ed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.2rem 1rem 2rem;
      color: #5a3e2b;
    }
    
    header { text-align: center; margin-bottom: 0.5rem; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 600; color: #5a3e2b; }
    
    #app-wrap { width: 100%; max-width: 600px; }
    
    .card {
      background: #fff;
      border: 1.5px solid #e8e0d5;
      border-radius: 20px;
      padding: 1rem 1rem 0.6rem;
      margin-bottom: 0.8rem;
      box-shadow: 0 4px 20px rgba(90,62,43,0.04);
      position: relative;
    }
    
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }
    .card-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #b09070;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    #listen-btn {
      display: flex; align-items: center; gap: 4px;
      font-size: 0.78rem; padding: 5px 12px;
      border-radius: 10px; border: 1.5px solid #d4c4b0;
      background: #fff; color: #5a3e2b; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all 0.12s;
    }
    #listen-btn:hover { background: #f5e6d3; border-color: #c4a88a; }
    #listen-btn.playing { border-color: #6b8c42; color: #3b6d11; background: #eaf3de; }
    
    /* Klavye Görsel Şeması */
    .fretboard-view {
      width: 100%;
      background: #fdfaf2;
      border: 1.5px solid #e0d5c1;
      border-radius: 12px;
      padding: 16px 8px;
      margin: 0.4rem 0 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 9px;
      position: relative;
    }
    .string-line {
      height: 2px;
      background: #bca88f;
      position: relative;
      display: flex;
      align-items: center;
    }
    .string-line::before {
      content: attr(data-string-num);
      position: absolute;
      left: -14px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #b09070;
    }
    
    /* Perdeleri ayıran dik çizgiler */
    .fret-divider {
      position: absolute;
      top: 0; bottom: 0;
      width: 1.5px;
      background: #d0c2ad;
    }
    .fd-0 { left: 15%; height: 100%; background: #8a7355; width: 3.5px; } 
    .fd-1 { left: 36%; }
    .fd-2 { left: 57%; }
    .fd-3 { left: 78%; }
    .fd-4 { left: 99%; }
    
    /* Perde Numaraları Altta */
    .fret-labels {
      display: flex;
      position: relative;
      margin-top: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #c4a88a;
      height: 14px;
    }
    .flabel { position: absolute; transform: translateX(-50%); }
    .fl-0 { left: 7.5%; }
    .fl-1 { left: 25.5%; }
    .fl-2 { left: 46.5%; }
    .fl-3 { left: 67.5%; }
    .fl-4 { left: 88.5%; }
    
    /* Notaları Gösteren Canlı Nokta */
    .note-dot {
      position: absolute;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #e24b4a;
      border: 1.5px solid #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
      transform: translate(-50%, -50%);
      z-index: 10;
      display: none;
      animation: pulseDot 1.2s infinite ease-in-out;
    }
    @keyframes pulseDot {
      0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 2px 6px rgba(226,75,74,0.4); }
      50% { transform: translate(-50%, -50%) scale(1.12); box-shadow: 0 2px 12px rgba(226,75,74,0.7); }
      100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 2px 6px rgba(226,75,74,0.4); }
    }
    
    #hint-text { font-size: 0.78rem; color: #b09070; text-align: center; margin-bottom: 0.8rem; font-style: italic; }
    
    /* Seçenek Butonları */
    .choices-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 0.8rem;
    }
    .choice-card {
      background: #fff;
      border: 1.5px solid #d4c4b0;
      border-radius: 12px;
      padding: 12px 4px;
      font-size: 1.15rem;
      font-weight: 700;
      color: #5a3e2b;
      cursor: pointer;
      text-align: center;
      font-family: inherit;
      transition: all 0.12s;
    }
    .choice-card:hover:not(.disabled) { background: #f5e6d3; border-color: #c4a88a; transform: translateY(-1.5px); }
    .choice-card:active:not(.disabled) { transform: scale(0.97); }
    .choice-card.correct { background: #eaf3de !important; border-color: #6b8c42 !important; color: #3b6d11 !important; }
    .choice-card.wrong   { background: #fdf0f0 !important; border-color: #e24b4a !important; color: #a32d2d !important; }
    .choice-card.disabled { cursor: default; }
    
    #message { text-align: center; font-size: 0.88rem; font-weight: 700; min-height: 20px; margin-bottom: 0.6rem; }
    
    #progress-bar-wrap { height: 5px; background: #ede6d8; border-radius: 3px; margin-bottom: 0.8rem; overflow: hidden; display: none; border: 1px solid #e0d8c8; }
    #progress-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #8cb85f, #52a050); border-radius: 3px; transition: width 1s linear; }
    
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    
    .info-badge {
      font-size: 0.82rem; font-weight: 700; color: #7a6a5a;
      background: #eedec433; border: 1.5px solid #e8e0d5;
      padding: 8px 14px; border-radius: 10px;
    }
    #timer-display { color: #a32d2d; background: #fdf0f0; border-color: #f9d5d5; }
    
    #next-btn {
      padding: 10px 20px; font-size: 0.88rem; font-weight: 700;
      border-radius: 10px; border: 1.5px solid #d4a373;
      background: #f5e6d3; color: #5a3e2b; cursor: pointer;
      font-family: inherit; transition: all 0.12s;
    }
    #next-btn:hover:not(:disabled) { background: #ebd3b8; }
    #next-btn:disabled { background: #f5f5f5; border-color: #e0e0e0; color: #b0b0b0; cursor: not-allowed; }
    
    /* Sonuç Kartı */
    #result-zone { display: none; text-align: center; padding: 1.5rem 1rem; }
    .res-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 0.4rem; }
    .res-score { font-size: 3rem; font-weight: 700; color: #6b8c42; margin: 0.5rem 0; }
    .res-comment { font-size: 0.9rem; font-style: italic; color: #5a3e2b; line-height: 1.3rem; margin-bottom: 1.2rem; }
    .restart-btn {
      padding: 11px 24px; font-size: 0.9rem; font-weight: 700;
      border-radius: 10px; border: 1.5px solid #d4a373;
      background: #f5e6d3; color: #5a3e2b; cursor: pointer; font-family: inherit;
    }
    .restart-btn:hover { background: #ebd3b8; }
    
    footer { margin-top: 2rem; font-size: 0.72rem; color: #c4b5a0; text-align: center; }
    
    @media (max-width: 480px) {
      .choices-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .choice-card { font-size: 1.1rem; padding: 10px 4px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>🎸 Klavye Yerleşimi Egzersizi</h1>
    <p>Pozisyon 1 — Sınav Modu (20 Soru)</p>
  </header>

  <div id="app-wrap">
    
    <div id="quiz-zone" class="card">
      <div class="card-top">
        <span id="question-index-label" class="card-label">Soru: 1 / 20</span>
        <button id="listen-btn" onclick="replay()">🔊 Dinle</button>
      </div>
      
      <div class="fretboard-view" id="fretboard-container">
        <div class="fret-divider fd-0"></div>
        <div class="fret-divider fd-1"></div>
        <div class="fret-divider fd-2"></div>
        <div class="fret-divider fd-3"></div>
        <div class="fret-divider fd-4"></div>
        
        <div id="target-dot" class="note-dot"></div>
        
        <div class="string-line" data-string-num="①" id="str-1"></div>
        <div class="string-line" data-string-num="②" id="str-2"></div>
        <div class="string-line" data-string-num="③" id="str-3"></div>
        <div class="string-line" data-string-num="④" id="str-4"></div>
        <div class="string-line" data-string-num="⑤" id="str-5"></div>
        <div class="string-line" data-string-num="⑥" id="str-6"></div>
        
        <div class="fret-labels">
          <span class="flabel fl-0">Boş</span>
          <span class="flabel fl-1">1. Perde</span>
          <span class="flabel fl-2">2. Perde</span>
          <span class="flabel fl-3">3. Perde</span>
          <span class="flabel fl-4">4. Perde</span>
        </div>
      </div>
      
      <p id="hint-text">💡 Soruyu incele ve doğru notayı seç</p>
      
      <div class="choices-grid" id="choices-box"></div>
      
      <div id="message"></div>
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
      
      <div class="bottom-bar">
        <div class="info-badge" id="timer-display">Süre: 00:00</div>
        <button id="next-btn" onclick="manualNext()" disabled>Sonraki Soru →</button>
      </div>
    </div>
    
    <div id="result-zone" class="card">
      <h2 class="res-title">Sınav Tamamlandı! 🏁</h2>
      <div class="res-score" id="final-score-text">0 / 0</div>
      <p class="res-comment" id="final-comment-text">Yükleniyor...</p>
      <div style="display:flex; gap:10px; justify-content:center;">
        <button class="restart-btn" onclick="resetQuiz()">🔄 Yeniden Başlat</button>
        <button class="restart-btn" style="background:#fff; border-color:#d4c4b0;" onclick="window.location.href='https://gitar.yunusgedik.com.tr/'">🏠 Başa Dön</button>
      </div>
    </div>
    
  </div>

  <footer><p>❤️ yunusgedik.com.tr</p></footer>

  <script>
    // 1. Pozisyon Tüm Temel Doğal Notalar Havuzu (Boş teller dahil maksimum 4. perdeye kadar)
    const NOTES = [
      { name:'Mi',  string:6, fret:0, freq:164.81, pctX:7.5,  strId:'str-6' },
      { name:'Fa',  string:6, fret:1, freq:174.61, pctX:25.5, strId:'str-6' },
      { name:'Sol', string:6, fret:3, freq:196.00, pctX:67.5, strId:'str-6' },
      
      { name:'La',  string:5, fret:0, freq:220.00, pctX:7.5,  strId:'str-5' },
      { name:'Si',  string:5, fret:2, freq:246.94, pctX:46.5, strId:'str-5' },
      { name:'Do',  string:5, fret:3, freq:261.63, pctX:67.5, strId:'str-5' },
      
      { name:'Re',  string:4, fret:0, freq:293.66, pctX:7.5,  strId:'str-4' },
      { name:'Mi',  string:4, fret:2, freq:329.63, pctX:46.5, strId:'str-4' },
      { name:'Fa',  string:4, fret:3, freq:349.23, pctX:67.5, strId:'str-4' },
      
      { name:'Sol', string:3, fret:0, freq:392.00, pctX:7.5,  strId:'str-3' },
      { name:'La',  string:3, fret:2, freq:440.00, pctX:46.5, strId:'str-3' },
      
      { name:'Si',  string:2, fret:0, freq:493.88, pctX:7.5,  strId:'str-2' },
      { name:'Do',  string:2, fret:1, freq:523.25, pctX:25.5, strId:'str-2' },
      { name:'Re',  string:2, fret:3, freq:587.33, pctX:67.5, strId:'str-2' },
      
      { name:'Mi',  string:1, fret:0, freq:659.25, pctX:7.5,  strId:'str-1' },
      { name:'Fa',  string:1, fret:1, freq:698.46, pctX:25.5, strId:'str-1' },
      { name:'Sol', string:1, fret:3, freq:783.99, pctX:67.5, strId:'str-1' }
    ];
    
    const OPTIONS_POOL = ['Do', 'Re', 'Mi', 'Fa', 'Sol', 'La', 'Si'];
    const TOTAL_QUESTIONS_COUNT = 20;
    
    const ERR = [
      "Yazıklar olsun!", "Kulaklarımız kanadı...", "Sende hiç utanma yok mu yaa",
      "Instagram'dan ekle beni seni engellim", "Tüm başarılar Yunus Hocadan, bu hata senden..",
      "Yunus Hoca bunu görmemiş olsun...", "Gitarı yavaşça yere bırak...",
      "Sen daha iyi enstrümanlara layıksın", "Aynen knk aynen sensin", "Iyyy yine mi hata",
      "Ağır popçusun belli knk", "Lâ havle..", "Sen en iyisi flüt çal knk"
    ];
    
    let questions = [];
    let currentIndex = 0;
    let correctCount = 0;
    let wrongCount = 0;
    let answered = false;
    let interacted = false;
    
    let audioCtx = null;
    let startTime = null;
    let timerInterval = null;
    let autoTimer = null;
    let current = null;
    
    function generateRandomQuizSet(sourceArray, count) {
      let pool = [];
      while(pool.length < count) {
        let shuffled = [...sourceArray].sort(() => Math.random() - 0.5);
        pool.push(...shuffled);
      }
      return pool.slice(0, count);
    }
    
    function startTimer() {
      startTime = Date.now();
      timerInterval = setInterval(() => {
        const elapsed = Date.now() - startTime;
        const totalSecs = Math.floor(elapsed / 1000);
        const mins = String(Math.floor(totalSecs / 60)).padStart(2, '0');
        const secs = String(totalSecs % 60).padStart(2, '0');
        document.getElementById('timer-display').textContent = `Süre: ${mins}:${secs}`;
      }, 1000);
    }
    
    function getAudio() {
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    
    function playGuitar(freq) {
      try {
        const ctx = getAudio();
        if(ctx.state === 'suspended') ctx.resume();
        const master = ctx.createGain();
        const now = ctx.currentTime;
        master.gain.setValueAtTime(0, now);
        master.gain.linearRampToValueAtTime(0.5, now + 0.005);
        master.gain.exponentialRampToValueAtTime(0.001, now + 2.0);
        master.connect(ctx.destination);
        
        [[1,0.5],[2,0.25],[3,0.12],[4,0.05]].forEach(([m, v]) => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.type = 'sine'; o.frequency.value = freq * m; g.gain.value = v;
          o.connect(g); g.connect(master); o.start(now); o.stop(now + 2.0);
        });
        
        const btn = document.getElementById('listen-btn');
        btn.classList.add('playing');
        setTimeout(() => btn.classList.remove('playing'), 500);
      } catch(e){}
    }
    
    function replay() {
      interacted = true;
      document.getElementById('hint-text').style.display = 'none';
      if(current) playGuitar(current.freq);
    }
    
    function clearAutoTimer() {
      if(autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
      document.getElementById('progress-bar-wrap').style.display = 'none';
    }
    
    function startAutoAdvance() {
      const wrap = document.getElementById('progress-bar-wrap');
      const bar  = document.getElementById('progress-bar');
      wrap.style.display = 'block';
      bar.style.width = '100%';
      bar.style.transition = 'none';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          bar.style.transition = 'width 1s linear';
          bar.style.width = '0%';
        });
      });
      autoTimer = setTimeout(() => { clearAutoTimer(); nextQuestion(); }, 1000);
    }
    
    function manualNext() { clearAutoTimer(); nextQuestion(); }
    
    function nextQuestion() {
      if(currentIndex >= TOTAL_QUESTIONS_COUNT) {
        endQuiz();
        return;
      }
      
      answered = false;
      document.getElementById('message').textContent = '';
      document.getElementById('next-btn').disabled = true;
      clearAutoTimer();
      
      document.getElementById('question-index-label').textContent = `Soru: ${currentIndex + 1} / ${TOTAL_QUESTIONS_COUNT}`;
      
      current = questions[currentIndex];
      
      // Kırmızı hedef noktasını tele yerleştir
      const dot = document.getElementById('target-dot');
      const parentLine = document.getElementById(current.strId);
      if(parentLine) {
        dot.style.display = 'block';
        dot.style.left = current.pctX + '%';
        // Çizginin dikey ortasına sabitle
        parentLine.appendChild(dot);
      }
      
      if(interacted) {
        setTimeout(() => { playGuitar(current.freq); }, 250);
      }
      
      // Seçenekleri oluştur (1 Doğru + 3 Yanlış)
      let wrongs = OPTIONS_POOL.filter(o => o !== current.name).sort(() => Math.random() - 0.5).slice(0, 3);
      let choices = [current.name, ...wrongs].sort(() => Math.random() - 0.5);
      
      const box = document.getElementById('choices-box');
      box.innerHTML = '';
      
      choices.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'choice-card';
        btn.textContent = name;
        btn.dataset.choice = name;
        btn.onclick = () => checkAnswer(name, btn);
        box.appendChild(btn);
      });
    }
    
    function checkAnswer(name, card) {
      if(answered) return;
      answered = true;
      interacted = true;
      document.getElementById('hint-text').style.display = 'none';
      
      document.querySelectorAll('.choice-card').forEach(c => { c.classList.add('disabled'); c.onclick = null; });
      const msg = document.getElementById('message');
      
      if(name === current.name) {
        card.classList.add('correct');
        msg.textContent = '✓ Doğru! İyi iş çıkardın, devam et!'; msg.style.color = '#6b8c42';
        playGuitar(current.freq);
        correctCount++;
        document.getElementById('next-btn').disabled = false;
        startAutoAdvance();
      } else {
        card.classList.add('wrong');
        const randomMsg = ERR[Math.floor(Math.random() * ERR.length)];
        msg.textContent = '✗ ' + randomMsg + ' — Doğrusu: ' + current.name; msg.style.color = '#c75b39';
        wrongCount++;
        document.querySelectorAll('.choice-card').forEach(c => {
          if(c.dataset.choice === current.name) c.classList.add('correct');
        });
        document.getElementById('next-btn').disabled = false;
      }
      currentIndex++;
    }
    
    function resetQuiz() {
      clearAutoTimer();
      if(timerInterval) clearInterval(timerInterval);
      
      document.getElementById('quiz-zone').style.display = 'block';
      document.getElementById('result-zone').style.display = 'none';
      
      correctCount = 0;
      wrongCount = 0;
      currentIndex = 0;
      answered = false;
      interacted = false;
      
      questions = generateRandomQuizSet(NOTES, TOTAL_QUESTIONS_COUNT);
      
      document.getElementById('hint-text').style.display = 'block';
      document.getElementById('hint-text').innerHTML = '💡 Soruyu incele ve doğru notayı seç';
      document.getElementById('timer-display').textContent = 'Süre: 00:00';
      
      startTimer();
      nextQuestion();
    }
    
    function endQuiz() {
      if(timerInterval) clearInterval(timerInterval);
      clearAutoTimer();
      
      document.getElementById('quiz-zone').style.display = 'none';
      document.getElementById('result-zone').style.display = 'block';
      
      document.getElementById('final-score-text').textContent = `${correctCount} / ${TOTAL_QUESTIONS_COUNT}`;
      
      const elapsed = Date.now() - startTime;
      
      let comment = "";
      if(correctCount === 20) {
        comment = "Muhteşem! Kusursuz bir sınav! Gitar klavyesinin 1. pozisyonu senin oyun alanın olmuş kanka. Yunus Hoca gurur duyuyor! 🏆";
      } else if(correctCount >= 15) {
        comment = "Harika! Çok ufak tefek kaçırmalar dışında klavyeye tamamen hakimsin. Sahne seni bekler kanka! 🔥";
      } else if(correctCount >= 10) {
        comment = "Fena değil, yolu yarılamışsın. Ama akor basarken bas tellerinde kaybolmamak için biraz daha klavye pratiği yapmalısın. ⚡";
      } else if(correctCount >= 5) {
        comment = "Dostum sahilde pop çalarken bare basamayan o çocuk gibisin şu an... Telleri ve perdeleri iyice ezberleyip tekrar gel kanka. 🎸";
      } else {
        comment = "Gitarı sakince kılıfına koy ve fermuarını sıkıca kapat... Klavye bilgisi yerlerde sürüyor, Yunus Hocanın videolarına acil geri dön! 🐢";
      }
      
      document.getElementById('final-comment-text').textContent = comment;
      
      // Sunucuya Skoru Kaydet
      if(window.GitarScores && typeof window.GitarScores.save === 'function') {
        window.GitarScores.save('klavye_pozisyon_1', {
          correct: correctCount,
          wrong: wrongCount,
          total: TOTAL_QUESTIONS_COUNT,
          time_ms: elapsed
        }).then(success => {
          console.log('[GitarScores] Klavye sınav skoru kaydedildi mi:', success);
        });
      }
    }

    // ── GÜVENLİK VE GİRİŞ KONTROLÜ (TAMAMEN TAMİR EDİLDİ) ──
    (function checkSecurity() {
      const sid = localStorage.getItem('gitar_session');
      if (!sid) {
        window.location.href = 'https://gitar.yunusgedik.com.tr/';
        return;
      }
      resetQuiz();
    })();
  </script>
  <script src="/live-bar.js"></script>
</body>
</html>
