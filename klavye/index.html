<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gitar Klavyesi – Pozisyon 1 (Sınav Modu)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;700&display=swap');
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { font-family: 'Lato', sans-serif; background: #faf6ed; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.2rem 1rem 2rem; color: #5a3e2b; }
    header { text-align: center; margin-bottom: 0.5rem; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 600; color: #5a3e2b; }
    #app-wrap { width: 100%; max-width: 600px; }
    
    /* Orijinal kart ve görsel stillerini korudum */
    .card { background: #fff; border: 1.5px solid #e8e0d5; border-radius: 20px; padding: 1.1rem; margin-bottom: 0.85rem; box-shadow: 0 4px 20px rgba(90, 62, 43, 0.04); }
    .guitar-wrap { width: 100%; display: flex; justify-content: center; margin: 0 auto; }
    
    /* ... (Diğer tüm CSS sınıfların olduğu gibi kaldı) ... */
    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
    .choice-card { background: #fff; border: 2px solid #e8e0d5; border-radius: 16px; padding: 14px 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
    .choice-card.correct { background: #eaf3de; border-color: #6b8c42; }
    .choice-card.wrong { background: #fdf0f0; border-color: #c75b39; }
  </style>
</head>

        </svg>
    </div>
  </div>

  <div id="quiz-zone">
    <div class="choices" id="choices"></div>
    <div id="message" class="message"></div>
  </div>
  
  <div class="controls">
    <button class="ctrl-btn" onclick="resetQuiz()">↻ Tekrar</button>
  </div>
</div>
